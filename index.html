<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сонечко — Інтернет-магазин</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --main: #ffffff; --text: #1a1a1a; --accent: #facc15; --bg-alt: #f3f4f6; }
        .dark-mode { --main: #121212; --text: #f9fafb; --accent: #fbbf24; --bg-alt: #1f2937; }

        body { background: var(--main); color: var(--text); font-family: 'Inter', sans-serif; transition: 0.3s; margin: 0; overflow-x: hidden; }
        
        /* ЛОАДЕР */
        #loader { 
            position: fixed; inset: 0; background: var(--main); z-index: 9999; 
            display: flex; align-items: center; justify-content: center; transition: 0.5s;
        }
        .loading-text { font-size: 3rem; font-weight: 800; letter-spacing: -2px; position: relative; display: inline-block; color: #ddd; }
        .loading-text::before {
            content: "СОНЕЧКО"; position: absolute; left: 0; top: 0; width: 0; height: 100%;
            background: linear-gradient(to right, #0057b7 50%, #ffd700 50%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            overflow: hidden; animation: fillText 2s forwards cubic-bezier(0.4, 0, 0.2, 1);
        }
        @keyframes fillText { 0% { width: 0; } 100% { width: 100%; } }

        /* МЕНЮ-ГАМБУРГЕР */
        #sideMenu { 
            position: fixed; top: 0; left: -320px; width: 300px; height: 100%; 
            background: var(--main); box-shadow: 20px 0 50px rgba(0,0,0,0.1); 
            z-index: 2000; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 40px 20px; 
        }
        #sideMenu.open { left: 0; }
        .menu-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); z-index: 1500; display: none; backdrop-filter: blur(4px); }

        /* КАРТКИ */
        .glass-card { background: var(--bg-alt); border-radius: 24px; border: 1px solid rgba(0,0,0,0.05); transition: 0.3s; }
        .glass-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.05); }

        .modal { position: fixed; inset: 0; z-index: 3000; display: none; padding: 20px; background: var(--main); overflow-y: auto; }
        .active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }

        .admin-small { font-size: 10px; opacity: 0.5; cursor: pointer; }
    </style>
</head>
<body>

    <div id="loader">
        <div class="loading-text">СОНЕЧКО</div>
    </div>

    <div class="menu-overlay" id="overlay" onclick="toggleMenu(false)"></div>
    <div id="sideMenu">
        <div class="flex flex-col h-full">
            <div class="mb-10">
                <h2 class="text-2xl font-800">МЕНЮ</h2>
            </div>
            <nav class="space-y-6 font-semibold">
                <button onclick="openPage('authPage')" class="block w-full text-left hover:text-yellow-500">Реєстрація / Логін</button>
                <button onclick="openPage('settingsPage')" class="block w-full text-left hover:text-yellow-500">Налаштування</button>
                <a href="https://t.me/leytenant_ukra" class="block hover:text-yellow-500">Підтримка Telegram</a>
            </nav>
            <div class="mt-auto">
                <p id="menuUserStatus" class="text-xs opacity-50">Ви не увійшли</p>
                <button onclick="openAdmin()" class="admin-small mt-2">ADMIN ACCESS</button>
            </div>
        </div>
    </div>

    <header class="p-6 flex justify-between items-center max-w-7xl mx-auto border-b">
        <button onclick="toggleMenu(true)" class="text-2xl">☰</button>
        <h1 class="text-2xl font-800 tracking-tighter">СОНЕЧКО☀️</h1>
        <div id="headerProfile" onclick="openPage('profilePage')" class="w-10 h-10 rounded-full bg-gray-200 cursor-pointer overflow-hidden"></div>
    </header>

    <div class="max-w-7xl mx-auto p-6">
        <div class="w-full h-48 rounded-[32px] bg-gradient-to-r from-yellow-400 to-amber-500 flex items-center p-10 text-white relative overflow-hidden">
            <div class="relative z-10">
                <h2 class="text-4xl font-800">ЗНИЖКИ 50%</h2>
                <p class="font-bold opacity-80 uppercase text-xs mt-2">Тільки сьогодні в Бортятині</p>
            </div>
            <div class="absolute right-[-20px] bottom-[-20px] text-9xl opacity-20">☀️</div>
        </div>
    </div>

    <main class="max-w-7xl mx-auto p-6 flex flex-col md:flex-row gap-8">
        <aside class="md:w-1/4 space-y-6">
            <div class="glass-card p-6">
                <h3 class="font-bold mb-4">Пошук</h3>
                <input type="text" id="mainSearch" oninput="renderProducts()" placeholder="Назва товару..." class="w-full p-3 rounded-xl border-none bg-white dark:bg-zinc-800 shadow-sm">
            </div>
            <div class="glass-card p-6">
                <h3 class="font-bold mb-4">Категорії</h3>
                <div class="space-y-2 text-sm">
                    <label class="flex gap-2"><input type="checkbox"> Побутова техніка</label>
                    <label class="flex gap-2"><input type="checkbox"> Електроніка</label>
                </div>
            </div>
        </aside>

        <div class="flex-1">
            <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </main>

    <div id="authPage" class="modal p-10">
        <div class="max-w-md mx-auto text-center">
            <button onclick="closeAll()" class="mb-10 opacity-50">← Назад</button>
            <h2 class="text-3xl font-800 mb-6">Вхід через Google</h2>
            <button onclick="fakeGoogleAuth()" class="w-full border-2 border-black p-4 rounded-2xl font-bold flex items-center justify-center gap-2">
                <img src="https://www.google.com/favicon.ico" class="w-5"> Продовжити з Google
            </button>
        </div>
    </div>

    <div id="createProfilePage" class="modal p-10">
        <div class="max-w-md mx-auto text-center">
            <h2 class="text-3xl font-800 mb-10">Створити профіль</h2>
            <div class="relative w-32 h-32 mx-auto mb-8">
                <img id="tempAvatar" src="https://via.placeholder.com/150" class="w-full h-full rounded-[40px] object-cover border-4 border-yellow-400">
                <input type="file" id="fileAvatar" class="hidden" onchange="handleFile(this)">
                <button onclick="document.getElementById('fileAvatar').click()" class="absolute bottom-0 right-0 bg-black text-white p-2 rounded-full">📸</button>
            </div>
            <input type="text" id="regName" placeholder="Ваше ім'я" class="w-full p-4 glass-card mb-4 border-none outline-none">
            <input type="text" id="regPhone" placeholder="Номер телефону" class="w-full p-4 glass-card mb-8 border-none outline-none">
            <button onclick="saveNewUser()" class="w-full bg-yellow-400 p-5 rounded-2xl font-black">ЗБЕРЕГТИ</button>
        </div>
    </div>

    <div id="settingsPage" class="modal p-10">
        <div class="max-w-2xl mx-auto">
            <button onclick="closeAll()" class="mb-10">← Закрити</button>
            <h2 class="text-3xl font-800 mb-8 italic">SETTINGS</h2>
            
            <div class="space-y-6">
                <button onclick="toggleTheme()" class="w-full p-6 glass-card text-left font-bold flex justify-between">
                    <span>Тема оформлення</span>
                    <span id="themeInfo">День ☀️</span>
                </button>
                
                <div class="glass-card p-6">
                    <h4 class="font-bold mb-4">Вибір мови</h4>
                    <input type="text" id="langSearch" oninput="filterLangs()" placeholder="Пошук мови..." class="w-full p-3 rounded-xl border mb-4">
                    <div id="langList" class="grid grid-cols-2 gap-2 h-40 overflow-y-auto"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="adminPanel" class="modal p-10">
        <div class="max-w-2xl mx-auto">
            <h2 class="text-xs uppercase font-black opacity-30 mb-10">Central Management System</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-10">
                <div class="space-y-4">
                    <input type="text" id="adTitle" placeholder="Назва товару" class="w-full p-3 glass-card border-none">
                    <input type="text" id="adPrice" placeholder="Ціна" class="w-full p-3 glass-card border-none">
                    <textarea id="adDesc" placeholder="Опис" class="w-full p-3 glass-card border-none h-20"></textarea>
                    <input type="file" id="adFile" class="hidden" onchange="handleAdImg(this)">
                    <button onclick="document.getElementById('adFile').click()" class="w-full p-3 bg-gray-100 text-xs font-bold rounded-xl">ВИБРАТИ ФОТО</button>
                    <button onclick="publish()" class="w-full bg-black text-white p-4 rounded-xl font-bold">ОПУБЛІКУВАТИ</button>
                </div>
                <div class="glass-card p-4 overflow-y-auto max-h-80">
                    <h4 class="text-[10px] font-bold mb-3">КОРИСТУВАЧІ</h4>
                    <div id="adminUsersList" class="space-y-2"></div>
                </div>
            </div>
            <button onclick="closeAll()" class="admin-small">Close Session</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmCzZAEKq4BMo6eWAN96IawhF95cH1sHM",
            authDomain: "keysbrawl-c4ae6.firebaseapp.com",
            projectId: "keysbrawl-c4ae6",
            storageBucket: "keysbrawl-c4ae6.firebasestorage.app",
            messagingSenderId: "1090859079662",
            appId: "1:1090859079662:web:0fb901aee2e2d65c83a0ff"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let store = [];
        let curAvatar = "";
        let curAdImg = "";

        // ЛОАДЕР
        window.addEventListener('load', () => {
            setTimeout(() => { document.getElementById('loader').style.opacity = '0'; 
            setTimeout(() => document.getElementById('loader').style.display = 'none', 500); }, 2000);
        });

        // МЕНЮ
        window.toggleMenu = (s) => {
            document.getElementById('sideMenu').classList.toggle('open', s);
            document.getElementById('overlay').style.display = s ? 'block' : 'none';
        };

        // СТОРІНКИ
        window.openPage = (id) => {
            closeAll();
            document.getElementById(id).classList.add('active');
            toggleMenu(false);
        };
        window.closeAll = () => {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
        };

        // ФОТО
        window.handleFile = (input) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                curAvatar = e.target.result;
                document.getElementById('tempAvatar').src = curAvatar;
            };
            reader.readAsDataURL(input.files[0]);
        };
        window.handleAdImg = (input) => {
            const reader = new FileReader();
            reader.onload = (e) => curAdImg = e.target.result;
            reader.readAsDataURL(input.files[0]);
        };

        // АВТЕНТИФІКАЦІЯ
        window.fakeGoogleAuth = () => {
            const email = prompt("Введіть пошту для Google Login:");
            if(email) {
                localStorage.setItem('temp_email', email);
                openPage('createProfilePage');
            }
        };

        window.saveNewUser = async () => {
            const u = {
                name: document.getElementById('regName').value,
                phone: document.getElementById('regPhone').value,
                email: localStorage.getItem('temp_email'),
                photo: curAvatar,
                date: Date.now()
            };
            await addDoc(collection(db, "sonechko_users"), u);
            localStorage.setItem('sun_user', JSON.stringify(u));
            location.reload();
        };

        // РЕНДЕР ТОВАРІВ
        onSnapshot(query(collection(db, "sonechko_items"), orderBy("date", "desc")), (snap) => {
            store = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderProducts();
        });

        window.renderProducts = () => {
            const grid = document.getElementById('productGrid');
            const search = document.getElementById('mainSearch').value.toLowerCase();
            grid.innerHTML = '';
            store.filter(p => p.title.toLowerCase().includes(search)).forEach(p => {
                grid.innerHTML += `
                    <div class="glass-card p-4 cursor-pointer" onclick="alert('Відкриваємо деталі...')">
                        <img src="${p.img}" class="w-full h-40 object-cover rounded-2xl mb-4">
                        <h4 class="font-bold text-sm truncate">${p.title}</h4>
                        <div class="flex justify-between mt-2">
                            <span class="text-yellow-600 font-black">${p.price} грн</span>
                            <span class="text-[10px] opacity-40">ДЕТАЛЬНІШЕ</span>
                        </div>
                    </div>`;
            });
        };

        // АДМІНКА
        window.openAdmin = () => { if(prompt("Pass:") === "254") openPage('adminPanel'); };
        window.publish = async () => {
            await addDoc(collection(db, "sonechko_items"), {
                title: document.getElementById('adTitle').value,
                price: document.getElementById('adPrice').value,
                desc: document.getElementById('adDesc').value,
                img: curAdImg,
                date: Date.now()
            });
            alert("Done!");
        };

        // МОВИ (ПРИКЛАД)
        const langs = [
            {n:"Українська", c:"UA"}, {n:"English", c:"US"}, {n:"Deutsch", c:"DE"}, {n:"Polski", c:"PL"},
            {n:"Français", c:"FR"}, {n:"Italiano", c:"IT"}, {n:"日本語", c:"JP"}, {n:"Türkçe", c:"TR"}
        ];
        window.filterLangs = () => {
            const s = document.getElementById('langSearch').value.toLowerCase();
            const list = document.getElementById('langList');
            list.innerHTML = '';
            langs.filter(l => l.n.toLowerCase().includes(s)).forEach(l => {
                list.innerHTML += `<button class="p-3 text-xs bg-gray-50 rounded-xl flex gap-2"><img src="https://flagcdn.com/w20/${l.c.toLowerCase()}.png" class="h-3 my-auto"> ${l.n}</button>`;
            });
        };
        filterLangs();

        // СТАТУС КОРИСТУВАЧА
        const user = JSON.parse(localStorage.getItem('sun_user'));
        if(user) {
            document.getElementById('headerProfile').innerHTML = `<img src="${user.photo}" class="w-full h-full object-cover">`;
            document.getElementById('menuUserStatus').innerText = `Вітаємо, ${user.name}`;
        }
    </script>
</body>
</html>
