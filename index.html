<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ABS Workout</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000;
color:white;
padding:20px;
min-height:100vh;
}

.container{
max-width:400px;
margin:auto;
}

.streak-container{
display:flex;
flex-direction:column;
align-items:center;
margin-bottom:25px;
}

.fire{
font-size:65px;
animation:pulse 1.5s infinite;
filter:drop-shadow(0 0 10px orange);
transition:0.4s;
}

.fire.inactive{
opacity:0.3;
filter:none;
}

@keyframes pulse{
0%{
transform:scale(1);
}
50%{
transform:scale(1.2);
}
100%{
transform:scale(1);
}
}

.streak-text{
margin-top:10px;
font-size:22px;
font-weight:bold;
}

.card{
background:linear-gradient(135deg,#005eff,#4ea1ff);
padding:25px;
border-radius:25px;
margin-bottom:25px;
box-shadow:0 0 30px rgba(0,100,255,.4);
}

.card h1{
font-size:28px;
}

.exercise{
display:flex;
align-items:center;
background:#111;
padding:15px;
margin-bottom:15px;
border-radius:18px;
}

.icon{
width:55px;
height:55px;
background:#222;
border-radius:15px;
display:flex;
justify-content:center;
align-items:center;
margin-right:15px;
font-size:26px;
}

.timer{
text-align:center;
font-size:60px;
font-weight:bold;
margin:30px 0;
}

button{
width:100%;
padding:18px;
border:none;
border-radius:50px;
background:#ff7b00;
color:white;
font-size:30px;
font-weight:bold;
cursor:pointer;
transition:0.3s;
}

button:hover{
transform:scale(1.03);
}

button:disabled{
opacity:0.5;
}
</style>
</head>
<body>

<div class="container">

<div class="streak-container">
<div id="fire" class="fire inactive">🔥</div>
<div class="streak-text">
<span id="days">0</span> Days Streak
</div>
</div>

<div class="card">
<h1>ABS WORKOUT</h1>
</div>

<div class="exercise">
<div class="icon">🏃</div>
<div>High Stepping</div>
</div>

<div class="exercise">
<div class="icon">💪</div>
<div>Abdominal Crunches</div>
</div>

<div class="exercise">
<div class="icon">🦶</div>
<div>Heel Touch</div>
</div>

<div class="exercise">
<div class="icon">⛰️</div>
<div>Mountain Climber</div>
</div>

<div class="timer" id="timer">
01:00
</div>

<button id="goBtn">
GO!
</button>

</div>

<script>

let totalSeconds=60;
let timerRunning=false;

const timer=document.getElementById("timer");
const button=document.getElementById("goBtn");
const fire=document.getElementById("fire");
const daysText=document.getElementById("days");

let streak=Number(localStorage.getItem("streak"))||0;
let lastDate=localStorage.getItem("lastWorkout");

checkMissedDay();
updateUI();

function getToday(){

let d=new Date();
return d.toISOString().split("T")[0];

}

function daysBetween(oldDate,newDate){

let d1=new Date(oldDate);
let d2=new Date(newDate);

let diff=Math.floor(
(d2-d1)/(1000*60*60*24)
);

return diff;

}

function checkMissedDay(){

if(!lastDate)return;

let today=getToday();

let diff=daysBetween(lastDate,today);

if(diff>1){

streak=0;

localStorage.setItem(
"streak",
0
);

}

}

function updateUI(){

daysText.innerText=streak;

if(streak>0){

fire.classList.remove("inactive");

}else{

fire.classList.add("inactive");

}

}

button.onclick=function(){

if(timerRunning) return;

timerRunning=true;
button.disabled=true;

let seconds=60;

let interval=setInterval(()=>{

seconds--;

let mins=Math.floor(seconds/60);

let sec=seconds%60;

timer.innerText=
String(mins).padStart(2,"0")
+
":"
+
String(sec).padStart(2,"0");

if(seconds<=0){

clearInterval(interval);

completeWorkout();

timer.innerText="01:00";

timerRunning=false;
button.disabled=false;

}

},1000);

}

function completeWorkout(){

let today=getToday();

if(lastDate){

let diff=daysBetween(
lastDate,
today
);

if(diff===0){

alert(
"Сьогодні тренування вже зараховано 🔥"
);

return;
}

}

streak++;

lastDate=today;

localStorage.setItem(
"streak",
streak
);

localStorage.setItem(
"lastWorkout",
today
);

fire.classList.remove(
"inactive"
);

updateUI();

alert(
"Тренування завершено! +1 день 🔥"
);

}

</script>

</body>
</html>
