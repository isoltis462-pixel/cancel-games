<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PureDrop | Geometry Dash</title>
    <style>
        :root {
            --bg: #1c1c1e;
            --card: #2c2c2e;
            --green: #57AF20;
            --white: #ffffff;
            --grey-text: #a0a0a0;
        }

        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            background: var(--card);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid #3a3a3c;
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-size: 22px; font-weight: 900; text-transform: uppercase; }
        .logo span { color: var(--green); }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px; padding: 12px;
        }

        .game-card {
            background: var(--card);
            border-radius: 20px;
            padding: 15px 5px;
            text-align: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 1px solid #3a3a3c;
        }

        .game-card:hover { transform: scale(1.05); border-color: var(--green); }

        .icon-main { font-size: 40px; margin-bottom: 8px; }
        .name-main { font-size: 11px; font-weight: bold; }

        .full-page {
            position: fixed;
            top: 0; left: 100%;
            width: 100%; height: 100%;
            background: var(--bg);
            z-index: 2000;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
        }

        .full-page.active { left: 0; }

        .back-btn { padding: 20px; font-size: 18px; color: var(--green); cursor: pointer; font-weight: bold; }

        .tech-info {
            background: var(--card);
            border-radius: 15px;
            padding: 20px;
            margin: 20px 0;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            border: 1px solid #3a3a3c;
        }

        .info-item { display: flex; flex-direction: column; }
        .info-label { font-size: 10px; color: var(--grey-text); text-transform: uppercase; margin-bottom: 4px; }
        .info-val { font-size: 13px; font-weight: bold; }

        .content-padding { padding: 0 25px 50px 25px; }

        .big-dl-btn {
            background: var(--green);
            color: white;
            border: none;
            width: 100%;
            padding: 20px;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }

        .big-dl-btn:active { transform: scale(0.95); background: white; color: black; }
    </style>
</head>
<body>

    <header><div class="logo">PURE<span>DROP</span></div></header>

    <div class="grid">
        <!-- Geometry Dash -->
        <div class="game-card" onclick="openGame('Geometry Dash', '🔲', 'Прыгайте и летайте через опасности в этом ритм-платформере! Приготовьтесь к практически невозможному испытанию в мире Geometry Dash. Проверьте свои навыки, преодолевая шипы и препятствия под драйвовую музыку.', 'RobTop Games', '2.2.13', '4 мая 2026', '85.4 МБ', 'https://proxy4.androidapplications-files.site/fs47/fdl/409016/2118/s/1778109801/5/7a0d8e87da0b6296/6860289be330f7a9b0c55b61/')">
            <div class="icon-main">🔲</div>
            <div class="name-main">Geometry Dash</div>
        </div>

        <div class="game-card">
            <div class="icon-main">🏎️</div>
            <div class="name-main">Ukraine GTA</div>
        </div>
        
        <div class="game-card">
            <div class="icon-main">🚓</div>
            <div class="name-main">NPU Sim</div>
        </div>
    </div>

    <div id="fullPage" class="full-page">
        <div class="back-btn" onclick="closeGame()">← Назад</div>
        
        <div class="content-padding">
            <div style="display: flex; align-items: center; gap: 20px; margin-bottom: 25px;">
                <div id="largeIcon" style="font-size: 60px; background: var(--card); padding: 15px; border-radius: 20px;"></div>
                <div>
                    <h1 id="largeTitle" style="margin: 0; font-size: 28px;"></h1>
                    <span style="color: var(--green); font-size: 12px;">✔️ Проверено и безопасно</span>
                </div>
            </div>

            <!-- Характеристики на русском (как на Знімок екрана 2026-05-04 020024.png) -->
            <div class="tech-info">
                <div class="info-item">
                    <span class="info-label">Разработчик</span>
                    <span id="infoDev" class="info-val"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">Версия</span>
                    <span id="infoVer" class="info-val"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">Дата обновления</span>
                    <span id="infoDate" class="info-val"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">Размер файла</span>
                    <span id="infoSize" class="info-val"></span>
                </div>
                <div class="info-item">
                    <span class="info-label">Лицензия</span>
                    <span class="info-val" style="color: var(--green);">Бесплатно</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Тип файла</span>
                    <span class="info-val">APK</span>
                </div>
            </div>

            <p id="largeDesc" style="color: var(--grey-text); line-height: 1.6; margin-bottom: 30px;"></p>

            <a id="dlLink" href="#" style="text-decoration: none;">
                <button class="big-dl-btn">СКАЧАТЬ APK</button>
            </a>
        </div>
    </div>

    <script>
        function openGame(title, icon, desc, dev, ver, date, size, link) {
            document.getElementById('largeTitle').innerText = title;
            document.getElementById('largeIcon').innerText = icon;
            document.getElementById('largeDesc').innerText = desc;
            document.getElementById('infoDev').innerText = dev;
            document.getElementById('infoVer').innerText = ver;
            document.getElementById('infoDate').innerText = date;
            document.getElementById('infoSize').innerText = size;
            document.getElementById('dlLink').href = link;
            
            document.getElementById('fullPage').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeGame() {
            document.getElementById('fullPage').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
