<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PureDrop | Hub</title>
    <style>
        :root {
            --bg-grey: #1c1c1e;
            --card-grey: #2c2c2e;
            --happy-green: #57AF20;
            --text: #ffffff;
            --accent-glow: rgba(87, 175, 32, 0.4);
        }

        body {
            background-color: var(--bg-grey);
            color: var(--text);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            background: var(--card-grey);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #3a3a3c;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo { font-size: 24px; font-weight: 900; letter-spacing: 1px; }
        .logo span { color: var(--happy-green); }

        .search-area { padding: 15px; }
        #searchInput {
            width: 100%;
            padding: 14px;
            background: #3a3a3c;
            border: 2px solid transparent;
            border-radius: 12px;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        #searchInput:focus { border-color: var(--happy-green); }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            padding: 15px;
        }

        /* Анімації при наведенні та натисканні */
        .game-card {
            background: var(--card-grey);
            border-radius: 20px;
            padding: 15px 5px;
            display: flex;
            flex-direction: column;
            align-items: center;
            border: 1px solid #3a3a3c;
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275), box-shadow 0.3s;
            cursor: pointer;
        }

        /* Анімація наведення (Hover) */
        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.4), 0 0 10px var(--accent-glow);
            border-color: var(--happy-green);
        }

        /* Анімація натискання (Active) */
        .game-card:active {
            transform: scale(0.9);
        }

        .icon-box {
            width: 70px;
            height: 70px;
            background: var(--bg-grey);
            border-radius: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 35px;
            margin-bottom: 8px;
        }

        .name { font-size: 11px; font-weight: 700; text-align: center; }

        /* Вкладка (Модальне вікно) */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            z-index: 1000;
            backdrop-filter: blur(5px);
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            background: var(--card-grey);
            width: 85%;
            max-width: 400px;
            padding: 25px;
            border-radius: 30px;
            text-align: center;
            border: 1px solid var(--happy-green);
            position: relative;
            animation: popIn 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
        }

        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }

        .close-btn {
            position: absolute;
            top: 15px; right: 20px;
            font-size: 24px; color: #888; cursor: pointer;
        }

        .download-btn {
            background: var(--happy-green);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 15px;
            font-weight: 900;
            width: 100%;
            margin-top: 20px;
            font-size: 16px;
            transition: 0.2s;
        }

        .download-btn:active { transform: scale(0.95); background: white; color: black; }

        .no-ads {
            font-size: 10px;
            color: var(--happy-green);
            margin-top: 10px;
            text-transform: uppercase;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <header><div class="logo">PURE<span>DROP</span></div></header>

    <div class="search-area">
        <input type="text" id="searchInput" placeholder="Пошук преміум ігор...">
    </div>

    <div class="grid" id="gameGrid">
        <!-- Гра 1 -->
        <div class="game-card" onclick="openModal('Ukraine GTA', 'Найкращий симулятор життя в Україні. Відкритий світ, авто та робота в поліції.', '🏎️')">
            <div class="icon-box">🏎️</div>
            <div class="name">Ukraine GTA</div>
        </div>
        <!-- Гра 2 -->
        <div class="game-card" onclick="openModal('Superkickoff', 'Керуй своїм футбольним клубом. Шахтар та Рух чекають на тебе!', '⚽')">
            <div class="icon-box">⚽</div>
            <div class="name">Superkickoff</div>
        </div>
        <!-- Гра 3 -->
        <div class="game-card" onclick="openModal('NPU Simulator', 'Стань офіцером поліції, патрулюй місто та лови порушників.', '🚓')">
            <div class="icon-box">🚓</div>
            <div class="name">NPU Sim</div>
        </div>
    </div>

    <!-- Вікно вкладки -->
    <div id="gameModal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeModal()">&times;</span>
            <div id="modalIcon" style="font-size: 60px; margin-bottom: 10px;"></div>
            <h2 id="modalTitle" style="margin: 10px 0;"></h2>
            <p id="modalDesc" style="color: #ccc; font-size: 14px; line-height: 1.5;"></p>
            <div class="no-ads">🛡️ Без реклами та вірусів</div>
            <button class="download-btn">СКАЧАТИ БЕЗКОШТОВНО</button>
        </div>
    </div>

    <script>
        // Функції для вкладки
        function openModal(title, desc, icon) {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalDesc').innerText = desc;
            document.getElementById('modalIcon').innerText = icon;
            document.getElementById('gameModal').style.display = 'flex';
        }

        function closeModal() {
            document.getElementById('gameModal').style.display = 'none';
        }

        // Закриття при натисканні поза вікном
        window.onclick = function(event) {
            if (event.target == document.getElementById('gameModal')) closeModal();
        }

        // Пошук
        document.getElementById('searchInput').addEventListener('input', function() {
            let val = this.value.toLowerCase();
            document.querySelectorAll('.game-card').forEach(card => {
                let text = card.querySelector('.name').innerText.toLowerCase();
                card.style.display = text.includes(val) ? "flex" : "none";
            });
        });
    </script>
</body>
</html>
