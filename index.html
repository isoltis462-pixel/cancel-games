<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>☀️ Sonechko Shop PRO</title>

<style>
body { font-family: Arial; margin:0; background:#fff7cc; }

header {
  background: orange;
  padding: 15px;
  color: white;
  display:flex;
  justify-content:space-between;
}

.container { padding:20px; }

.grid { display:flex; flex-wrap:wrap; gap:10px; }

.card {
  background:white;
  padding:10px;
  width:180px;
  border-radius:10px;
}

.card img { width:100%; border-radius:8px; }

button { padding:6px; margin-top:5px; cursor:pointer; }

.adminPanel {
  display:none;
  background:white;
  padding:10px;
  margin-top:10px;
  border-radius:10px;
}

.hidden { display:none; }
</style>
</head>

<body>

<header>
  <h2>☀️ Sonechko Shop</h2>

  <div>
    <button onclick="googleLogin()">Google</button>
    <button onclick="toggleAdmin()">Admin</button>
    <button onclick="openCart()">🛒</button>
  </div>
</header>

<div class="container">

<h3 id="user">Не увійшли</h3>

<div class="adminPanel" id="adminPanel">
  <h3>🧑‍💼 Адмінка</h3>
  <input id="name" placeholder="Назва">
  <input id="price" placeholder="Ціна">
  <input id="img" placeholder="Фото URL">
  <button onclick="addProduct()">Додати товар</button>
</div>

<h3>🛍 Товари</h3>
<div class="grid" id="products"></div>

<h3>🛒 Кошик</h3>
<div id="cart"></div>

<button onclick="checkout()" style="background:green;color:white;">
💳 Оформити замовлення
</button>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import {
  getAuth,
  GoogleAuthProvider,
  signInWithPopup
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

import {
  getFirestore,
  collection,
  addDoc,
  getDocs
} from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyB2qAWXjhRsKASf9Urz_j3OtX_ERv9LKGk",
  authDomain: "sonechko-c1d59.firebaseapp.com",
  projectId: "sonechko-c1d59",
  storageBucket: "sonechko-c1d59.firebasestorage.app",
  messagingSenderId: "154000560138",
  appId: "1:154000560138:web:3150ce210a405435b58ff3",
  measurementId: "G-CHBK537FEV"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
const provider = new GoogleAuthProvider();

let user = null;
let cart = [];

// 🔐 ТІЛЬКИ ТИ (адмін email)
const ADMIN_EMAIL = "isoltis462@gmail.com";

window.googleLogin = async function() {
  const res = await signInWithPopup(auth, provider);
  user = res.user;

  document.getElementById("user").innerText =
    "👤 " + user.email;

  loadProducts();
};

window.toggleAdmin = function() {
  if (!user || user.email !== ADMIN_EMAIL) {
    alert("⛔ Нема доступу");
    return;
  }

  const panel = document.getElementById("adminPanel");
  panel.style.display = panel.style.display === "block" ? "none" : "block";
};

window.addProduct = async function() {
  await addDoc(collection(db, "products"), {
    name: name.value,
    price: price.value,
    img: img.value
  });

  loadProducts();
};

async function loadProducts() {
  const snap = await getDocs(collection(db, "products"));
  const box = document.getElementById("products");

  box.innerHTML = "";

  snap.forEach(d => {
    const p = d.data();

    box.innerHTML += `
      <div class="card">
        <img src="${p.img}">
        <h3>${p.name}</h3>
        <p>${p.price} грн</p>
        <button onclick="addToCart('${p.name}', ${p.price})">
          Купити
        </button>
      </div>
    `;
  });
}

window.addToCart = function(name, price) {
  cart.push({name, price});
  renderCart();
};

function renderCart() {
  const box = document.getElementById("cart");
  box.innerHTML = "";

  cart.forEach(i => {
    box.innerHTML += `<p>${i.name} - ${i.price} грн</p>`;
  });
}

window.openCart = function() {
  alert("Кошик відкритий нижче ↓");
};

window.checkout = function() {
  if (!user) {
    alert("Увійди спочатку");
    return;
  }

  if (cart.length === 0) {
    alert("Кошик пустий");
    return;
  }

  // 💳 РЕАЛЬНА ОПЛАТА (заглушка під Stripe/LiqPay)
  alert("💳 Оплата успішна (DEMO)\nДалі можна підключити Stripe або LiqPay");

  cart = [];
  renderCart();
};

</script>

</body>
</html>
