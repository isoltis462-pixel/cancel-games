<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PureDrop | Geometry Dash Edition</title>
    <style>
        :root {
            --bg: #1c1c1e;
            --card: #2c2c2e;
            --green: #57AF20;
            --white: #ffffff;
            --grey-text: #a0a0a0;
            --border: #3a3a3c;
        }

        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* --- СТИЛІ ІНТРО --- */
        #intro-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: var(--bg);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }

        .intro-logo {
            font-size: 40px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            animation: pulse 1.5s infinite ease-in-out;
        }

        .intro-logo span { color: var(--green); }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 0.8; }
        }

        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(87, 175, 32, 0.2);
            border-top: 3px solid var(--green);
            border-radius: 50%;
            margin-top: 20px;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* --- ОСНОВНИЙ КОНТЕНТ --- */
        header {
            background: var(--card);
            padding: 15px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-size: 22px; font-weight: 900; text-transform: uppercase; }
        .logo span { color: var(--green); }

        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px; padding: 15px;
        }

        .game-card {
            background: var(--card);
            border-radius: 20px;
            padding: 15px 5px;
            text-align: center;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 1px solid var(--border);
        }

        .game-card:hover { transform: scale(1.05); border-color: var(--green); }

        .game-icon-img {
            width: 55px; height: 55px;
            border-radius: 14px;
            margin-bottom: 8px;
        }

        .name-main { font-size: 11px; font-weight: bold; }

        /* СТОРІНКА ГРИ */
        .full-page {
            position: fixed;
            top: 0; left: 100%;
            width: 100%; height: 100%;
            background: var(--bg);
            z-index: 2000;
            transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
        }

        .full-page.active { left: 0; }

        .back-btn { padding: 20px; font-size: 18px; color: var(--green); cursor: pointer; font-weight: bold; }
        .content-padding { padding: 0 20px 60px 20px; }

        .app-header { display: flex; align-items: center; gap: 20px; margin-bottom: 25px; }
        #largeIconImg { width: 90px; height: 90px; border-radius: 22px; }
        .app-header h1 { margin: 0; font-size: 26px; }

        .tech-info {
            background: var(--card);
            border-radius: 15px;
            padding: 18px;
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            border: 1px solid var(--border);
        }

        .info-item { display: flex; flex-direction: column; }
        .info-label { font-size: 10px; color: var(--grey-text); text-transform: uppercase; margin-bottom: 4px; }
        .info-val { font-size: 13px; font-weight: bold; }

        .big-dl-btn {
            background: var(--green);
            color: white; border: none;
            width: 100%; padding: 20px;
            border-radius: 20px;
            font-size: 18px; font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(87, 175, 32, 0.2);
            margin-top: 30px;
        }
    </style>
</head>
<body>

    <!-- ЕКРАН ІНТРО -->
    <div id="intro-screen">
        <div class="intro-logo">PURE<span>DROP</span></div>
        <div class="loader"></div>
    </div>

    <header><div class="logo">PURE<span>DROP</span></div></header>

    <div class="grid">
        <div class="game-card" onclick="openGame()">
            <img src="Geometry_Dash_logo.webp" class="game-icon-img" alt="Geometry Dash">
            <div class="name-main">Geometry Dash</div>
        </div>
        <div class="game-card">
            <div style="font-size: 40px; margin-bottom: 8px;">🏎️</div>
            <div class="name-main">Ukraine GTA</div>
        </div>
        <div class="game-card">
            <div style="font-size: 40px; margin-bottom: 8px;">🚓</div>
            <div class="name-main">NPU Sim</div>
        </div>
    </div>

    <div id="fullPage" class="full-page">
        <div class="back-btn" onclick="closeGame()">← Назад</div>
        <div class="content-padding">
            <div class="app-header">
                <img id="largeIconImg" src="Geometry_Dash_logo.webp" alt="Logo">
                <div>
                    <h1>Geometry Dash</h1>
                    <span style="color: var(--green); font-size: 12px; font-weight: bold;">⭐ Premium Unlocked</span>
                </div>
            </div>

            <div class="tech-info">
                <div class="info-item"><span class="info-label">Разработчик</span><span class="info-val">RobTop Games</span></div>
                <div class="info-item"><span class="info-label">Версия</span><span class="info-val">2.2.13</span></div>
                <div class="info-item"><span class="info-label">Обновлено</span><span class="info-val">4 мая 2026</span></div>
                <div class="info-item"><span class="info-label">Размер</span><span class="info-val">85.4 МБ</span></div>
            </div>

            <!-- Твоє пряме посилання -->
            <a href="https://www.dropbox.com/scl/fi/cys98ejzhcyiui2yyt0a1/APK-Geometry-Dash-PURE_DROP.apk?rlkey=x9t2scdpbudz48nc5wb01y085&st=y881ck8w&dl=1">
                <button class="big-dl-btn">СКАЧАТЬ APK</button>
            </a>
        </div>
    </div>

    <script>
        // ЛОГІКА ІНТРО: приховуємо через 2 секунди
        window.addEventListener('load', () => {
            setTimeout(() => {
                const intro = document.getElementById('intro-screen');
                intro.style.opacity = '0';
                intro.style.visibility = 'hidden';
            }, 2000); 
        });

        function openGame() {
            document.getElementById('fullPage').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeGame() {
            document.getElementById('fullPage').classList.remove('active');
            document.body.style.overflow = 'auto';
        }
    </script>
</body>
</html>
