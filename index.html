<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>3D Crowd Runner</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Arial', sans-serif; }
        #menu, #ui, #game-over { position: fixed; z-index: 10; color: white; text-align: center; width: 100%; }
        #menu { inset: 0; background: rgba(0,0,0,0.8); display: flex; flex-direction: column; justify-content: center; align-items: center; }
        #ui { top: 20px; font-size: 24px; pointer-events: none; }
        #game-over { display: none; inset: 0; background: rgba(255,0,0,0.4); flex-direction: column; justify-content: center; align-items: center; }
        .btn { padding: 15px 40px; font-size: 20px; background: #2ecc71; border: none; color: white; border-radius: 30px; cursor: pointer; margin-top: 20px; text-transform: uppercase; font-weight: bold; }
    </style>
</head>
<body>

    <div id="ui">Натовп: <span id="count">1</span></div>

    <div id="menu">
        <h1>CROWD RUNNER 3D</h1>
        <button class="btn" onclick="startGame()">Старт</button>
    </div>

    <div id="game-over">
        <h1 id="result">КІНЕЦЬ ГРИ</h1>
        <button class="btn" onclick="location.reload()">Спробувати знову</button>
    </div>

    <script type="module">
        import * as THREE from 'https://cdn.skypack.dev/three@0.132.2';

        let scene, camera, renderer, playerGroup;
        let crowd = [];
        let gates = [];
        let gameActive = false;
        let speed = 0.15;
        let score = 1;

        function init() {
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x87CEEB);
            scene.fog = new THREE.Fog(0x87CEEB, 10, 30);

            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.set(0, 5, 8);
            camera.lookAt(0, 0, 0);

            renderer = new THREE.WebGLRenderer({ antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            document.body.appendChild(renderer.domElement);

            // Світло
            const light = new THREE.DirectionalLight(0xffffff, 1);
            light.position.set(5, 10, 5);
            scene.add(light);
            scene.add(new THREE.AmbientLight(0x404040));

            // Дорога
            const roadGeo = new THREE.PlaneGeometry(10, 200);
            const roadMat = new THREE.MeshPhongMaterial({ color: 0xcccccc });
            const road = new THREE.Mesh(roadGeo, roadMat);
            road.rotation.x = -Math.PI / 2;
            scene.add(road);

            // Група гравця
            playerGroup = new THREE.Group();
            scene.add(playerGroup);
            addToCrowd(1);

            spawnGates();
            animate();
        }

        function addToCrowd(amount) {
            const geo = new THREE.SphereGeometry(0.3, 16, 16);
            const mat = new THREE.MeshPhongMaterial({ color: 0x2481cc });
            
            for(let i = 0; i < amount; i++) {
                if (crowd.length >= 50) break; // Обмеження для стабільності
                const unit = new THREE.Mesh(geo, mat);
                unit.position.set((Math.random() - 0.5) * 1.5, 0.3, (Math.random() - 0.5) * 1.5);
                playerGroup.add(unit);
                crowd.push(unit);
            }
            score = crowd.length;
            document.getElementById('count').innerText = score;
        }

        function spawnGates() {
            for(let i = 1; i < 15; i++) {
                const isPlus = Math.random() > 0.5;
                const value = isPlus ? 5 : 2;
                
                const geo = new THREE.BoxGeometry(10, 4, 0.2);
                const mat = new THREE.MeshPhongMaterial({ 
                    color: isPlus ? 0x2ecc71 : 0x3498db, 
                    transparent: true, 
                    opacity: 0.6 
                });
                const gate = new THREE.Mesh(geo, mat);
                gate.position.set(0, 2, -i * 20);
                gate.userData = { type: isPlus ? 'plus' : 'mult', value: value, passed: false };
                scene.add(gate);
                gates.push(gate);
            }
        }

        // Керування
        let targetX = 0;
        window.addEventListener('mousemove', (e) => {
            targetX = (e.clientX / window.innerWidth - 0.5) * 8;
        });
        window.addEventListener('touchmove', (e) => {
            targetX = (e.touches[0].clientX / window.innerWidth - 0.5) * 8;
        });

        window.startGame = () => {
            document.getElementById('menu').style.display = 'none';
            gameActive = true;
        };

        function animate() {
            requestAnimationFrame(animate);
            if(gameActive) {
                // Рух вперед
                playerGroup.position.z -= speed;
                camera.position.z -= speed;

                // Рух вправо-вліво
                playerGroup.position.x += (targetX - playerGroup.position.x) * 0.1;

                // Перевірка воріт
                gates.forEach(gate => {
                    if(!gate.userData.passed && Math.abs(playerGroup.position.z - gate.position.z) < 0.5) {
                        gate.userData.passed = true;
                        if(gate.userData.type === 'plus') addToCrowd(gate.userData.value);
                        else addToCrowd(crowd.length * (gate.userData.value - 1));
                    }
                });

                // Кінець дистанції
                if(playerGroup.position.z < -280) {
                    gameActive = false;
                    document.getElementById('game-over').style.display = 'flex';
                    document.getElementById('result').innerText = "ПЕРЕМОГА! Твій натовп: " + crowd.length;
                }
            }
            renderer.render(scene, camera);
        }

        init();
    </script>
</body>
</html>
