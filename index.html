<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Сонечко — Bento Store</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #f8fafc; --card: #ffffff; --text: #0f172a; --accent: #f59e0b; --border: #e2e8f0; }
        .dark-mode { --bg: #020617; --card: #0f172a; --text: #f1f5f9; --accent: #fbbf24; --border: #1e293b; }
        
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.4s; overflow-x: hidden; }
        .bento-card { background: var(--card); border: 1px solid var(--border); border-radius: 32px; box-shadow: 0 4px 20px rgba(0,0,0,0.03); transition: 0.3s; }
        .bento-card:hover { transform: translateY(-4px); box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 5000; display: none; padding: 20px; overflow-y: auto; }
        .admin-text { font-size: 10px; text-transform: uppercase; letter-spacing: 0.5px; opacity: 0.6; }
        
        /* Анімації */
        @keyframes slideIn { from { transform: translateX(100%); } to { transform: translateX(0); } }
        .page-active { display: block; animation: slideIn 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        
        .profile-img { width: 100px; height: 100px; border-radius: 40px; object-cover; border: 4px solid var(--accent); }
    </style>
</head>
<body>

    <!-- ГОЛОВНИЙ ЕКРАН -->
    <div id="mainPage" class="p-4 md:p-8">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-800 tracking-tighter">СОНЕЧКО<span class="text-amber-500">.</span></h1>
                <p class="text-xs opacity-50 font-bold uppercase">Магазин в м. Бортятин</p>
            </div>
            <div class="flex gap-3">
                <button onclick="openPage('settingsPage')" class="bento-card p-4">⚙️</button>
                <button onclick="openPage('profilePage')" id="headerAvatar" class="bento-card p-2 w-14 h-14 flex items-center justify-center overflow-hidden">👤</button>
            </div>
        </header>

        <div class="flex flex-col md:flex-row gap-6">
            <!-- ЛІВА ПАНЕЛЬ: ФІЛЬТРИ -->
            <aside class="md:w-64 space-y-6">
                <div class="bento-card p-6">
                    <h3 class="font-bold mb-4">Фільтри</h3>
                    <div class="space-y-3 text-sm">
                        <label class="flex items-center gap-2"><input type="checkbox" class="accent-amber-500"> В наявності</label>
                        <label class="flex items-center gap-2"><input type="checkbox" class="accent-amber-500"> Акція</label>
                        <hr class="border-border">
                        <p class="text-xs opacity-50 uppercase">Категорії</p>
                        <div class="flex flex-wrap gap-2">
                            <span class="bg-amber-100 dark:bg-amber-900/30 text-amber-600 px-3 py-1 rounded-full text-xs font-bold cursor-pointer">Ігри</span>
                            <span class="bg-slate-100 dark:bg-slate-800 px-3 py-1 rounded-full text-xs font-bold cursor-pointer">Техніка</span>
                        </div>
                    </div>
                </div>
            </aside>

            <!-- ЦЕНТР: ПОШУК ТА ТОВАРИ -->
            <div class="flex-1 space-y-6">
                <input type="text" id="mainSearch" oninput="renderStore()" placeholder="Пошук товарів..." class="bento-card w-full p-6 outline-none text-lg">
                <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
                    <!-- Товари тут -->
                </div>
            </div>
        </div>
    </div>

    <!-- СТОРІНКА ПРОФІЛЮ -->
    <div id="profilePage" class="modal">
        <div class="max-w-md mx-auto py-10">
            <button onclick="closeAll()" class="mb-8 font-bold opacity-50">← НАЗАД</button>
            <div class="bento-card p-8 text-center space-y-6">
                <div class="relative inline-block">
                    <img id="userPhoto" src="https://via.placeholder.com/100" class="profile-img mx-auto">
                    <input type="file" id="photoUpload" class="hidden" onchange="uploadPhoto(this)">
                    <button onclick="document.getElementById('photoUpload').click()" class="absolute bottom-0 right-0 bg-amber-500 p-2 rounded-full text-white shadow-lg">📸</button>
                </div>
                <div class="space-y-4">
                    <input type="text" id="userName" placeholder="Ваше ім'я" class="bento-card w-full p-4 text-center">
                    <input type="text" id="userPhone" placeholder="+380..." class="bento-card w-full p-4 text-center">
                    <button onclick="saveProfile()" class="w-full bg-amber-500 p-5 rounded-3xl font-bold text-white">ЗБЕРЕГТИ ПРОФІЛЬ</button>
                </div>
            </div>
        </div>
    </div>

    <!-- СТОРІНКА НАЛАШТУВАНЬ ТА МОВ -->
    <div id="settingsPage" class="modal">
        <div class="max-w-2xl mx-auto py-10">
            <button onclick="closeAll()" class="mb-8 font-bold opacity-50">← НАЗАД</button>
            
            <div class="space-y-6">
                <div class="bento-card p-6 flex justify-between items-center">
                    <span class="font-bold">Тема оформлення</span>
                    <button onclick="toggleTheme()" class="bg-slate-200 dark:bg-slate-800 p-3 rounded-2xl" id="themeLabel">🌙 Темна</button>
                </div>

                <div class="bento-card p-6">
                    <h3 class="font-bold mb-4">Вибір мови</h3>
                    <input type="text" id="langSearch" oninput="filterLangs()" placeholder="Пошук мови (напр. Ukraine)..." class="w-full p-4 mb-4 bg-slate-50 dark:bg-slate-900 rounded-2xl outline-none border border-border">
                    <div id="langList" class="grid grid-cols-2 gap-2 max-h-60 overflow-y-auto pr-2">
                        <!-- Мови тут -->
                    </div>
                </div>

                <!-- ПРИХОВАНА АДМІНКА -->
                <div class="pt-20 text-center">
                    <button onclick="openAdmin()" class="admin-text">System v2.4.1 Admin Access</button>
                </div>
            </div>
        </div>
    </div>

    <!-- СТОРІНКА ТОВАРУ (ДЕТАЛЬНА) -->
    <div id="productDetail" class="modal">
        <div id="detailContent"></div>
    </div>

    <!-- АДМІН ПАНЕЛЬ -->
    <div id="adminPanel" class="modal" style="z-index: 9999;">
        <div class="max-w-xl mx-auto">
            <h2 class="admin-text mb-10 text-center">Cloud Database Management</h2>
            <div class="bento-card p-6 space-y-4">
                <input type="text" id="adName" class="admin-text w-full p-4 bento-card" placeholder="Назва">
                <input type="text" id="adPrice" class="admin-text w-full p-4 bento-card" placeholder="Ціна">
                <textarea id="adDesc" class="admin-text w-full p-4 bento-card h-20" placeholder="Опис"></textarea>
                <div class="flex gap-2">
                    <input type="text" id="adImg" class="admin-text flex-1 p-4 bento-card" placeholder="URL фото">
                    <button class="bg-slate-100 p-4 rounded-2xl text-xs" onclick="alert('Виберіть файл у майбутньому')">📁</button>
                </div>
                <button onclick="adminPublish()" class="w-full bg-black text-white p-5 rounded-3xl admin-text">Publish to Store</button>
            </div>
            <button onclick="toggleModal('adminPanel', false)" class="w-full mt-10 admin-text">Exit Terminal</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmCzZAEKq4BMo6eWAN96IawhF95cH1sHM",
            authDomain: "keysbrawl-c4ae6.firebaseapp.com",
            projectId: "keysbrawl-c4ae6",
            storageBucket: "keysbrawl-c4ae6.firebasestorage.app",
            messagingSenderId: "1090859079662",
            appId: "1:1090859079662:web:0fb901aee2e2d65c83a0ff"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let storeData = [];
        let languages = [
            {n: "Українська", c: "UA"}, {n: "English", c: "US"}, {n: "Deutsch", c: "DE"}, 
            {n: "Français", c: "FR"}, {n: "Español", c: "ES"}, {n: "Italiano", c: "IT"},
            {n: "Polski", c: "PL"}, {n: "日本語", c: "JP"}, {n: "한국어", c: "KR"}
        ];

        // --- ЛОГІКА СТОРІНОК ---
        window.openPage = (id) => {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('page-active'));
            document.getElementById(id).classList.add('page-active');
            document.body.style.overflow = 'hidden';
        };
        window.closeAll = () => {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('page-active'));
            document.body.style.overflow = 'auto';
        };

        // --- ПРОФІЛЬ ---
        window.saveProfile = () => {
            localStorage.setItem('sun_name', document.getElementById('userName').value);
            localStorage.setItem('sun_phone', document.getElementById('userPhone').value);
            alert("Профіль оновлено!");
        };
        window.uploadPhoto = (input) => {
            const reader = new FileReader();
            reader.onload = (e) => {
                document.getElementById('userPhoto').src = e.target.result;
                localStorage.setItem('sun_photo', e.target.result);
                updateHeaderAvatar();
            };
            reader.readAsDataURL(input.files[0]);
        };
        function updateHeaderAvatar() {
            const photo = localStorage.getItem('sun_photo');
            if(photo) document.getElementById('headerAvatar').innerHTML = `<img src="${photo}" class="w-full h-full object-cover">`;
        }

        // --- МОВИ ---
        window.filterLangs = () => {
            const list = document.getElementById('langList');
            const search = document.getElementById('langSearch').value.toLowerCase();
            list.innerHTML = '';
            languages.filter(l => l.n.toLowerCase().includes(search)).forEach(l => {
                list.innerHTML += `<button class="p-3 bg-slate-50 dark:bg-slate-900 rounded-xl text-left text-sm flex gap-2">
                    <img src="https://flagcdn.com/w20/${l.c.toLowerCase()}.png" class="h-4 my-auto"> ${l.n}
                </button>`;
            });
        };

        // --- МАГАЗИН ---
        onSnapshot(query(collection(db, "sonechko_bento"), orderBy("date", "desc")), (snap) => {
            storeData = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderStore();
        });

        window.renderStore = () => {
            const grid = document.getElementById('productGrid');
            const search = document.getElementById('mainSearch').value.toLowerCase();
            grid.innerHTML = '';
            storeData.filter(p => p.name.toLowerCase().includes(search)).forEach(p => {
                grid.innerHTML += `
                    <div class="bento-card p-4 cursor-pointer" onclick="viewDetail('${p.id}')">
                        <img src="${p.img}" class="w-full h-48 object-cover rounded-2xl mb-4">
                        <h4 class="font-bold text-sm">${p.name}</h4>
                        <div class="flex justify-between items-center mt-2">
                            <span class="text-amber-500 font-bold">${p.price} грн</span>
                            <span class="text-[10px] opacity-40 uppercase font-black">Купити →</span>
                        </div>
                    </div>`;
            });
        };

        window.viewDetail = (id) => {
            const p = storeData.find(x => x.id === id);
            document.getElementById('detailContent').innerHTML = `
                <div class="max-w-4xl mx-auto py-10">
                    <button onclick="closeAll()" class="mb-8 font-bold opacity-50">← ЗАКРИТИ</button>
                    <div class="grid md:grid-cols-2 gap-10">
                        <div class="bento-card p-4"><img src="${p.img}" class="w-full rounded-2xl shadow-xl"></div>
                        <div class="space-y-6">
                            <h2 class="text-4xl font-black italic">${p.name}</h2>
                            <p class="text-3xl font-bold text-amber-500">${p.price} грн</p>
                            <p class="opacity-60 leading-relaxed">${p.desc}</p>
                            <div class="bento-card p-6 bg-slate-50 dark:bg-slate-900">
                                <h4 class="font-bold mb-4 text-xs opacity-50">ВІДГУКИ (14)</h4>
                                <p class="text-sm">"Крутий товар, все прийшло швидко!" — Іван</p>
                            </div>
                            <a href="https://t.me/leytenant_ukra" class="block w-full bg-amber-500 text-white text-center py-6 rounded-[30px] font-black text-lg shadow-xl">ЗАМОВИТИ ЗАРАЗ</a>
                        </div>
                    </div>
                </div>`;
            openPage('productDetail');
        };

        // --- АДМІНКА ---
        window.openAdmin = () => {
            if(prompt("Enter Terminal Pass:") === "254") openPage('adminPanel');
        };
        window.adminPublish = async () => {
            await addDoc(collection(db, "sonechko_bento"), {
                name: document.getElementById('adName').value,
                price: document.getElementById('adPrice').value,
                desc: document.getElementById('adDesc').value,
                img: document.getElementById('adImg').value,
                date: Date.now()
            });
            alert("Data Uploaded.");
        };

        // Ініціалізація теми та профілю
        window.toggleTheme = () => {
            document.body.classList.toggle('dark-mode');
            localStorage.setItem('sun_theme', document.body.classList.contains('dark-mode') ? 'dark' : 'light');
        };
        if(localStorage.getItem('sun_theme') === 'dark') document.body.classList.add('dark-mode');
        
        document.getElementById('userName').value = localStorage.getItem('sun_name') || '';
        document.getElementById('userPhone').value = localStorage.getItem('sun_phone') || '';
        document.getElementById('userPhoto').src = localStorage.getItem('sun_photo') || 'https://via.placeholder.com/100';
        updateHeaderAvatar();
        filterLangs();
    </script>
</body>
</html>
