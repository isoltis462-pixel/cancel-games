<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Belegram Desktop v4</title>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-storage-compat.js"></script>
    <style>
        :root {
            --bg-main: #0f1621;
            --bg-side: #17212b;
            --bg-active: #242f3d;
            --accent: #2481cc;
            --text: #f5f5f5;
            --gray: #708499;
        }

        body, html { margin: 0; padding: 0; height: 100%; background: var(--bg-main); color: var(--text); font-family: 'Open Sans', sans-serif; overflow: hidden; }
        
        .wrapper { display: flex; height: 100vh; width: 100vw; }

        /* Ліва панель іконок (як на скріншоті) */
        .nav-column { width: 70px; background: var(--bg-side); display: flex; flex-direction: column; align-items: center; padding-top: 15px; gap: 20px; border-right: 1px solid #000; }
        .nav-item { width: 50px; height: 50px; border-radius: 12px; display: flex; align-items: center; justify-content: center; cursor: pointer; color: var(--gray); font-size: 20px; }
        .nav-item.active { background: var(--accent); color: white; }

        /* Список чатів */
        .chats-column { width: 300px; background: var(--bg-side); border-right: 1px solid #0b1118; display: flex; flex-direction: column; }
        
        /* Основне вікно чату */
        .chat-area { flex: 1; display: flex; flex-direction: column; background: #0e1621 url('https://user-images.githubusercontent.com/15075759/28719144-86dc0f70-73b1-11e7-911d-60d70fcded21.png'); background-blend-mode: overlay; }
        
        .chat-header { height: 56px; background: var(--bg-side); display: flex; align-items: center; padding: 0 20px; justify-content: space-between; border-bottom: 1px solid #0b1118; }

        .messages { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 8px; }
        
        /* Повідомлення */
        .msg { max-width: 80%; padding: 8px 15px; border-radius: 12px; position: relative; font-size: 15px; }
        .msg.sent { align-self: flex-start; background: var(--bg-active); border-bottom-left-radius: 2px; }
        .msg.received { align-self: flex-end; background: #2b5278; border-bottom-right-radius: 2px; }
        .msg img { max-width: 100%; border-radius: 8px; }
        .msg video.circle { width: 200px; height: 200px; border-radius: 50%; object-fit: cover; }

        /* Панель вводу */
        .input-panel { padding: 10px 20px; background: var(--bg-side); display: flex; align-items: center; gap: 15px; }
        .input-panel input { flex: 1; background: transparent; border: none; color: white; font-size: 16px; outline: none; }

        /* Модалки */
        #auth-overlay { position: fixed; inset: 0; background: var(--bg-main); z-index: 9999; display: flex; align-items: center; justify-content: center; }
        .auth-box { background: var(--bg-side); padding: 30px; border-radius: 15px; width: 350px; text-align: center; }
        .auth-box input { width: 100%; padding: 12px; margin: 10px 0; background: var(--bg-active); border: none; color: white; border-radius: 8px; }
        
        @media (max-width: 768px) {
            .nav-column, .chats-column { display: none; } /* Для простоти на мобілці показуємо тільки чат */
            .nav-column.mobile-show { display: flex; }
        }
    </style>
</head>
<body>

<div id="auth-overlay">
    <div class="auth-box">
        <h2 style="color:var(--accent)">Belegram</h2>
        <p>Введіть Email або номер</p>
        <input type="text" id="auth-login" placeholder="email@example.com">
        <input type="password" id="auth-pass" placeholder="Пароль">
        <button onclick="handleAuth()" style="width:100%; padding:12px; background:var(--accent); border:none; color:white; border-radius:8px; cursor:pointer;">Продовжити</button>
    </div>
</div>

<div class="wrapper">
    <div class="nav-column">
        <div class="nav-item active">💬</div>
        <div class="nav-item">👤</div>
        <div class="nav-item">📢</div>
        <div class="nav-item" onclick="showSettings()">⚙️</div>
    </div>

    <div class="chats-column">
        <div style="padding: 15px;"><input type="text" placeholder="Пошук" style="width:100%; background:var(--bg-active); border:none; padding:8px; border-radius:8px; color:white;"></div>
        <div id="chat-list"></div>
    </div>

    <div class="chat-area">
        <div class="chat-header">
            <div id="active-user-info"><b>Оберіть чат</b></div>
            <div style="display:flex; gap:15px; color:var(--gray)">
                <span onclick="makeCall()" style="cursor:pointer">📞</span>
                <span style="cursor:pointer">🔍</span>
            </div>
        </div>
        <div class="messages" id="msg-container"></div>
        <div class="input-panel">
            <span onclick="sendUrlPhoto()" style="cursor:pointer; font-size:20px;">🔗</span>
            <input type="text" id="m-input" placeholder="Напишіть повідомлення...">
            <span id="record-btn" onmousedown="startVoice()" onmouseup="stopVoice()" style="cursor:pointer; font-size:20px;">🎤</span>
            <span onclick="sendMsg()" style="color:var(--accent); font-size:20px; cursor:pointer;">➤</span>
        </div>
    </div>
</div>

<script>
    // Ініціалізація Firebase (використовуй свій Config)
    const firebaseConfig = {
        apiKey: "AIzaSyAmCzZAEKq4BMo6eWAN96IawhF95cH1sHM",
        authDomain: "keysbrawl-c4ae6.firebaseapp.com",
        projectId: "keysbrawl-c4ae6",
        storageBucket: "keysbrawl-c4ae6.firebasestorage.app",
        messagingSenderId: "1090859079662",
        appId: "1:1090859079662:web:932bf6463cb0601083a0ff"
    };
    firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();
    const db = firebase.firestore();
    const storage = firebase.storage();

    let currentChatId = null;
    let mediaRecorder;
    let audioChunks = [];

    // Реєстрація / Вхід
    async function handleAuth() {
        const email = document.getElementById('auth-login').value;
        const pass = document.getElementById('auth-pass').value;
        try {
            await auth.signInWithEmailAndPassword(email, pass);
        } catch(e) {
            await auth.createUserWithEmailAndPassword(email, pass);
            alert("Акаунт створено!");
        }
    }

    auth.onAuthStateChanged(u => {
        if(u) {
            document.getElementById('auth-overlay').style.display = 'none';
            loadChats();
        }
    });

    // Фото через URL
    function sendUrlPhoto() {
        const url = prompt("Вставте URL картинки:");
        if(url && currentChatId) {
            pushMsg({ type: 'image', content: url });
        }
    }

    // Голосові (спрощена логіка)
    async function startVoice() {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        mediaRecorder = new MediaRecorder(stream);
        mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
        mediaRecorder.start();
        document.getElementById('record-btn').style.color = 'red';
    }

    async function stopVoice() {
        mediaRecorder.stop();
        document.getElementById('record-btn').style.color = 'var(--gray)';
        mediaRecorder.onstop = async () => {
            const blob = new Blob(audioChunks, { type: 'audio/webm' });
            const ref = storage.ref(`voice/${Date.now()}.webm`);
            await ref.put(blob);
            const url = await ref.getDownloadURL();
            pushMsg({ type: 'voice', content: url });
            audioChunks = [];
        };
    }

    // Функція дзвоника (заглушка, бо потребує WebRTC серверов)
    function makeCall() {
        alert("Виклик користувачу... (Потрібно налаштувати Signaling Server для WebRTC)");
    }

    function pushMsg(data) {
        const room = [auth.currentUser.uid, currentChatId].sort().join('_');
        db.collection('chats').doc(room).collection('m').add({
            ...data,
            uid: auth.currentUser.uid,
            time: Date.now()
        });
    }

    function loadChats() {
        db.collection('users').onSnapshot(s => {
            const list = document.getElementById('chat-list');
            list.innerHTML = "";
            s.forEach(doc => {
                if(doc.id === auth.currentUser.uid) return;
                const u = doc.data();
                list.innerHTML += `<div onclick="openChat('${doc.id}', '${u.name}')" style="padding:15px; cursor:pointer; border-bottom:1px solid #121922;"><b>${u.name}</b></div>`;
            });
        });
    }

    function openChat(id, name) {
        currentChatId = id;
        document.getElementById('active-user-info').innerHTML = `<b>${name}</b>`;
        const room = [auth.currentUser.uid, id].sort().join('_');
        db.collection('chats').doc(room).collection('m').orderBy('time').onSnapshot(s => {
            const container = document.getElementById('msg-container');
            container.innerHTML = "";
            s.forEach(doc => {
                const m = doc.data();
                const side = m.uid === auth.currentUser.uid ? 'sent' : 'received';
                let html = `<div class="msg ${side}">`;
                if(m.type === 'image') html += `<img src="${m.content}">`;
                else if(m.type === 'voice') html += `<audio src="${m.content}" controls></audio>`;
                else html += m.content;
                html += `</div>`;
                container.innerHTML += html;
            });
            container.scrollTop = container.scrollHeight;
        });
    }

    function sendMsg() {
        const val = document.getElementById('m-input').value;
        if(val && currentChatId) {
            pushMsg({ type: 'text', content: val });
            document.getElementById('m-input').value = "";
        }
    }
</script>

</body>
</html>
