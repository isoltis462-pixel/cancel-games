<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Сонечко Shop</title>

<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-auth.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js"></script>

<style>
body {
  margin:0;
  font-family: Arial;
  background: linear-gradient(120deg,#ffefba,#ffffff);
  animation: bg 10s infinite alternate;
}

@keyframes bg {
  from {filter:hue-rotate(0deg);}
  to {filter:hue-rotate(40deg);}
}

header {
  padding:20px;
  background:#ffcc00;
  display:flex;
  justify-content:space-between;
  align-items:center;
  animation: slideDown 1s;
}

@keyframes slideDown {
  from {transform:translateY(-100px); opacity:0;}
  to {transform:translateY(0); opacity:1;}
}

button {
  padding:10px;
  border:none;
  cursor:pointer;
  border-radius:10px;
  transition:0.3s;
}

button:hover {
  transform:scale(1.05);
}

.product {
  background:white;
  padding:15px;
  margin:10px;
  border-radius:15px;
  box-shadow:0 0 10px rgba(0,0,0,0.1);
  animation: fadeIn 1s;
}

@keyframes fadeIn {
  from {opacity:0; transform:scale(0.9);}
  to {opacity:1; transform:scale(1);}
}

#adminPanel {
  display:none;
  background:#fff;
  padding:20px;
}
</style>
</head>

<body>

<header>
<h2>🌞 Сонечко Shop</h2>
<div>
<button onclick="login()">Google Login</button>
<button onclick="logout()">Вийти</button>
</div>
</header>

<div id="user"></div>

<div id="products"></div>

<div id="adminPanel">
<h3>Адмін панель</h3>
<input id="name" placeholder="Назва товару">
<input id="price" placeholder="Ціна">
<button onclick="addProduct()">Додати</button>
</div>

<script>
// ===== FIREBASE CONFIG =====
const firebaseConfig = {
  apiKey: "AIzaSyB2qAWXjhRsKASf9Urz_j3OtX_ERv9LKGk",
  authDomain: "sonechko-c1d59.firebaseapp.com",
  projectId: "sonechko-c1d59",
};

firebase.initializeApp(firebaseConfig);

const auth = firebase.auth();
const db = firebase.firestore();

// ===== GOOGLE LOGIN =====
function login(){
  let provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider);
}

function logout(){
  auth.signOut();
}

// ===== USER STATE =====
auth.onAuthStateChanged(user=>{
  if(user){
    document.getElementById("user").innerHTML = "Вхід: " + user.email;

    // ADMIN ONLY
    if(user.email === "isoltis462@gmail.com"){
      document.getElementById("adminPanel").style.display = "block";
    }

  } else {
    document.getElementById("user").innerHTML = "Гість";
    document.getElementById("adminPanel").style.display = "none";
  }
});

// ===== ADD PRODUCT =====
function addProduct(){
  let name = document.getElementById("name").value;
  let price = document.getElementById("price").value;

  db.collection("products").add({
    name,
    price
  });

  alert("Додано!");
}

// ===== LOAD PRODUCTS =====
db.collection("products").onSnapshot(snap=>{
  let html = "";
  snap.forEach(doc=>{
    let p = doc.data();
    html += `
      <div class="product">
        <h3>${p.name}</h3>
        <p>${p.price} грн</p>
        <button onclick="buy('${p.name}',${p.price})">Купити</button>
      </div>
    `;
  });
  document.getElementById("products").innerHTML = html;
});

// ===== FAKE PAYMENT =====
function buy(name,price){
  alert("Оплата для: " + name + " = " + price + " грн\n(тут підключимо Stripe/LiqPay)");
}
</script>

</body>
</html>
