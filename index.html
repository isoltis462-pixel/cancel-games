<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PureDrop | Pro Market</title>
    <style>
        :root {
            --accent: #57AF20;
            --bg: #0b0b0c;
            --surface: #161618;
            --border: rgba(255,255,255,0.08);
            --text: #ffffff;
            --text-dim: #94949b;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; }

        /* HEADER */
        header { 
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(11,11,12,0.9); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .brand { font-size: 20px; font-weight: 900; }
        .brand span { color: var(--accent); }

        /* GRID */
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .app-card { background: var(--surface); border-radius: 24px; padding: 15px; border: 1px solid var(--border); text-align: center; }
        .app-card img { width: 80px; height: 80px; border-radius: 20px; object-fit: cover; margin-bottom: 10px; }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; transform: translateY(100%); transition: 0.4s; padding: 20px; overflow-y: auto; }
        .modal.active { transform: translateY(0); }
        .close-link { color: var(--accent); font-weight: bold; text-decoration: none; display: inline-block; margin-bottom: 20px; cursor: pointer; }

        /* GALLERY (Слайдер що гортається) */
        .gallery { 
            display: flex; gap: 12px; overflow-x: auto; margin: 20px -20px; padding: 0 20px; 
            scroll-snap-type: x mandatory; -webkit-overflow-scrolling: touch;
        }
        .gallery::-webkit-scrollbar { display: none; } /* Ховаємо полосу прокрутки */
        .gallery img { 
            height: 180px; border-radius: 14px; border: 1px solid var(--border); 
            scroll-snap-align: start; flex-shrink: 0;
        }

        /* КНОПКИ */
        .btn-group { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        .dl-btn { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 18px; font-weight: 800; font-size: 16px; cursor: pointer; }
        .site-btn { width: 100%; padding: 15px; background: transparent; color: white; border: 1px solid #333; border-radius: 18px; font-weight: 600; text-decoration: none; display: block; text-align: center; }

        /* ADMIN */
        #adminPanel { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .admin-input { width: 100%; background: #111; border: 1px solid #333; padding: 12px; border-radius: 12px; color: white; margin-bottom: 10px; }
    </style>
</head>
<body>

    <header>
        <div class="brand">PURE<span>DROP</span></div>
        <div style="font-size:12px; color:var(--accent)">ONLINE: 142</div>
    </header>

    <div class="main-grid" id="appGrid"></div>

    <div onclick="toggleAdmin(true)" style="text-align:center; padding:40px; opacity:0.1; font-size:10px;">[ CONSOLE_V8 ]</div>

    <!-- MODAL -->
    <div id="appModal" class="modal">
        <div class="close-link" onclick="closeApp()">✕ НАЗАД</div>
        <div id="modalBody"></div>
    </div>

    <!-- ADMIN -->
    <div id="adminPanel">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <b style="color:var(--accent)">ADMIN_PANEL</b>
            <button onclick="toggleAdmin(false)" style="background:red; color:white; border:none; border-radius:8px; padding:5px 15px;">EXIT</button>
        </div>

        <input type="text" id="addName" class="admin-input" placeholder="Назва гри">
        <input type="text" id="addIcon" class="admin-input" placeholder="URL Іконки (Аватарка)">
        <input type="text" id="addScreens" class="admin-input" placeholder="Скріншоти через кому (,)">
        <input type="text" id="addLink" class="admin-input" placeholder="Посилання на APK">
        <input type="text" id="addSite" class="admin-input" placeholder="Посилання на офіційний сайт">
        <textarea id="addDesc" class="admin-input" placeholder="Опис проєкту" style="height:80px"></textarea>
        
        <button onclick="saveData()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:12px; color:white; font-weight:bold;">ОПУБЛІКУВАТИ</button>
        
        <div id="adminList" style="margin-top:20px"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('pd_v8')) || [];

        function render() {
            const grid = document.getElementById('appGrid');
            grid.innerHTML = db.map(item => `
                <div class="app-card" onclick="openApp(${item.id})">
                    <img src="${item.icon}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/6831/6831000.png'">
                    <div style="font-weight:bold; font-size:14px;">${item.name}</div>
                </div>
            `).join('');

            document.getElementById('adminList').innerHTML = db.map(item => `
                <div style="display:flex; justify-content:space-between; padding:10px; border-bottom:1px solid #222; font-size:12px;">
                    <span>${item.name}</span>
                    <button onclick="deleteItem(${item.id})" style="color:red; background:none; border:none;">Видалити</button>
                </div>
            `).join('');
        }

        function saveData() {
            const name = document.getElementById('addName').value;
            if(!name) return alert("Введіть назву!");

            db.push({
                id: Date.now(),
                name: name,
                icon: document.getElementById('addIcon').value,
                screens: document.getElementById('addScreens').value.split(','),
                link: document.getElementById('addLink').value,
                site: document.getElementById('addSite').value,
                desc: document.getElementById('addDesc').value
            });

            localStorage.setItem('pd_v8', JSON.stringify(db));
            render();
            toggleAdmin(false);
            // Очистка
            ['addName','addIcon','addScreens','addLink','addSite','addDesc'].forEach(id => document.getElementById(id).value = '');
        }

        function openApp(id) {
            const item = db.find(i => i.id === id);
            const imgs = item.screens.map(s => s.trim() ? `<img src="${s.trim()}">` : '').join('');
            
            document.getElementById('modalBody').innerHTML = `
                <div style="text-align:center">
                    <img src="${item.icon}" style="width:110px; height:110px; border-radius:25px; border: 2px solid var(--accent); object-fit:cover;">
                    <h1 style="margin:15px 0 5px 0">${item.name}</h1>
                    
                    <div class="gallery">${imgs}</div>
                    
                    <div style="text-align:left; color:var(--text-dim); background:#1a1a1c; padding:18px; border-radius:20px; font-size:14px; line-height:1.6;">
                        ${item.desc || 'Опис відсутній...'}
                    </div>

                    <div class="btn-group">
                        <a href="${item.link}"><button class="dl-btn">ЗАВАНТАЖИТИ APK</button></a>
                        ${item.site ? `<a href="${item.site}" class="site-btn" target="_blank">ВІДВІДАТИ САЙТ ПРОЄКТУ</a>` : ''}
                    </div>
                </div>
            `;
            document.getElementById('appModal').classList.add('active');
        }

        function toggleAdmin(s) { document.getElementById('adminPanel').style.display = s ? 'flex' : 'none'; }
        function closeApp() { document.getElementById('appModal').classList.remove('active'); }
        function deleteItem(id) { if(confirm("Видалити?")) { db = db.filter(i => i.id !== id); localStorage.setItem('pd_v8', JSON.stringify(db)); render(); } }

        render();
    </script>
</body>
</html>
