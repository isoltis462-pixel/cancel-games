<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PureDrop | Pro Market</title>
    <style>
        :root {
            --accent: #57AF20;
            --bg: #0b0b0c;
            --surface: #161618;
            --border: rgba(255,255,255,0.08);
            --text: #ffffff;
            --text-dim: #94949b;
            --danger: #ff4d4d;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; outline: none; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 20px; }

        /* HEADER */
        header { 
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(11,11,12,0.9); backdrop-filter: blur(15px); 
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border);
        }
        .brand { font-size: 20px; font-weight: 900; letter-spacing: -0.5px; }
        .brand span { color: var(--accent); }

        /* GRID SYSTEM (Квадратні картки) */
        .main-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; 
        }
        .app-card { 
            background: var(--surface); border-radius: 24px; padding: 15px; 
            border: 1px solid var(--border); text-align: center; transition: 0.2s;
        }
        .app-card:active { transform: scale(0.95); }
        .app-card img { 
            width: 80px; height: 80px; border-radius: 20px; object-fit: cover; 
            margin-bottom: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }
        .app-card b { display: block; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .app-card span { font-size: 10px; color: var(--accent); font-weight: 800; text-transform: uppercase; }

        /* MODAL & GALLERY */
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; transform: translateY(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); overflow-y: auto; padding: 20px; }
        .modal.active { transform: translateY(0); }
        
        .gallery { display: flex; gap: 10px; overflow-x: auto; margin: 20px -20px; padding: 0 20px; scrollbar-width: none; }
        .gallery::-webkit-scrollbar { display: none; }
        .gallery img { height: 160px; border-radius: 14px; border: 1px solid var(--border); }

        /* ADMIN PANEL */
        #adminPanel { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .admin-input { width: 100%; background: #111; border: 1px solid #333; padding: 12px; border-radius: 12px; color: white; margin-bottom: 12px; font-size: 14px; }
        .admin-section { background: #111; padding: 15px; border-radius: 18px; margin-bottom: 15px; border: 1px solid #222; }
        
        /* CUSTOM NOTIFICATION */
        #toast { 
            position: fixed; bottom: -100px; left: 20px; right: 20px; 
            background: var(--accent); color: white; padding: 15px; 
            border-radius: 15px; text-align: center; font-weight: bold; 
            transition: 0.5s; z-index: 99999; box-shadow: 0 10px 30px rgba(87, 175, 32, 0.4);
        }

        .dl-btn { width: 100%; padding: 18px; background: var(--accent); color: white; border: none; border-radius: 18px; font-weight: 800; margin-top: 15px; }
        .closed-btn { width: 100%; padding: 18px; background: rgba(255, 77, 77, 0.1); color: var(--danger); border: 1px solid var(--danger); border-radius: 18px; font-weight: 800; margin-top: 15px; }
    </style>
</head>
<body>

    <div id="toast">Повідомлення</div>

    <header>
        <div class="brand">PURE<span>DROP</span></div>
        <div style="font-size:11px; color:var(--accent); font-weight:bold;">MODS_v7_STABLE</div>
    </header>

    <div class="main-grid" id="appGrid"></div>

    <div onclick="toggleAdmin(true)" style="text-align:center; padding:40px; opacity:0.1; font-size:10px;">[ ACCESS_CONSOLE ]</div>

    <!-- MODAL -->
    <div id="appModal" class="modal">
        <div onclick="closeApp()" style="color:var(--accent); font-weight:bold; margin-bottom:20px;">✕ НАЗАД</div>
        <div id="modalBody"></div>
    </div>

    <!-- ADMIN -->
    <div id="adminPanel">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <b style="color:var(--accent)">CORE_SYSTEM_ADMIN</b>
            <button onclick="toggleAdmin(false)" style="background:var(--danger); color:white; border:none; border-radius:8px; padding:5px 15px;">EXIT</button>
        </div>

        <div class="admin-section">
            <h4 style="margin:0 0 10px 0; font-size:12px; color:var(--text-dim)">СТВОРИТИ / РЕДАГУВАТИ ПОСТ</h4>
            <input type="text" id="addName" class="admin-input" placeholder="Назва гри">
            <input type="text" id="addIcon" class="admin-input" placeholder="URL іконки (фото 1:1)">
            <input type="text" id="addScreens" class="admin-input" placeholder="Скріншоти геймплея (через кому)">
            <input type="text" id="addLink" class="admin-input" placeholder="Посилання на APK">
            <textarea id="addDesc" class="admin-input" placeholder="Повний опис гри..." style="height:80px"></textarea>
            <button id="saveBtn" onclick="saveData()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:12px; color:white; font-weight:bold;">ОПУБЛІКУВАТИ</button>
        </div>

        <div class="admin-section" id="adminList"></div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('pd_v7')) || [];
        let editId = null;

        function showToast(text) {
            const t = document.getElementById('toast');
            t.innerText = text;
            t.style.bottom = '20px';
            setTimeout(() => { t.style.bottom = '-100px'; }, 3000);
        }

        function render() {
            const grid = document.getElementById('appGrid');
            grid.innerHTML = db.map(item => `
                <div class="app-card" onclick="openApp(${item.id})">
                    <img src="${item.icon}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/6831/6831000.png'">
                    <span>${item.status === 'active' ? item.type : 'CLOSED'}</span>
                    <b>${item.name}</b>
                </div>
            `).join('');

            const list = document.getElementById('adminList');
            list.innerHTML = db.map(item => `
                <div style="display:flex; justify-content:space-between; padding:10px 0; border-bottom:1px solid #222; font-size:12px;">
                    <span>${item.name}</span>
                    <div>
                        <button onclick="prepareEdit(${item.id})" style="color:var(--accent); background:none; border:none;">Ред.</button>
                        <button onclick="deleteItem(${item.id})" style="color:var(--danger); background:none; border:none; margin-left:10px;">Вид.</button>
                    </div>
                </div>
            `).join('');
        }

        function saveData() {
            const name = document.getElementById('addName').value;
            const link = document.getElementById('addLink').value;
            if(!name || !link) return showToast("⚠ Назва та посилання обов'язкові!");

            const obj = {
                id: editId || Date.now(),
                name: name,
                icon: document.getElementById('addIcon').value,
                screens: document.getElementById('addScreens').value.split(','),
                link: link,
                desc: document.getElementById('addDesc').value,
                type: 'game',
                status: 'active'
            };

            if(editId) {
                db = db.map(i => i.id === editId ? obj : i);
                editId = null;
                document.getElementById('saveBtn').innerText = "ОПУБЛІКУВАТИ";
            } else {
                db.push(obj);
            }

            localStorage.setItem('pd_v7', JSON.stringify(db));
            render();
            showToast("✅ Збережено успішно!");
            ['addName','addIcon','addScreens','addLink','addDesc'].forEach(id => document.getElementById(id).value = '');
        }

        function prepareEdit(id) {
            const item = db.find(i => i.id === id);
            document.getElementById('addName').value = item.name;
            document.getElementById('addIcon').value = item.icon;
            document.getElementById('addScreens').value = item.screens.join(',');
            document.getElementById('addLink').value = item.link;
            document.getElementById('addDesc').value = item.desc;
            editId = id;
            document.getElementById('saveBtn').innerText = "ОБНОВИТИ ДАНІ";
            window.scrollTo(0,0);
        }

        function openApp(id) {
            const item = db.find(i => i.id === id);
            const body = document.getElementById('modalBody');
            
            const imgs = item.screens.map(s => s.trim() ? `<img src="${s.trim()}" onerror="this.style.display='none'">` : '').join('');
            
            body.innerHTML = `
                <div style="text-align:center">
                    <img src="${item.icon}" style="width:100px; height:100px; border-radius:22px;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/6831/6831000.png'">
                    <h2 style="margin:10px 0 5px 0">${item.name}</h2>
                    <div class="gallery">${imgs}</div>
                    <div style="text-align:left; color:var(--text-dim); line-height:1.5; font-size:14px; background:#1a1a1c; padding:15px; border-radius:15px;">
                        ${item.desc || 'Опис відсутній...'}
                    </div>
                    ${item.status === 'active' 
                        ? `<a href="${item.link}"><button class="dl-btn">ЗАВАНТАЖИТИ APK</button></a>`
                        : `<button class="closed-btn">ГРУ ЗАКРИТО / ТИМЧАСОВО НЕДОСТУПНО</button>`}
                </div>
            `;
            document.getElementById('appModal').classList.add('active');
        }

        function toggleAdmin(s) { document.getElementById('adminPanel').style.display = s ? 'flex' : 'none'; }
        function closeApp() { document.getElementById('appModal').classList.remove('active'); }
        function deleteItem(id) { if(confirm("Видалити?")) { db = db.filter(i => i.id !== id); localStorage.setItem('pd_v7', JSON.stringify(db)); render(); } }

        render();
    </script>
</body>
</html>
