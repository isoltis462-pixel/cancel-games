<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Abs Workout Challenge</title>
    <style>
        :root { --blue-grad: linear-gradient(135deg, #1e40af, #3b82f6); --orange: #ff6d00; }
        body { background-color: #000; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 15px; display: flex; justify-content: center; }
        .phone-screen { width: 100%; max-width: 380px; background: #000; min-height: 90vh; border-radius: 35px; padding: 20px; box-sizing: border-box; }
        
        /* Хедер з вогнем */
        .streak-header { text-align: center; margin-bottom: 25px; }
        .fire-icon { font-size: 50px; display: block; animation: fire-glow 1s infinite alternate; }
        @keyframes fire-glow { from { transform: scale(1); filter: drop-shadow(0 0 5px #ff6d00); } to { transform: scale(1.1); filter: drop-shadow(0 0 15px #ff2200); } }
        .streak-txt { font-size: 22px; font-weight: 800; margin-top: 5px; }
        .reward { color: #4ade80; font-size: 14px; font-weight: bold; }

        /* Головна синя картка як на відео */
        .day-card { background: var(--blue-grad); border-radius: 25px; padding: 25px; margin-bottom: 25px; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        .day-card p { margin: 0; font-size: 14px; opacity: 0.9; text-transform: uppercase; }
        .day-card h1 { margin: 5px 0 20px 0; font-size: 32px; font-weight: 900; }
        .btn-start { background: #fff; color: #1e40af; border: none; padding: 12px 35px; border-radius: 30px; font-weight: 900; font-size: 16px; cursor: pointer; }

        /* Список вправ */
        .exercise-item { background: #1a1a1a; border-radius: 18px; padding: 15px; margin-bottom: 12px; display: flex; align-items: center; gap: 15px; }
        .ex-icon { width: 55px; height: 55px; background: #2a2a2a; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; }
        .ex-info { flex: 1; }
        .ex-info h4 { margin: 0; font-size: 17px; text-transform: uppercase; }
        .ex-info p { margin: 3px 0 0; color: #888; font-size: 14px; }

        /* Секція Таймера */
        .timer-ui { margin-top: 30px; text-align: center; border-top: 1px solid #222; padding-top: 20px; }
        #countdown { font-size: 65px; font-weight: 900; color: var(--orange); margin-bottom: 15px; font-family: monospace; }
        .btn-go { background: var(--orange); color: white; border: none; width: 100%; padding: 18px; border-radius: 20px; font-size: 22px; font-weight: 900; cursor: pointer; }
    </style>
</head>
<body>

<div class="phone-screen">
    <div class="streak-header">
        <span class="fire-icon">🔥</span>
        <div class="streak-txt">1 DAY STREAK</div>
        <div class="reward">ЦІЛЬ: 1000 ГРН</div>
    </div>

    <div class="day-card">
        <p>Day 1 • Beginner</p>
        <h1>ABS WORKOUT</h1>
        <button class="btn-start" onclick="alert('Приготуйся! Починаємо через 3.. 2.. 1..')">START</button>
    </div>

    <div class="exercise-list">
        <div class="exercise-item">
            <div class="ex-icon">🏃</div>
            <div class="ex-info"><h4>High Stepping</h4><p>00:30</p></div>
        </div>
        <div class="exercise-item">
            <div class="ex-icon">🧘</div>
            <div class="ex-info"><h4>Abdominal Crunches</h4><p>x 20</p></div>
        </div>
        <div class="exercise-item">
            <div class="ex-icon">🦶</div>
            <div class="ex-info"><h4>Heel Touch</h4><p>x 20</p></div>
        </div>
        <div class="exercise-item">
            <div class="ex-icon">🏔️</div>
            <div class="ex-info"><h4>Mountain Climber</h4><p>00:30</p></div>
        </div>
    </div>

    <div class="timer-ui">
        <div id="countdown">01:00</div>
        <button class="btn-go" onclick="startTimer()">GO!</button>
    </div>
</div><script>
    function startTimer() {
        let time = 60;
        const display = document.getElementById('countdown');
        const interval = setInterval(() => {
            time--;
            let sec = time < 10 ? '0' + time : time;
            display.textContent = "00:" + sec;
            if (time <= 0) {
                clearInterval(interval);
                display.textContent = "DONE!";
                alert("КРАСАВА! Ти зробив це! 1000 грн все ближче!");
            }
        }, 1000);
    }
</script>

</body>
</html>
