<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СОНЕЧКО ☀️ — MARKET PRO</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&family=Plus+Jakarta+Sans:wght@500;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #000000; --card: #f4f4f5; --accent: #facc15; }
        .dark-mode { --bg: #09090b; --text: #ffffff; --card: #18181b; --accent: #fbbf24; }
        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; overflow-x: hidden; margin: 0; }
        .unbounded { font-family: 'Unbounded', sans-serif; font-weight: 900; }

        /* РОЗМИТТЯ */
        #mainContent { transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        body.blur-active #mainContent { filter: blur(20px) scale(0.97); pointer-events: none; }

        /* ЗАВАНТАЖЕННЯ */
        #loader { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; transition: 1s; pointer-events: none; }
        .sun-spin { width: 80px; height: 80px; background: #facc15; border-radius: 50%; box-shadow: 0 0 50px #facc15; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.2); opacity: 0.7; } }

        /* ПАРОЛЬ НА ВХІД */
        #siteLock { position: fixed; inset: 0; z-index: 9000; background: rgba(0,0,0,0.8); backdrop-filter: blur(40px); display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .lock-card { background: var(--bg); p: 40px; border-radius: 40px; text-align: center; width: 320px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); border: 1px solid rgba(128,128,128,0.2); }

        /* TOAST */
        #toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-150px); background: #000; color: #fff; padding: 15px 35px; border-radius: 100px; font-weight: 800; z-index: 11000; transition: 0.5s; border: 2px solid var(--accent); }
        #toast.show { transform: translateX(-50%) translateY(0); }
        .dark-mode #toast { background: #fff; color: #000; }

        /* МЕНЮ */
        #sideMenu { position: fixed; top: 0; left: -100%; width: 300px; height: 100%; background: var(--bg); z-index: 9500; transition: 0.5s; padding: 40px; border-right: 1px solid rgba(128,128,128,0.2); }
        #sideMenu.open { left: 0; }

        .bento { background: var(--card); border-radius: 24px; transition: 0.3s; border: 1px solid rgba(128,128,128,0.1); }
        .modal { position: fixed; inset: 0; z-index: 9100; display: none; background: rgba(0,0,0,0.6); backdrop-filter: blur(15px); align-items: center; justify-content: center; padding: 20px; }
        .modal.active { display: flex; }
        
        .btn-main { background: #facc15 !important; color: #000 !important; font-weight: 800; border-radius: 18px; transition: 0.3s; cursor: pointer; border: none; padding: 16px; }
        .btn-main:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(250,204,21,0.3); }

        /* КАРТКА ТОВАРУ */
        #detailView { position: fixed; inset: 0; z-index: 9900; background: var(--bg); display: none; overflow-y: auto; padding: 40px 20px; }
        #detailView.active { display: block; animation: slideUp 0.4s ease; }
        @keyframes slideUp { from { transform: translateY(100%); } to { transform: translateY(0); } }
    </style>
</head>
<body id="body">

    <div id="toast">✅ Опубліковано!</div>

    <div id="loader">
        <div class="text-center">
            <div class="sun-spin mx-auto mb-6"></div>
            <h1 class="unbounded text-white text-3xl">СОНЕЧКО</h1>
        </div>
    </div>

    <div id="siteLock">
        <div class="lock-card">
            <h2 class="unbounded text-xl mb-4 text-[var(--text)]">ДОСТУП 🔒</h2>
            <input type="password" id="passIn" maxlength="4" placeholder="****" class="w-full p-4 bento text-center text-3xl font-black mb-6 outline-none border-2 border-yellow-400">
            <button onclick="unlockSite()" class="w-full btn-main uppercase">Увійти</button>
        </div>
    </div>

    <div id="mainContent">
        <header class="p-6 flex justify-between items-center max-w-7xl mx-auto">
            <button onclick="toggleMenu(true)" class="w-14 h-14 bento flex items-center justify-center text-2xl">☰</button>
            <h1 class="unbounded text-2xl text-yellow-500">СОНЕЧКО</h1>
            <div onclick="openPage('profilePage')" class="w-14 h-14 rounded-2xl bento overflow-hidden cursor-pointer">
                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="userAvatar" class="w-full h-full object-cover">
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-6 space-y-6">
            <div class="w-full h-40 rounded-[35px] bg-gradient-to-r from-yellow-400 to-orange-500 p-8 text-white flex items-center justify-between shadow-lg">
                <div>
                    <h2 class="text-3xl font-800 italic uppercase">Premium Store</h2>
                    <p class="font-bold opacity-80">Найкращі товари від Сонечка</p>
                </div>
                <div class="text-6xl hidden md:block">☀️</div>
            </div>

            <div class="flex gap-3 overflow-x-auto pb-2 no-scrollbar">
                <button class="bg-yellow-400 text-black px-6 py-3 rounded-2xl font-bold whitespace-nowrap" id="cat_all">Всі товари</button>
                <button class="bento px-6 py-3 font-bold whitespace-nowrap" id="cat_new">Новинки</button>
                <button class="bento px-6 py-3 font-bold whitespace-nowrap" id="cat_sale">Знижки</button>
                <button class="bento px-6 py-3 font-bold whitespace-nowrap" id="cat_top">Популярні</button>
            </div>

            <div class="bento p-2 flex items-center px-6">
                <span class="mr-3">🔍</span>
                <input type="text" id="search" oninput="renderItems()" placeholder="Я шукаю..." class="w-full p-4 bg-transparent outline-none font-bold">
            </div>

            <div id="itemGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        </main>
    </div>

    <div id="detailView">
        <button onclick="closeDetails()" class="mb-8 font-black text-yellow-500 text-lg uppercase">← Назад</button>
        <div id="detailContent" class="max-w-4xl mx-auto grid md:grid-cols-2 gap-10">
            </div>
    </div>

    <div id="sideMenu">
        <div class="flex justify-between items-center mb-12">
            <h2 class="unbounded text-xl">MENU</h2>
            <button onclick="toggleMenu(false)" class="text-2xl">✕</button>
        </div>
        <div class="space-y-6 font-black text-lg uppercase">
            <button onclick="openPage('profilePage')" class="block hover:text-yellow-500" id="m_prof">Профіль</button>
            <button onclick="openPage('settingsPage')" class="block hover:text-yellow-500" id="m_sett">Налаштування</button>
            <button onclick="askAdmin()" class="block text-red-500" id="m_adm">Адмін-панель</button>
        </div>
    </div>

    <div id="profilePage" class="modal">
        <div class="bg-[var(--bg)] p-10 rounded-[40px] w-full max-w-sm text-center bento">
            <div id="authBox">
                <h2 class="unbounded text-2xl mb-8">ВХІД</h2>
                <button onclick="login()" class="btn-main w-full flex items-center justify-center gap-3">
                    <img src="https://www.google.com/favicon.ico" class="w-5"> Google Login
                </button>
            </div>
            <button onclick="closeAll()" class="mt-8 opacity-40 font-bold uppercase" id="m_close">Закрити</button>
        </div>
    </div>

    <div id="settingsPage" class="modal">
        <div class="bg-[var(--bg)] p-10 rounded-[40px] w-full max-w-md bento">
            <h2 class="unbounded text-2xl mb-10 text-center">SETTINGS</h2>
            <div class="space-y-4">
                <div onclick="toggleMode()" class="bento p-6 flex justify-between items-center cursor-pointer">
                    <span class="font-bold" id="s_theme">Тема інтерфейсу</span>
                    <span id="themeIco">☀️</span>
                </div>
                <div class="bento p-6">
                    <span class="font-bold block mb-4" id="s_lang">Мова</span>
                    <div class="flex gap-2">
                        <button onclick="changeLang('UA')" class="bg-yellow-400 px-4 py-2 rounded-xl text-black font-black">UA</button>
                        <button onclick="changeLang('EN')" class="bg-gray-200 px-4 py-2 rounded-xl text-black font-black">EN</button>
                    </div>
                </div>
            </div>
            <button onclick="closeAll()" class="w-full mt-10 opacity-30 font-bold uppercase">Back</button>
        </div>
    </div>

    <div id="adminPage" class="modal">
        <div class="bg-[var(--bg)] p-8 rounded-[40px] w-full max-w-5xl max-h-[90vh] overflow-y-auto border-2 border-yellow-400">
            <div class="flex justify-between items-center mb-10">
                <h2 class="unbounded text-xl uppercase">Admin Dashboard</h2>
                <button onclick="closeAll()" class="text-red-500 font-black">EXIT</button>
            </div>
            <div class="grid lg:grid-cols-2 gap-10">
                <div class="space-y-4">
                    <p class="font-black uppercase opacity-40">Новий товар</p>
                    <input type="text" id="adTitle" placeholder="Назва" class="w-full p-4 bento outline-none">
                    <input type="number" id="adPrice" placeholder="Ціна" class="w-full p-4 bento outline-none">
                    <textarea id="adDesc" placeholder="Опис товару..." class="w-full p-4 bento outline-none h-32"></textarea>
                    <input type="file" id="adFile" class="hidden" onchange="previewImg(this)">
                    <button onclick="document.getElementById('adFile').click()" class="w-full p-4 border-2 border-dashed rounded-2xl font-bold opacity-30">ДОДАТИ ФОТО</button>
                    <button onclick="publishItem()" class="w-full btn-main uppercase">ОПУБЛІКУВАТИ ПОСТ</button>
                </div>
                <div>
                    <p class="font-black uppercase opacity-40 mb-4">Юзери (<span id="uCount">0</span>)</p>
                    <div class="space-y-4" id="userLists">
                        <div class="bento p-4">
                            <h3 class="text-[10px] font-black opacity-30 mb-2">АКТИВНІ</h3>
                            <div id="uActive" class="space-y-2 max-h-40 overflow-y-auto"></div>
                        </div>
                        <div class="bento p-4 border-red-500/20 border">
                            <h3 class="text-[10px] font-black text-red-500 mb-2">ЗАБАНЕНІ</h3>
                            <div id="uBanned" class="space-y-2 max-h-40 overflow-y-auto"></div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, where, updateDoc, doc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmCzZAEKq4BMo6eWAN96IawhF95cH1sHM",
            authDomain: "keysbrawl-c4ae6.firebaseapp.com",
            projectId: "keysbrawl-c4ae6",
            storageBucket: "keysbrawl-c4ae6.firebasestorage.app",
            messagingSenderId: "1090859079662",
            appId: "1:1090859079662:web:0fb901aee2e2d65c83a0ff"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let allItems = []; let currentImg = "";

        // ЗАВАНТАЖЕННЯ
        window.onload = () => setTimeout(() => {
            document.getElementById('loader').style.opacity = "0";
            setTimeout(() => document.getElementById('loader').style.display = "none", 1000);
        }, 2000);

        // ПАРОЛЬ НА ВХІД (2555)
        window.unlockSite = () => {
            if(document.getElementById('passIn').value === "2555") {
                document.getElementById('siteLock').style.display = "none";
                localStorage.setItem('site_pass', 'ok');
            } else alert("Невірно!");
        };
        if(localStorage.getItem('site_pass')) document.getElementById('siteLock').style.display = "none";

        // ТЕМА
        window.toggleMode = () => {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeIco').innerText = isDark ? "🌙" : "☀️";
        };
        if(localStorage.getItem('theme') === 'dark') toggleMode();

        // МОВИ (ПОВНИЙ ПЕРЕКЛАД)
        const langData = {
            UA: { cat: "Всі товари", prof: "Профіль", sett: "Налаштування", adm: "Адмін-панель", search: "Я шукаю...", close: "Закрити", s_t: "Тема інтерфейсу", s_l: "Мова" },
            EN: { cat: "All Products", prof: "Profile", sett: "Settings", adm: "Admin Panel", search: "Search...", close: "Close", s_t: "Interface Theme", s_l: "Language" }
        };
        window.changeLang = (l) => {
            const d = langData[l];
            document.getElementById('cat_all').innerText = d.cat;
            document.getElementById('m_prof').innerText = d.prof;
            document.getElementById('m_sett').innerText = d.sett;
            document.getElementById('m_adm').innerText = d.adm;
            document.getElementById('search').placeholder = d.search;
            document.getElementById('m_close').innerText = d.close;
            document.getElementById('s_theme').innerText = d.s_t;
            document.getElementById('s_lang').innerText = d.s_l;
            localStorage.setItem('lang', l);
        };
        if(localStorage.getItem('lang')) changeLang(localStorage.getItem('lang'));

        // АВТОРИЗАЦІЯ
        window.login = async () => {
            try {
                const res = await signInWithPopup(auth, provider);
                const u = res.user;
                const q = query(collection(db, "sonechko_users"), where("uid", "==", u.uid));
                const snap = await getDocs(q);
                if(snap.empty) await addDoc(collection(db, "sonechko_users"), { uid: u.uid, name: u.displayName, photo: u.photoURL, status: "active" });
                closeAll();
            } catch(e) { console.error(e); }
        };

        onAuthStateChanged(auth, (u) => {
            if(u) {
                document.getElementById('userAvatar').src = u.photoURL;
                document.getElementById('authBox').innerHTML = `
                    <img src="${u.photoURL}" class="w-24 h-24 rounded-full mx-auto mb-4 border-4 border-yellow-400">
                    <p class="font-black text-xl mb-6">${u.displayName}</p>
                    <button onclick="signOut(auth).then(()=>location.reload())" class="bg-red-500 text-white w-full p-4 rounded-2xl font-bold">ВИЙТИ</button>
                `;
            }
        });

        // МАГАЗИН (ОТРИМАННЯ)
        onSnapshot(query(collection(db, "sonechko_items"), orderBy("date", "desc")), (snap) => {
            allItems = snap.docs.map(d => ({id: d.id, ...d.data()}));
            renderItems();
        });

        window.renderItems = () => {
            const grid = document.getElementById('itemGrid');
            const val = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = '';
            allItems.filter(i => i.title.toLowerCase().includes(val)).forEach(i => {
                grid.innerHTML += `
                    <div class="bento p-3 cursor-pointer" onclick="viewDetail('${i.id}')">
                        <img src="${i.img}" class="w-full h-32 md:h-44 object-cover rounded-2xl mb-3">
                        <h4 class="font-black text-[10px] uppercase truncate">${i.title}</h4>
                        <p class="text-yellow-500 font-black text-lg">${i.price} грн</p>
                    </div>`;
            });
        };

        // ДЕТАЛІ ТОВАРУ
        window.viewDetail = (id) => {
            const item = allItems.find(i => i.id === id);
            document.getElementById('detailContent').innerHTML = `
                <img src="${item.img}" class="w-full rounded-[40px] shadow-2xl">
                <div>
                    <h2 class="unbounded text-3xl mb-4 text-yellow-500">${item.title}</h2>
                    <p class="text-2xl font-black mb-6">${item.price} грн</p>
                    <div class="bento p-6 mb-8 text-sm opacity-80 leading-relaxed">${item.desc || 'Опис відсутній...'}</div>
                    <button onclick="alert('Замовлення прийнято!')" class="btn-main w-full text-xl uppercase">Купити зараз</button>
                </div>
            `;
            document.getElementById('detailView').classList.add('active');
        };
        window.closeDetails = () => document.getElementById('detailView').classList.remove('active');

        // АДМІНКА
        window.askAdmin = () => { if(prompt("Pass:") === "254") openPage('adminPage'); };
        window.previewImg = (i) => { const r = new FileReader(); r.onload = (e) => currentImg = e.target.result; r.readAsDataURL(i.files[0]); };
        
        window.publishItem = async () => {
            const t = document.getElementById('adTitle').value;
            const p = document.getElementById('adPrice').value;
            const d = document.getElementById('adDesc').value;
            if(!t || !p || !currentImg) return alert("Заповни поля!");
            await addDoc(collection(db, "sonechko_items"), { title: t, price: p, desc: d, img: currentImg, date: Date.now() });
            
            // Гарне повідомлення
            const toast = document.getElementById('toast');
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); closeAll(); }, 2000);
        };

        // ЮЗЕРИ В АДМІНЦІ
        onSnapshot(collection(db, "sonechko_users"), (snap) => {
            document.getElementById('uCount').innerText = snap.size;
            const act = document.getElementById('uActive'); const bnd = document.getElementById('uBanned');
            act.innerHTML = ''; bnd.innerHTML = '';
            snap.forEach(s => {
                const u = s.data(); const id = s.id;
                const html = `<div class="flex justify-between items-center p-2 bento text-[10px]">
                    <div class="flex items-center gap-2"><img src="${u.photo}" class="w-6 h-6 rounded-full"><span>${u.name}</span></div>
                    <button onclick="toggleBan('${id}', '${u.status}')" class="text-red-500 font-bold uppercase">${u.status === 'active' ? 'Ban' : 'Unban'}</button>
                </div>`;
                u.status === 'active' ? act.innerHTML += html : bnd.innerHTML += html;
            });
        });

        window.toggleBan = async (id, status) => {
            await updateDoc(doc(db, "sonechko_users", id), { status: status === 'active' ? 'banned' : 'active' });
        };

        // NAV
        window.toggleMenu = (s) => {
            document.getElementById('sideMenu').classList.toggle('open', s);
            document.body.classList.toggle('blur-active', s);
        };
        window.openPage = (id) => { closeAll(); document.getElementById(id).classList.add('active'); toggleMenu(false); };
        window.closeAll = () => document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
    </script>
</body>
</html>
