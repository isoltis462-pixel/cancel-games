<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UA Mista — Всі населені пункти України</title>
    <style>
        :root {
            --ukraine-yellow: #FFD700;
            --ukraine-blue: #0057B7;
            --dark-bg: #1a1a1a;
            --panel-bg: #2d2d2d;
        }

        body {
            margin: 0;
            font-family: 'Segoe UI', Roboto, sans-serif;
            background: var(--dark-bg);
            color: white;
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        header {
            background: var(--ukraine-blue);
            padding: 15px 25px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
        }

        .logo { font-size: 26px; font-weight: bold; letter-spacing: 1px; }

        .main-container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        /* Карта */
        .map-section {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        svg path {
            fill: #444;
            stroke: #888;
            stroke-width: 1;
            transition: all 0.3s;
            cursor: pointer;
        }

        svg path:hover {
            fill: var(--ukraine-yellow);
            stroke: #000;
        }

        svg path.active {
            fill: var(--ukraine-blue);
            stroke: #fff;
        }

        /* Список та Фільтри */
        .list-section {
            flex: 1;
            background: var(--panel-bg);
            display: flex;
            flex-direction: column;
            border-left: 2px solid #444;
        }

        .filter-panel {
            padding: 20px;
            background: #333;
            border-bottom: 1px solid #444;
        }

        .search-input {
            width: 100%;
            padding: 10px;
            border-radius: 8px;
            border: none;
            background: #444;
            color: white;
            margin-bottom: 10px;
        }

        .filters {
            display: flex;
            gap: 10px;
            font-size: 14px;
        }

        select {
            background: #444;
            color: white;
            border: 1px solid #555;
            padding: 5px;
            border-radius: 5px;
        }

        .city-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
        }

        .city-card {
            background: #3d3d3d;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid transparent;
        }

        .city-card:hover { border-left-color: var(--ukraine-yellow); background: #4a4a4a; }
        .city-type { font-size: 11px; text-transform: uppercase; color: #aaa; }
        
        .badge {
            background: var(--ukraine-blue);
            padding: 2px 8px;
            border-radius: 10px;
            font-size: 12px;
        }

        @media (max-width: 768px) {
            .main-container { flex-direction: column; }
            .list-section { height: 50%; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo">UA MISTA</div>
    <div id="current-region">Оберіть область на карті</div>
</header>

<div class="main-container">
    <div class="map-section">
        <svg viewBox="0 0 800 500" width="100%" height="100%">
            <path id="lviv" d="M100,200 L150,180 L180,220 L140,260 L90,240 Z" /> 
            <path id="kyiv" d="M350,120 L420,100 L450,160 L380,180 Z" />
            <text x="110" y="220" fill="white" font-size="12">Львівська</text>
            <text x="370" y="145" fill="white" font-size="12">Київська</text>
        </svg>
    </div>

    <div class="list-section">
        <div class="filter-panel">
            <input type="text" class="search-input" id="search" placeholder="Пошук (наприклад: Бортятин)..." onkeyup="updateDisplay()">
            <div class="filters">
                <select id="type-filter" onchange="updateDisplay()">
                    <option value="all">Всі типи</option>
                    <option value="місто">Міста</option>
                    <option value="село">Села</option>
                    <option value="смт">СМТ</option>
                </select>
                <select id="sort-filter" onchange="updateDisplay()">
                    <option value="name">За алфавітом</option>
                    <option value="size">За розміром</option>
                </select>
            </div>
        </div>
        <div class="city-scroll" id="city-list">
            </div>
    </div>
</div>

<script>
    // Велика база даних
    const ukraineData = {
        "lviv": [
            { name: "Львів", type: "місто", pop: 720000 },
            { name: "Дрогобич", type: "місто", pop: 75000 },
            { name: "Бортятин", type: "село", pop: 1100 },
            { name: "Судова Вишня", type: "місто", pop: 6500 }
        ],
        "kyiv": [
            { name: "Київ", type: "місто", pop: 2800000 },
            { name: "Біла Церква", type: "місто", pop: 200000 },
            { name: "Бориспіль", type: "місто", pop: 63000 }
        ]
    };

    let selectedRegion = "";

    document.querySelectorAll('path').forEach(p => {
        p.onclick = () => {
            document.querySelectorAll('path').forEach(x => x.classList.remove('active'));
            p.classList.add('active');
            selectedRegion = p.id;
            document.getElementById('current-region').innerText = p.id.toUpperCase() + " ОБЛАСТЬ";
            updateDisplay();
        };
    });

    function updateDisplay() {
        if (!selectedRegion) return;
        
        const list = document.getElementById('city-list');
        const searchTerm = document.getElementById('search').value.toLowerCase();
        const typeFilter = document.getElementById('type-filter').value;
        const sortType = document.getElementById('sort-filter').value;

        let items = ukraineData[selectedRegion] || [];

        // 1. Фільтр пошуку
        items = items.filter(i => i.name.toLowerCase().includes(searchTerm));

        // 2. Фільтр типу
        if (typeFilter !== 'all') {
            items = items.filter(i => i.type === typeFilter);
        }

        // 3. Сортування
        if (sortType === 'name') {
            items.sort((a, b) => a.name.localeCompare(b.name));
        } else {
            items.sort((a, b) => b.pop - a.pop);
        }

        list.innerHTML = items.map(i => `
            <div class="city-card">
                <div>
                    <span class="city-type">${i.type}</span>
                    <div style="font-size: 18px; font-weight: bold;">${i.name}</div>
                </div>
                <div class="badge">${i.pop.toLocaleString()} чол.</div>
            </div>
        `).join('');
    }
</script>

</body>
</html>
