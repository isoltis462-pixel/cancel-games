<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PureDrop | Premium</title>
    <style>
        :root {
            --bg-black: #000000;
            --card-dark: #121212;
            --happy-green: #57AF20; /* Той самий колір HappyMod, але для акцентів */
            --text-white: #ffffff;
        }

        body {
            background-color: var(--bg-black);
            color: var(--text-white);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        /* Анімація появи карток */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        header {
            background: rgba(18, 18, 18, 0.8);
            backdrop-filter: blur(15px);
            padding: 20px;
            position: sticky;
            top: 0;
            z-index: 100;
            text-align: center;
            border-bottom: 1px solid #222;
        }

        .logo {
            font-size: 24px;
            font-weight: 900;
            letter-spacing: 1px;
        }

        .logo span { color: var(--happy-green); }

        /* Пошук із фокусом */
        .search-container { padding: 15px; }

        .search-input {
            width: 100%;
            padding: 14px 20px;
            background: #1c1c1e;
            border: 2px solid transparent;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            box-sizing: border-box;
            transition: 0.3s;
            outline: none;
        }

        .search-input:focus {
            border-color: var(--happy-green);
            background: #252527;
            box-shadow: 0 0 15px rgba(87, 175, 32, 0.2);
        }

        /* Контейнер ігор */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 15px;
        }

        .game-card {
            display: flex;
            flex-direction: column;
            align-items: center;
            animation: fadeIn 0.6s ease forwards;
        }

        .icon-wrapper {
            width: 90px;
            height: 90px;
            background: var(--card-dark);
            border-radius: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            margin-bottom: 10px;
            border: 1px solid #222;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        /* Ефект при натисканні */
        .game-card:active .icon-wrapper {
            transform: scale(0.85);
            border-color: var(--happy-green);
        }

        .game-name {
            font-size: 12px;
            font-weight: 600;
            margin-bottom: 8px;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        /* Кнопка "Download" у стилі HappyMod */
        .download-btn {
            background: var(--happy-green);
            color: black;
            border: none;
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 10px;
            font-weight: 900;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.2s;
        }

        .download-btn:active {
            background: #ffffff;
            transform: translateY(2px);
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">PURE<span>DROP</span></div>
    </header>

    <div class="search-container">
        <input type="text" class="search-input" placeholder="Search mods & games..." id="searchInput">
    </div>

    <div class="grid" id="gameGrid">
        <!-- Гра 1 -->
        <div class="game-card">
            <div class="icon-wrapper">🏎️</div>
            <div class="game-name">UKRAINE GTA</div>
            <button class="download-btn">Install</button>
        </div>

        <!-- Гра 2 -->
        <div class="game-card">
            <div class="icon-wrapper">🚛</div>
            <div class="game-name">ETS 2 Mobile</div>
            <button class="download-btn">Install</button>
        </div>

        <!-- Гра 3 -->
        <div class="game-card">
            <div class="icon-wrapper">🚓</div>
            <div class="game-name">NPU Simulator</div>
            <button class="download-btn">Install</button>
        </div>

        <!-- Гра 4 -->
        <div class="game-card">
            <div class="icon-wrapper">⚽</div>
            <div class="game-name">Shakhtar FC</div>
            <button class="download-btn">Install</button>
        </div>

        <!-- Гра 5 -->
        <div class="game-card">
            <div class="icon-wrapper">🏗️</div>
            <div class="game-name">BeamNG Dr.</div>
            <button class="download-btn">Install</button>
        </div>

        <!-- Гра 6 -->
        <div class="game-card">
            <div class="icon-wrapper">🛰️</div>
            <div class="game-name">ISS Space</div>
            <button class="download-btn">Install</button>
        </div>
    </div>

    <script>
        // Простий пошук для твого списку ігор
        document.getElementById('searchInput').addEventListener('input', function(e) {
            let filter = e.target.value.toLowerCase();
            let cards = document.querySelectorAll('.game-card');
            
            cards.forEach(card => {
                let name = card.querySelector('.game-name').innerText.toLowerCase();
                if (name.includes(filter)) {
                    card.style.display = "flex";
                } else {
                    card.style.display = "none";
                }
            });
        });
    </script>

</body>
</html>
