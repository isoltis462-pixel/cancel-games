<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PureDrop Visual Cloud</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #3b82f6; --bg: #0b0b0c; --surface: #161618; --border: rgba(255,255,255,0.08); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Та сама кнопка register, про яку ти просив */
        .register-btn { 
            position: absolute; 
            top: 15px; 
            right: 20px; 
            font-size: 11px; 
            color: #444; 
            background: none; 
            border: none; 
            cursor: pointer; 
            transition: 0.3s; 
            z-index: 100; 
        }
        .register-btn:hover { color: var(--accent); }

        .game-card { background: var(--surface); border: 1px solid var(--border); border-radius: 24px; transition: 0.3s; }
        .game-card:hover { transform: translateY(-5px); border-color: var(--accent); }

        /* ADMIN INTERFACE */
        .admin-layer { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; overflow-y: auto; padding: 20px; }
        #editorModal { position: fixed; inset: 0; background: #0b0b0c; z-index: 6000; display: none; flex-direction: column; }
        
        .preview-side { background: #000; padding: 20px; border-bottom: 2px dashed var(--accent); }
        .settings-side { padding: 25px; background: #111; overflow-y: auto; flex-grow: 1; }

        .admin-input { width: 100%; background: #1a1a1c; border: 1px solid #333; padding: 12px; border-radius: 12px; color: white; margin-bottom: 10px; font-size: 14px; }
        .btn { padding: 12px 20px; border-radius: 12px; font-weight: bold; cursor: pointer; border: none; transition: 0.2s; }
        .btn-accent { background: var(--accent); color: white; }
        .btn-outline { background: none; border: 1px solid #333; color: white; }

        .gallery { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 10px; }
        .gallery img { height: 120px; border-radius: 10px; flex-shrink: 0; border: 1px solid var(--border); }
        
        /* Скроллбар */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--accent); border-radius: 10px; }
    </style>
</head>
<body>

    <!-- Кнопка register маленькими, щоб не мішало -->
    <button onclick="handleAuth()" class="register-btn">register</button>

    <header class="py-12 text-center">
        <h1 class="text-5xl font-black tracking-tighter text-blue-600">PURE<span class="text-white">DROP</span></h1>
        <p class="text-gray-500 text-xs mt-3 uppercase tracking-widest">Cloud Market v12.0</p>
    </header>

    <main class="max-w-6xl mx-auto px-6 pb-24">
        <div id="games-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6">
            <!-- Ігри підтягнуться автоматично -->
        </div>
    </main>

    <!-- ПАНЕЛЬ АДМІНІСТРАТОРА -->
    <div id="adminPanel" class="admin-layer">
        <div class="flex justify-between items-center mb-10">
            <div>
                <h2 class="text-2xl font-bold">Cloud Dashboard</h2>
                <p class="text-gray-500 text-sm">Керування базою Keysbrawl</p>
            </div>
            <button onclick="closeAdmin()" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-xl font-bold">ВИЙТИ</button>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-10">
            <div class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800">
                <div class="text-gray-500 text-xs uppercase mb-1">Database</div>
                <div class="text-blue-500 font-black text-xl">FIREBASE</div>
            </div>
            <div class="bg-zinc-900 p-6 rounded-3xl border border-zinc-800">
                <div class="text-gray-500 text-xs uppercase mb-1">Status</div>
                <div class="text-green-500 font-black text-xl">LIVE</div>
            </div>
            <div onclick="openVisualEditor()" class="bg-blue-600 p-6 rounded-3xl text-center cursor-pointer hover:bg-blue-500 transition shadow-lg shadow-blue-600/20">
                <div class="text-white font-black text-xl">+ ДОДАТИ ГРУ</div>
            </div>
        </div>

        <h3 class="text-lg font-bold mb-4 ml-2">Список проектів:</h3>
        <div id="admin-list" class="space-y-3">
            <!-- Тут список ігор з кнопками Edit/Delete -->
        </div>
    </div>

    <!-- ВІЗУАЛЬНИЙ РЕДАКТОР (Visual Editor) -->
    <div id="editorModal">
        <div class="preview-side">
            <div class="flex justify-between items-center mb-4">
                <span class="text-[10px] bg-blue-600 px-2 py-1 rounded font-bold uppercase">Live Preview</span>
                <span class="text-[10px] text-gray-500">PureDrop Editor v12</span>
            </div>
            <div id="livePreviewContent" class="max-w-md mx-auto bg-zinc-900 rounded-3xl p-6 border border-white/5 shadow-2xl">
                <!-- Живий перегляд -->
            </div>
        </div>
        <div class="settings-side">
            <h3 class="text-xl font-bold mb-6 text-blue-500">Налаштування хмари</h3>
            
            <div class="space-y-4">
                <div>
                    <label class="text-[10px] text-gray-500 uppercase ml-2 mb-1 block">Назва</label>
                    <input type="text" id="edName" class="admin-input" placeholder="Наприклад: GTA Ukraine" oninput="updatePreview()">
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 uppercase ml-2 mb-1 block">Посилання на іконку (URL)</label>
                    <input type="text" id="edIcon" class="admin-input" placeholder="https://..." oninput="updatePreview()">
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 uppercase ml-2 mb-1 block">Опис</label>
                    <textarea id="edDesc" class="admin-input h-28" placeholder="Про що ця гра?" oninput="updatePreview()"></textarea>
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 uppercase ml-2 mb-1 block">Скріншоти (через кому)</label>
                    <input type="text" id="edScreens" class="admin-input" placeholder="URL1, URL2, URL3" oninput="updatePreview()">
                </div>
                <div>
                    <label class="text-[10px] text-gray-500 uppercase ml-2 mb-1 block">Пряме посилання на APK</label>
                    <input type="text" id="edLink" class="admin-input" placeholder="Dropbox/GitHub link">
                </div>
            </div>
            
            <div class="flex gap-4 mt-10">
                <button onclick="saveGame()" class="btn btn-accent flex-1 shadow-lg shadow-blue-600/30">ОПУБЛІКУВАТИ</button>
                <button onclick="closeVisualEditor()" class="btn btn-outline">СКАСУВАТИ</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // Твої реальні ключі з Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyAmCzZAEKq4BMo6eWAN96IawhF95cH1sHM",
            authDomain: "keysbrawl-c4ae6.firebaseapp.com",
            projectId: "keysbrawl-c4ae6",
            storageBucket: "keysbrawl-c4ae6.firebasestorage.app",
            messagingSenderId: "1090859079662",
            appId: "1:1090859079662:web:0fb901aee2e2d65c83a0ff"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        let currentEditId = null;

        // ЛОГІКА ВХОДУ (Тільки для тебе)
        window.handleAuth = async () => {
            const provider = new GoogleAuthProvider();
            try {
                const result = await signInWithPopup(auth, provider);
                if(result.user.email === "isoltis462@gmail.com") {
                    document.getElementById('adminPanel').style.display = 'block';
                } else { 
                    alert("Доступ заборонено. Тільки для адміністратора PureDrop."); 
                    await auth.signOut();
                }
            } catch (e) { console.error("Auth Error:", e); }
        };

        window.closeAdmin = () => document.getElementById('adminPanel').style.display = 'none';

        // ЖИВЕ ОНОВЛЕННЯ ДАНИХ (Real-time Cloud)
        onSnapshot(collection(db, "games"), (snapshot) => {
            const grid = document.getElementById('games-grid');
            const adminList = document.getElementById('admin-list');
            grid.innerHTML = '';
            adminList.innerHTML = '';

            snapshot.forEach((gameDoc) => {
                const game = gameDoc.data();
                const id = gameDoc.id;

                // Вигляд для звичайного користувача
                grid.innerHTML += `
                    <div class="game-card p-5 text-center">
                        <div class="relative inline-block mb-4">
                            <img src="${game.icon}" class="w-24 h-24 rounded-[32px] object-cover shadow-2xl">
                            <div class="absolute -bottom-1 -right-1 w-6 h-6 bg-blue-600 rounded-full border-4 border-[#161618] flex items-center justify-center">
                                <div class="w-1.5 h-1.5 bg-white rounded-full"></div>
                            </div>
                        </div>
                        <h3 class="font-bold text-sm mb-1 truncate px-2">${game.name}</h3>
                        <p class="text-[10px] text-gray-500 mb-4 uppercase font-bold tracking-widest">v1.0 Stable</p>
                        <a href="${game.link}" target="_blank" class="block w-full bg-white text-black py-2.5 rounded-2xl text-[10px] font-black hover:bg-blue-600 hover:text-white transition">СКАЧАТИ</a>
                    </div>
                `;

                // Вигляд в адмінці
                adminList.innerHTML += `
                    <div class="bg-zinc-900/50 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                        <div class="flex items-center gap-3">
                            <img src="${game.icon}" class="w-10 h-10 rounded-lg object-cover">
                            <span class="font-bold text-sm">${game.name}</span>
                        </div>
                        <div class="flex gap-3">
                            <button onclick="editGame('${id}', ${JSON.stringify(game).replace(/"/g, '&quot;')})" class="text-blue-500 font-bold text-xs">EDIT</button>
                            <button onclick="deleteGame('${id}')" class="text-red-500 font-bold text-xs uppercase">Delete</button>
                        </div>
                    </div>
                `;
            });
        });

        // ЛОГІКА РЕДАКТОРА
        window.openVisualEditor = () => {
            currentEditId = null;
            document.querySelectorAll('.admin-input').forEach(i => i.value = '');
            document.getElementById('editorModal').style.display = 'flex';
            updatePreview();
        };

        window.closeVisualEditor = () => document.getElementById('editorModal').style.display = 'none';

        window.updatePreview = () => {
            const name = document.getElementById('edName').value || "Назва гри";
            const icon = document.getElementById('edIcon').value || "https://cdn-icons-png.flaticon.com/512/6831/6831000.png";
            const desc = document.getElementById('edDesc').value || "Тут з'явиться опис твого проекту після того, як ти його напишеш...";
            const screensStr = document.getElementById('edScreens').value;
            const screens = screensStr ? screensStr.split(',').filter(s => s.trim()) : [];

            document.getElementById('livePreviewContent').innerHTML = `
                <div class="text-center">
                    <img src="${icon}" class="w-20 h-20 mx-auto rounded-3xl border-4 border-blue-600/20 mb-4 shadow-xl">
                    <h4 class="font-black text-xl mb-2">${name}</h4>
                    <div class="gallery mt-6">
                        ${screens.map(s => `<img src="${s.trim()}" onerror="this.src='https://via.placeholder.com/150/111/333?text=Invalid+Image'">`).join('') || '<div class="w-full py-10 border-2 border-dashed border-white/5 rounded-2xl text-gray-700 text-xs italic">Галерея порожня</div>'}
                    </div>
                    <div class="mt-6 text-left p-4 bg-black/40 rounded-2xl">
                        <div class="text-[9px] text-blue-500 font-bold uppercase mb-2">About Project</div>
                        <p class="text-xs text-gray-400 leading-relaxed">${desc}</p>
                    </div>
                </div>
            `;
        };

        window.saveGame = async () => {
            const name = document.getElementById('edName').value;
            if(!name) return alert("Введіть назву!");

            const data = {
                name: name,
                icon: document.getElementById('edIcon').value,
                desc: document.getElementById('edDesc').value,
                screens: document.getElementById('edScreens').value.split(',').map(s => s.trim()),
                link: document.getElementById('edLink').value,
                updatedAt: new Date()
            };

            try {
                if(currentEditId) {
                    await updateDoc(doc(db, "games", currentEditId), data);
                } else {
                    await addDoc(collection(db, "games"), data);
                }
                closeVisualEditor();
            } catch (e) { alert("Помилка запису в хмару: " + e.message); }
        };

        window.editGame = (id, data) => {
            currentEditId = id;
            document.getElementById('edName').value = data.name;
            document.getElementById('edIcon').value = data.icon;
            document.getElementById('edDesc').value = data.desc;
            document.getElementById('edScreens').value = data.screens.join(',');
            document.getElementById('edLink').value = data.link;
            document.getElementById('editorModal').style.display = 'flex';
            updatePreview();
        };

        window.deleteGame = async (id) => {
            if(confirm("Видалити цей проект назавжди? Це неможливо буде скасувати.")) {
                await deleteDoc(doc(db, "games", id));
            }
        };
    </script>
</body>
</html>
