<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>СОНЕЧКО ☀️ — OFFICIAL</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Unbounded:wght@900&family=Plus+Jakarta+Sans:wght@700;800&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #000000; --card: #f3f4f6; --accent: #facc15; }
        .dark-mode { --bg: #0a0a0a; --text: #ffffff; --card: #1a1a1a; --accent: #fbbf24; }

        body { background: var(--bg); color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; transition: 0.3s; overflow: hidden; }
        
        /* ГАРНИЙ НАПИС */
        .logo-font { font-family: 'Unbounded', sans-serif; font-weight: 900; letter-spacing: -1px; }

        /* ЛОАДЕР */
        #loader { position: fixed; inset: 0; background: #000; z-index: 10000; display: flex; align-items: center; justify-content: center; transition: 0.8s; }
        .loader-content { text-align: center; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { transform: scale(1); opacity: 1; } 50% { transform: scale(1.1); opacity: 0.7; } }

        /* ЗАМОК НА САЙТ (В РОЗРОБЦІ) */
        #siteLock { position: fixed; inset: 0; z-index: 9000; background: rgba(0,0,0,0.8); backdrop-filter: blur(40px); display: flex; align-items: center; justify-content: center; transition: 0.6s; }
        .lock-box { background: var(--bg); padding: 50px; border-radius: 50px; text-align: center; box-shadow: 0 20px 80px rgba(0,0,0,0.5); max-width: 400px; width: 90%; }

        /* ПОВІДОМЛЕННЯ */
        #toast { position: fixed; top: 30px; left: 50%; transform: translateX(-50%) translateY(-150px); background: #000; color: #fff; padding: 15px 40px; border-radius: 100px; font-weight: 800; z-index: 11000; transition: 0.5s cubic-bezier(0.18, 0.89, 0.32, 1.28); border: 2px solid var(--accent); }
        #toast.show { transform: translateX(-50%) translateY(0); }
        .dark-mode #toast { background: #fff; color: #000; }

        /* МЕНЮ ТА РОЗМИТТЯ */
        #mainWrapper { transition: 0.5s ease; }
        body.menu-open #mainWrapper { filter: blur(20px) scale(0.98); pointer-events: none; }
        #sideMenu { position: fixed; top: 0; left: -350px; width: 320px; height: 100%; background: var(--bg); z-index: 8000; transition: 0.5s; padding: 40px; border-right: 1px solid rgba(128,128,128,0.2); }
        #sideMenu.open { left: 0; }

        .bento { background: var(--card); border-radius: 30px; border: 1px solid rgba(128,128,128,0.1); }
        .modal { position: fixed; inset: 0; z-index: 7000; display: none; background: rgba(0,0,0,0.5); backdrop-filter: blur(10px); align-items: center; justify-content: center; }
        .modal.active { display: flex; }
        
        .btn-yellow { background: #facc15 !important; color: #000 !important; font-weight: 900; border-radius: 20px; transition: 0.3s; }
        .btn-yellow:hover { transform: scale(1.03); box-shadow: 0 10px 20px rgba(250,204,21,0.3); }
    </style>
</head>
<body id="body">

    <div id="toast">✅ Опубліковано!</div>

    <div id="loader">
        <div class="loader-content">
            <h1 class="logo-font text-white text-4xl">СОНЕЧКО</h1>
            <p class="text-yellow-400 font-bold mt-2 tracking-widest">LOADING...</p>
        </div>
    </div>

    <div id="siteLock">
        <div class="lock-box">
            <h2 class="logo-font text-2xl mb-2">🚧 В РОЗРОБЦІ</h2>
            <p class="opacity-50 text-sm mb-8 font-bold">Введіть пароль адміністратора</p>
            <input type="password" id="passInput" maxlength="4" placeholder="****" 
                   class="w-full p-5 bento text-center text-4xl font-black mb-6 outline-none border-2 border-yellow-400 focus:border-orange-500 transition-all">
            <button onclick="checkLock()" class="w-full btn-yellow p-5 text-xl uppercase">Увійти</button>
        </div>
    </div>

    <div id="mainWrapper">
        <header class="p-6 flex justify-between items-center max-w-7xl mx-auto">
            <button onclick="toggleMenu(true)" class="w-14 h-14 bento flex items-center justify-center text-2xl">☰</button>
            <h1 class="logo-font text-2xl text-yellow-500">СОНЕЧКО</h1>
            <div onclick="openPage('profilePage')" class="w-14 h-14 rounded-2xl bento overflow-hidden cursor-pointer">
                <img src="https://cdn-icons-png.flaticon.com/512/149/149071.png" id="userIcon" class="w-full h-full object-cover">
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-6 space-y-8">
            <div id="promoBanner" class="w-full h-48 rounded-[40px] bg-gradient-to-br from-yellow-400 to-orange-500 p-10 text-white flex flex-col justify-center shadow-xl">
                <h2 class="text-4xl font-900 italic">NEW ITEMS</h2>
                <p class="font-bold opacity-80 uppercase">Магазин від Лейтенанта</p>
            </div>

            <div class="bento p-2 flex items-center px-6">
                <span class="mr-3">🔍</span>
                <input type="text" id="search" oninput="draw()" placeholder="Пошук..." class="w-full p-4 bg-transparent outline-none font-bold">
            </div>

            <div id="grid" class="grid grid-cols-2 md:grid-cols-4 gap-6"></div>
        </main>
    </div>

    <div id="sideMenu">
        <div class="flex justify-between items-center mb-16">
            <h2 class="logo-font text-xl">МЕНЮ</h2>
            <button onclick="toggleMenu(false)" class="text-2xl">✕</button>
        </div>
        <div class="space-y-8 font-black text-lg uppercase italic">
            <button onclick="openPage('profilePage')" class="block hover:text-yellow-500">ПРОФІЛЬ</button>
            <button onclick="openPage('settingsPage')" class="block hover:text-yellow-500">НАЛАШТУВАННЯ</button>
            <button onclick="tryAdmin()" class="block text-red-500">АДМІНКА</button>
        </div>
    </div>

    <div id="profilePage" class="modal">
        <div class="bg-[var(--bg)] p-10 rounded-[40px] w-full max-w-sm text-center">
            <div id="authContent">
                <h2 class="logo-font text-2xl mb-8">ВХІД</h2>
                <button onclick="login()" class="btn-yellow w-full p-5 flex items-center justify-center gap-3">
                    <img src="https://www.google.com/favicon.ico" class="w-5"> Google Вхід
                </button>
            </div>
            <button onclick="closeAll()" class="mt-8 opacity-30 font-bold">ЗАКРИТИ</button>
        </div>
    </div>

    <div id="settingsPage" class="modal">
        <div class="bg-[var(--bg)] p-10 rounded-[40px] w-full max-w-md">
            <h2 class="logo-font text-2xl mb-10 text-center">SETTINGS</h2>
            <div class="space-y-4">
                <div onclick="toggleTheme()" class="bento p-6 flex justify-between items-center cursor-pointer">
                    <span class="font-bold" id="txtTheme">Тема інтерфейсу</span>
                    <span id="themeIndicator">☀️</span>
                </div>
                <div class="bento p-6">
                    <span class="font-bold block mb-4" id="txtLang">Мова</span>
                    <div class="flex gap-2">
                        <button onclick="setLang('UA')" class="bg-yellow-400 p-3 rounded-xl text-black font-black">UA</button>
                        <button onclick="setLang('EN')" class="bg-gray-200 p-3 rounded-xl text-black font-black">EN</button>
                    </div>
                </div>
            </div>
            <button onclick="closeAll()" class="w-full mt-10 opacity-30 font-bold">ЗАКРИТИ</button>
        </div>
    </div>

    <div id="adminPage" class="modal">
        <div class="bg-[var(--bg)] p-8 rounded-[40px] w-full max-w-4xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-8">
                <h2 class="logo-font text-xl">ADMIN PANEL</h2>
                <button onclick="closeAll()" class="text-red-500 font-black">ВИЙТИ</button>
            </div>
            <div class="grid md:grid-cols-2 gap-10">
                <div class="space-y-4">
                    <input type="text" id="adName" placeholder="Назва товару" class="w-full p-4 bento outline-none">
                    <input type="number" id="adPrice" placeholder="Ціна" class="w-full p-4 bento outline-none">
                    <input type="file" id="adFile" class="hidden" onchange="readImg(this)">
                    <button onclick="document.getElementById('adFile').click()" class="w-full p-4 border-2 border-dashed rounded-2xl font-bold opacity-40">ДОДАТИ ФОТО</button>
                    <button onclick="send()" class="w-full bg-black text-white p-5 rounded-3xl font-black">ОПУБЛІКУВАТИ</button>
                </div>
                <div class="bento p-6 h-64 overflow-y-auto">
                    <p class="text-[10px] font-black opacity-30 mb-4">КОРИСТУВАЧІ (<span id="userCount">0</span>)</p>
                    <div id="userList" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmCzZAEKq4BMo6eWAN96IawhF95cH1sHM",
            authDomain: "keysbrawl-c4ae6.firebaseapp.com",
            projectId: "keysbrawl-c4ae6",
            storageBucket: "keysbrawl-c4ae6.firebasestorage.app",
            messagingSenderId: "1090859079662",
            appId: "1:1090859079662:web:0fb901aee2e2d65c83a0ff"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        let items = []; let imgData = "";

        // ЛОАДЕР
        window.onload = () => setTimeout(() => document.getElementById('loader').style.opacity = "0", 2500);

        // ЗАМОК (2555)
        window.checkLock = () => {
            if(document.getElementById('passInput').value === "2555") {
                document.getElementById('siteLock').style.opacity = "0";
                setTimeout(() => document.getElementById('siteLock').style.display = "none", 600);
                document.body.style.overflow = "auto";
                localStorage.setItem('unlocked', 'true');
            } else { alert("❌ Невірний пароль!"); document.getElementById('passInput').value = ""; }
        };
        if(localStorage.getItem('unlocked')) {
            document.getElementById('siteLock').style.display = "none";
            document.body.style.overflow = "auto";
        }

        // ПОВІДОМЛЕННЯ
        window.showMsg = (t) => {
            const toast = document.getElementById('toast');
            toast.innerText = t; toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 3000);
        };

        // ТЕМА
        window.toggleTheme = () => {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeIndicator').innerText = isDark ? "🌙" : "☀️";
        };
        if(localStorage.getItem('theme') === 'dark') toggleTheme();

        // МОВИ
        window.setLang = (l) => {
            document.getElementById('txtTheme').innerText = l === 'UA' ? "Тема інтерфейсу" : "Interface Theme";
            document.getElementById('txtLang').innerText = l === 'UA' ? "Мова" : "Language";
            showMsg(l === 'UA' ? "Мову змінено!" : "Language Changed!");
        };

        // GOOGLE AUTH
        window.login = async () => {
            try {
                const res = await signInWithPopup(auth, provider);
                const u = res.user;
                const q = query(collection(db, "sonechko_users"), where("uid", "==", u.uid));
                const s = await getDocs(q);
                if(s.empty) await addDoc(collection(db, "sonechko_users"), { uid: u.uid, name: u.displayName, photo: u.photoURL, email: u.email });
                showMsg("Привіт, " + u.displayName);
                closeAll();
            } catch(e) { showMsg("Помилка входу ❌"); }
        };

        onAuthStateChanged(auth, (u) => {
            if(u) {
                document.getElementById('userIcon').src = u.photoURL;
                document.getElementById('authContent').innerHTML = `
                    <img src="${u.photoURL}" class="w-20 h-20 rounded-full mx-auto mb-4 border-4 border-yellow-400">
                    <p class="font-black mb-6">${u.displayName}</p>
                    <button onclick="auth.signOut().then(()=>location.reload())" class="bg-red-500 text-white p-4 rounded-2xl font-bold w-full">ВИЙТИ</button>
                `;
            }
        });

        // МАГАЗИН (FIRESTORE)
        onSnapshot(query(collection(db, "sonechko_items"), orderBy("date", "desc")), (snap) => {
            items = snap.docs.map(d => d.data());
            draw();
        });

        window.draw = () => {
            const grid = document.getElementById('grid');
            const search = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = '';
            items.filter(i => i.title.toLowerCase().includes(search)).forEach(i => {
                grid.innerHTML += `
                    <div class="bento p-4 slide-up">
                        <img src="${i.img}" class="w-full h-40 object-cover rounded-2xl mb-4 shadow-md">
                        <h4 class="font-black text-xs uppercase">${i.title}</h4>
                        <p class="text-yellow-500 font-black text-lg">${i.price} грн</p>
                    </div>`;
            });
        };

        // АДМІНКА (254)
        window.tryAdmin = () => { if(prompt("Pass:") === "254") openPage('adminPage'); else showMsg("Доступ закритий 🔒"); };
        window.readImg = (i) => { const r = new FileReader(); r.onload = (e) => imgData = e.target.result; r.readAsDataURL(i.files[0]); };
        window.send = async () => {
            const n = document.getElementById('adName').value;
            const p = document.getElementById('adPrice').value;
            if(!n || !p || !imgData) return showMsg("Заповни все! ⚠️");
            await addDoc(collection(db, "sonechko_items"), { title: n, price: p, img: imgData, date: Date.now() });
            showMsg("✅ Опубліковано!");
            closeAll();
        };

        // КОРИСТУВАЧІ В АДМІНЦІ
        onSnapshot(collection(db, "sonechko_users"), (snap) => {
            document.getElementById('userCount').innerText = snap.size;
            const uL = document.getElementById('userList');
            uL.innerHTML = '';
            snap.forEach(d => {
                const u = d.data();
                uL.innerHTML += `<div class="p-2 bento text-[10px] flex items-center gap-2">
                    <img src="${u.photo}" class="w-6 h-6 rounded-full"> <span>${u.name}</span>
                </div>`;
            });
        });

        // НАВІГАЦІЯ
        window.toggleMenu = (s) => {
            document.getElementById('sideMenu').classList.toggle('open', s);
            document.body.classList.toggle('menu-open', s);
        };
        window.openPage = (id) => { closeAll(); document.getElementById(id).classList.add('active'); toggleMenu(false); };
        window.closeAll = () => document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
    </script>
</body>
</html>
