<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сонечко ☀️ — В розробці</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #ffffff; --text: #1a1a1a; --card: #f3f4f6; --accent: #facc15; }
        .dark-mode { --bg: #0f172a; --text: #f8fafc; --card: #1e293b; --accent: #fbbf24; }

        body { background: var(--bg); color: var(--text); font-family: 'Montserrat', sans-serif; transition: 0.3s; overflow: hidden; }
        
        /* ЛОАДЕР */
        #loader { position: fixed; inset: 0; background: #fff; z-index: 10000; display: flex; align-items: center; justify-content: center; transition: 0.5s; }
        .loading-text { font-size: 3rem; font-weight: 900; color: #eee; position: relative; }
        .loading-text::before {
            content: "СОНЕЧКО"; position: absolute; left: 0; top: 0; width: 0; height: 100%;
            background: linear-gradient(to right, #0057b7 50%, #ffd700 50%);
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            overflow: hidden; animation: fillText 2s forwards;
        }
        @keyframes fillText { 100% { width: 100%; } }

        /* ЕКРАН БЛОКУВАННЯ */
        #devLock { 
            position: fixed; inset: 0; z-index: 9000; display: flex; align-items: center; justify-content: center;
            backdrop-filter: blur(20px); background: rgba(255,255,255,0.1); transition: 0.8s;
        }
        .lock-card { background: var(--bg); padding: 40px; border-radius: 40px; border: 1px solid rgba(0,0,0,0.1); box-shadow: 0 25px 50px -12px rgba(0,0,0,0.2); text-align: center; max-width: 350px; }

        /* ГОЛОВНИЙ КОНТЕНТ */
        #mainContent { filter: blur(15px); transition: 1s; opacity: 0.3; pointer-events: none; }
        body.unlocked #mainContent { filter: blur(0); opacity: 1; pointer-events: auto; }
        body.unlocked { overflow: auto; }

        /* ІНШІ СТИЛІ */
        .bento-card { background: var(--card); border-radius: 24px; transition: 0.3s; border: 1px solid rgba(0,0,0,0.05); }
        .modal { position: fixed; inset: 0; z-index: 3000; display: none; background: var(--bg); overflow-y: auto; padding: 20px; }
        .modal.active { display: block; animation: fadeIn 0.3s; }
        
        #customAlert { 
            position: fixed; top: 20px; left: 50%; transform: translateX(-50%) translateY(-100px);
            background: var(--accent); color: #000; padding: 15px 30px; border-radius: 20px;
            font-weight: 900; z-index: 10001; transition: 0.5s;
        }
        #customAlert.show { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body id="bodyTag">

    <div id="customAlert">Успішно! ✅</div>

    <div id="loader"><div class="loading-text">СОНЕЧКО</div></div>

    <div id="devLock">
        <div class="lock-card">
            <div class="text-4xl mb-4">🚧</div>
            <h2 class="text-xl font-900 mb-2 uppercase">Сайт у розробці</h2>
            <p class="text-xs opacity-50 mb-8">Доступ тільки для адміністраторів</p>
            <input type="password" id="devPass" maxlength="4" placeholder="Введіть пароль" 
                   class="w-full p-4 bento-card text-center text-2xl font-black outline-none mb-4 tracking-[10px]">
            <button onclick="checkDevPass()" class="w-full bg-black text-white p-4 rounded-2xl font-black hover:bg-yellow-400 hover:text-black transition">УВІЙТИ</button>
        </div>
    </div>

    <div id="mainContent">
        <header class="p-6 flex justify-between items-center max-w-7xl mx-auto">
            <button onclick="toggleMenu(true)" class="text-2xl bento-card w-12 h-12 flex items-center justify-center">☰</button>
            <h1 class="text-2xl font-900 tracking-tighter">СОНЕЧКО☀️</h1>
            <div onclick="openPage('authPage')" class="w-12 h-12 bento-card overflow-hidden cursor-pointer">
                <img id="userImg" src="https://cdn-icons-png.flaticon.com/512/1144/1144760.png" class="w-full h-full object-cover">
            </div>
        </header>

        <main class="max-w-7xl mx-auto p-6">
            <div id="products" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6"></div>
        </main>
    </div>

    <div id="sideMenu" class="fixed top-0 left-[-320px] w-[300px] h-full bg-[var(--bg)] z-[5000] transition-all p-10 border-r border-black/5">
        <h2 class="text-2xl font-900 mb-10 italic uppercase">Меню</h2>
        <div class="space-y-6 font-bold">
            <button onclick="openPage('authPage')" class="block">Профіль</button>
            <button onclick="openPage('settingsPage')" class="block">Налаштування</button>
            <button onclick="openAdmin()" class="block opacity-20 text-xs mt-20">Admin Access</button>
        </div>
    </div>

    <div id="authPage" class="modal">
        <div class="max-w-md mx-auto text-center pt-20">
            <button onclick="closeAll()" class="mb-10 opacity-30">← НАЗАД</button>
            <h2 class="text-3xl font-900 mb-4">Вхід</h2>
            <button onclick="googleLogin()" class="w-full bento-card p-5 flex items-center justify-center gap-4 font-bold border-2 border-yellow-400">
                Продовжити з Google
            </button>
        </div>
    </div>

    <div id="settingsPage" class="modal">
        <div class="max-w-2xl mx-auto pt-10">
            <button onclick="closeAll()" class="mb-10">← ЗАКРИТИ</button>
            <h2 class="text-4xl font-900 mb-10 italic">SETTINGS</h2>
            <div class="bento-card p-6 flex justify-between items-center" onclick="toggleTheme()">
                <span>Тема інтерфейсу</span>
                <span id="themeVal">День ☀️</span>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy, getDocs, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmCzZAEKq4BMo6eWAN96IawhF95cH1sHM",
            authDomain: "keysbrawl-c4ae6.firebaseapp.com",
            projectId: "keysbrawl-c4ae6",
            storageBucket: "keysbrawl-c4ae6.firebasestorage.app",
            messagingSenderId: "1090859079662",
            appId: "1:1090859079662:web:0fb901aee2e2d65c83a0ff"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        // ПЕРЕВІРКА ПАРОЛЯ РОЗРОБНИКА
        window.checkDevPass = () => {
            const pass = document.getElementById('devPass').value;
            if (pass === "2555") {
                document.getElementById('devLock').style.opacity = "0";
                setTimeout(() => document.getElementById('devLock').style.display = "none", 800);
                document.getElementById('bodyTag').classList.add('unlocked');
                localStorage.setItem('dev_access', 'true');
            } else {
                alert("Невірний пароль!");
                document.getElementById('devPass').value = "";
            }
        };

        // ПЕРЕВІРКА СЕСІЇ РОЗРОБНИКА (щоб не вводити кожен раз)
        if(localStorage.getItem('dev_access') === 'true') {
            document.getElementById('devLock').style.display = "none";
            document.getElementById('bodyTag').classList.add('unlocked');
        }

        // ЛОАДЕР
        window.onload = () => setTimeout(() => {
            document.getElementById('loader').style.opacity = "0";
            setTimeout(() => document.getElementById('loader').style.display = "none", 500);
        }, 2200);

        // ТЕМА
        window.toggleTheme = () => {
            const isDark = document.body.classList.toggle('dark-mode');
            localStorage.setItem('theme', isDark ? 'dark' : 'light');
            document.getElementById('themeVal').innerText = isDark ? "Ніч 🌙" : "День ☀️";
        };
        if(localStorage.getItem('theme') === 'dark') toggleTheme();

        // ІНШІ ФУНКЦІЇ (Меню, Рендер)
        window.toggleMenu = (s) => {
            document.getElementById('sideMenu').style.left = s ? "0" : "-320px";
        };
        window.openPage = (id) => { closeAll(); document.getElementById(id).classList.add('active'); toggleMenu(false); };
        window.closeAll = () => document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));

        // Рендер товарів (приклад)
        onSnapshot(query(collection(db, "sonechko_items"), orderBy("date", "desc")), (snap) => {
            const grid = document.getElementById('products');
            grid.innerHTML = '';
            snap.forEach(doc => {
                const p = doc.data();
                grid.innerHTML += `
                <div class="bento-card p-4">
                    <img src="${p.img}" class="w-full h-40 object-cover rounded-xl mb-4">
                    <h4 class="font-black text-xs uppercase">${p.title}</h4>
                    <p class="text-yellow-500 font-black">${p.price} грн</p>
                </div>`;
            });
        });

        window.openAdmin = () => { if(prompt("Admin Pass:") === "254") alert("Admin Panel logic here"); };
    </script>
</body>
</html>
