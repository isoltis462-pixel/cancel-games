<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PureDrop | Premium Gaming</title>
    <style>
        /* Палітра: Глибокий чорний та Електричний синій */
        :root {
            --bg-color: #000000;
            --card-bg: #0d0d0d;
            --accent-blue: #007AFF; /* Колір Apple/Premium Blue */
            --text-main: #ffffff;
            --text-dim: #666666;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Шапка з назвою */
        header {
            width: 100%;
            padding: 30px 0;
            text-align: center;
            border-bottom: 1px solid #111;
        }

        .logo {
            font-size: 28px;
            font-weight: 900;
            letter-spacing: -1.5px;
            text-transform: uppercase;
        }

        .logo span {
            color: var(--accent-blue);
            text-shadow: 0 0 20px rgba(0, 122, 255, 0.4);
        }

        /* Мінімалістичний пошук */
        .search-container {
            width: 90%;
            max-width: 500px;
            margin: 20px 0;
        }

        input {
            width: 100%;
            padding: 15px 20px;
            background: #111;
            border: 1px solid #222;
            border-radius: 15px;
            color: white;
            font-size: 16px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--accent-blue);
            box-shadow: 0 0 10px rgba(0, 122, 255, 0.2);
        }

        /* Сітка карток (як у HappyMod, але чистіша) */
        .grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 1000px;
            padding-bottom: 40px;
        }

        .card {
            background: var(--card-bg);
            border-radius: 24px;
            padding: 20px;
            border: 1px solid #1a1a1a;
            transition: 0.3s cubic-bezier(0.17, 0.67, 0.83, 0.67);
            text-align: center;
        }

        .card:active {
            transform: scale(0.96);
        }

        .icon-box {
            width: 70px;
            height: 70px;
            background: linear-gradient(145deg, #111, #000);
            border-radius: 20px;
            margin: 0 auto 15px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.5);
        }

        .game-title {
            font-size: 15px;
            font-weight: 700;
            margin-bottom: 12px;
            display: block;
        }

        /* Кнопка Premium вигляду */
        .action-btn {
            background: var(--accent-blue);
            color: white;
            border: none;
            padding: 10px 0;
            width: 100%;
            border-radius: 12px;
            font-weight: 800;
            font-size: 12px;
            letter-spacing: 0.5px;
            cursor: pointer;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">PURE<span>DROP</span></div>
    </header>

    <div class="search-container">
        <input type="text" placeholder="Search premium games...">
    </div>

    <div class="grid">
        <div class="card">
            <div class="icon-box">🏎️</div>
            <span class="game-title">Ukraine GTA</span>
            <button class="action-btn">Remove</button>
        </div>

        <div class="card">
            <div class="icon-box">⚽</div>
            <span class="game-title">Superkickoff</span>
            <button class="action-btn">Remove</button>
        </div>

        <div class="card">
            <div class="icon-box">🎮</div>
            <span class="game-title">Euro Truck 2</span>
            <button class="action-btn">Remove</button>
        </div>

        <div class="card">
            <div class="icon-box">🚛</div>
            <span class="game-title">City Car Dr.</span>
            <button class="action-btn">Remove</button>
        </div>
    </div>

</body>
</html>
