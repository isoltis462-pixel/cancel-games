<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Moja Biedronka Checker</title>
    
    <!-- Бібліотека для сканування штрих-кодів -->
    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>
        :root {
            --bd-red: #e31b23;
            --bd-yellow: #fff200;
            --bd-dark: #222;
            --panel-bg: rgba(255, 255, 255, 0.95);
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            /* Яскравий фірмовий градієнт */
            background: linear-gradient(135deg, #e31b23 0%, #ffc800 100%);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- АНІМАЦІЯ СОНЕЧОК (БОЖИХ КОРОВОК) --- */
        .ladybug {
            position: absolute;
            width: 35px;
            height: 35px;
            background: radial-gradient(circle at 30% 30%, #ff3b30, #b30000);
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
            opacity: 0.7;
            box-shadow: 0 4px 8px rgba(0,0,0,0.2);
        }
        /* Крила / лінія посередині */
        .ladybug::before {
            content: '';
            position: absolute;
            top: 0;
            left: 17px;
            width: 1px;
            height: 35px;
            background: #000;
        }
        /* Голова */
        .ladybug::after {
            content: '';
            position: absolute;
            top: -4px;
            left: 12px;
            width: 11px;
            height: 8px;
            background: #000;
            border-radius: 50% 50% 0 0;
        }
        /* Точки на спинці */
        .bug-dots {
            position: absolute;
            width: 100%;
            height: 100%;
        }
        .bug-dots::before, .bug-dots::after {
            content: '•';
            color: black;
            font-size: 16px;
            position: absolute;
        }
        /* Різні позиції точок */
        .ladybug:nth-child(1) .bug-dots::before { top: 5px; left: 6px; }
        .ladybug:nth-child(1) .bug-dots::after { top: 5px; right: 6px; }
        .ladybug:nth-child(2) .bug-dots::before { top: 15px; left: 4px; }
        .ladybug:nth-child(2) .bug-dots::after { top: 15px; right: 4px; }

        /* Рух сонечок */
        @keyframes floatBug1 {
            0% { transform: translate(0, 0) rotate(0deg); }
            50% { transform: translate(100px, -80px) rotate(45deg); }
            100% { transform: translate(-20px, -150px) rotate(10deg); }
        }
        @keyframes floatBug2 {
            0% { transform: translate(0, 0) rotate(180deg); }
            50% { transform: translate(-120px, -50px) rotate(135deg); }
            100% { transform: translate(-50px, 120px) rotate(200deg); }
        }

        .bug1 { bottom: 10%; left: 10%; animation: floatBug1 15s infinite alternate ease-in-out; }
        .bug2 { top: 15%; right: 10%; animation: floatBug2 18s infinite alternate ease-in-out; }
        .bug3 { bottom: 20%; right: 15%; animation: floatBug1 22s infinite alternate ease-in-out; }

        /* --- ОСНОВНИЙ КОНТЕЙНЕР --- */
        .main-card {
            width: 100%;
            max-width: 430px;
            background: var(--panel-bg);
            border-radius: 24px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.25);
            overflow: hidden;
            z-index: 10;
            border: 4px solid var(--bd-yellow);
        }

        /* Шапка */
        .brand-header {
            background-color: var(--bd-red);
            padding: 25px 20px;
            color: white;
            text-align: center;
            position: relative;
        }
        .brand-header h1 {
            margin: 0;
            font-size: 26px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        .brand-header p {
            margin: 5px 0 0;
            font-size: 14px;
            font-weight: 600;
            color: var(--bd-yellow);
        }

        /* Перемикач режимів (Вкладки) */
        .tab-controls {
            display: flex;
            background: #eee;
            padding: 5px;
            margin: 20px;
            border-radius: 12px;
        }
        .tab-btn {
            flex: 1;
            background: transparent;
            border: none;
            padding: 12px 5px;
            font-size: 14px;
            font-weight: bold;
            color: #555;
            cursor: pointer;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .tab-btn.active {
            background: var(--bd-red);
            color: white;
            box-shadow: 0 4px 10px rgba(227, 27, 35, 0.3);
        }

        /* Контент вкладки */
        .tab-content {
            padding: 0 20px 20px 20px;
            display: none;
        }
        .tab-content.active {
            display: block;
        }

        /* Стиль вікна камери */
        .camera-wrapper {
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            border: 3px solid #ddd;
            background: #000;
            aspect-ratio: 4/3;
            position: relative;
        }
        #reader {
            width: 100% !important;
            border: none !important;
        }
        #reader video {
            object-fit: cover !important;
        }
        /* Кастомізація внутрішніх кнопок бібліотеки html5-qrcode */
        #reader button {
            background: var(--bd-red) !important;
            color: white !important;
            border: none !important;
            padding: 10px 20px !important;
            border-radius: 8px !important;
            font-weight: bold !important;
            cursor: pointer;
            margin: 10px 0 !important;
        }
        #reader select {
            padding: 6px;
            border-radius: 6px;
            margin-top: 5px;
            width: 90%;
        }

        /* Форма ручного введення */
        .input-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
            margin-top: 10px;
        }
        .input-group input {
            width: 100%;
            padding: 14px;
            border: 2px solid #ccc;
            border-radius: 12px;
            font-size: 18px;
            text-align: center;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .input-group input:focus {
            border-color: var(--bd-red);
            outline: none;
        }
        .submit-btn {
            background: var(--bd-red);
            color: white;
            border: none;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            border-radius: 12px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 4px 12px rgba(227,27,35,0.2);
            transition: background 0.2s;
        }
        .submit-btn:hover { background: var(--bd-dark-red); }

        /* Блок Результатів */
        .result-box {
            margin-top: 20px;
            background: #f8f9fa;
            border: 2px dashed #ddd;
            border-radius: 14px;
            padding: 15px;
            text-align: center;
            display: none;
        }
        .result-box.active { display: block; }
        .card-num-badge {
            font-size: 18px;
            font-weight: bold;
            background: #fff;
            padding: 6px 15px;
            border-radius: 20px;
            border: 1px solid #ccc;
            display: inline-block;
            margin-bottom: 10px;
        }
        
        /* Статуси */
        .status-msg { font-size: 18px; font-weight: bold; margin: 10px 0; }
        .status-ok { color: #2e7d32; }
        .status-fail { color: #c62828; }
        .status-wait { color: #666; font-style: italic; }

    </style>
</head>
<body>

<!-- Анімоване тло із сонечками -->
<div class="ladybug bug1"><div class="bug-dots"></div></div>
<div class="ladybug bug2"><div class="bug-dots"></div></div>
<div class="ladybug bug3"><div class="bug-dots"></div></div>

<div class="main-card">
    <div class="brand-header">
        <h1>Moja Biedronka</h1>
        <p>Сканер та перевірка карток</p>
    </div>

    <!-- Кнопки перемикання режимів -->
    <div class="tab-controls">
        <button class="tab-btn active" onclick="switchTab('scan-tab')">📷 Камера</button>
        <button class="tab-btn" onclick="switchTab('input-tab')">⌨️ Ввести код</button>
    </div>

    <!-- ВКЛАДКА 1: СКАНИРОВАНИЕ -->
    <div id="scan-tab" class="tab-content active">
        <div class="camera-wrapper">
            <div id="reader"></div>
        </div>
    </div>

    <!-- ВКЛАДКА 2: РУЧНОЙ ВВОД -->
    <div id="input-tab" class="tab-content">
        <div class="input-group">
            <input type="number" id="manualCodeInput" placeholder="Введіть 13 цифр коду" pattern="\d*">
            <button class="submit-btn" onclick="processManualInput()">Перевірити картку</button>
        </div>
    </div>

    <!-- БЛОК РЕЗУЛЬТАТІВ -->
    <div class="result-box" id="resultBox">
        <span class="card-num-badge" id="displayCardNum">2300000000000</span>
        <div id="statusOutput"></div>
    </div>
</div>

<script>
    let html5QrcodeScanner;
    
    // Перемикання вкладок
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');

        // Якщо перемикаємось на ручне введення — зупиняємо камеру, щоб не сідав акумулятор
        if (tabId === 'input-tab' && html5QrcodeScanner) {
            html5QrcodeScanner.clear().catch(err => console.log(err));
        } else if (tabId === 'scan-tab') {
            initScanner();
        }
    }

    // Ініціалізація та запуск камери
    function initScanner() {
        if (!html5QrcodeScanner) {
            html5QrcodeScanner = new Html5QrcodeScanner(
                "reader", 
                { 
                    fps: 15, 
                    qrbox: { width: 260, height: 140 },
                    aspectRatio: 1.333333, // Співвідношення 4:3 для мобільних
                    supportedScanTypes: [Html5QrcodeSupportedScanTypes.SCAN_TYPE_CAMERA]
                }, 
                false
            );
        }
        html5QrcodeScanner.render(onScanSuccess, onScanFailure);
    }

    // Обробка успішного сканування камерою
    function onScanSuccess(decodedText) {
        // Сигналізуємо звуком чи вібрацією за наявності підтримки
        if (navigator.vibrate) navigator.vibrate(100);
        
        showResult(decodedText);
        
        // Зупиняємо камеру після успішного сканування
        html5QrcodeScanner.clear().catch(err => console.log(err));
    }

    function onScanFailure(error) { /* ігноруємо пусті кадри */ }

    // Обробка ручного введення тексту
    function processManualInput() {
        const inputVal = document.getElementById('manualCodeInput').value.trim();
        if (inputVal.length < 5) {
            alert("Будь ласка, введіть коректний номер картки!");
            return;
        }
        showResult(inputVal);
    }

    // Відображення результатів та запуск перевірки статусу
    function showResult(code) {
        const resultBox = document.getElementById('resultBox');
        const displayCardNum = document.getElementById('displayCardNum');
        
        displayCardNum.innerText = "Картка: " + code;
        resultBox.classList.add('active');
        
        checkCardApi(code);
    }

    // Симуляція запиту до зовнішнього сервісу реєстру штрих-кодів (як у попередньому прикладі)
    async function checkCardApi(cardNumber) {
        const statusOutput = document.getElementById('statusOutput');
        statusOutput.innerHTML = '<p class="status-wait">⏳ Перевірка у базі даних...</p>';

        try {
            const ean = cardNumber.padStart(13, '0');
            // Використовуємо публічний CORS проксі
            const proxy = 'https://cors-anywhere.herokuapp.com/';
            const api = `https://api.upcitemdb.com/prod/trial/lookup?upc=${ean}`;

            const response = await fetch(proxy + api);
            if (!response.ok) throw new Error("Помилка мережі");
            
            const data = await response.json();
            
            // Перевіряємо, чи є в базі згадки про картки Biedronka
            const isExist = data.items && data.items.length > 0 && 
                            data.items.some(i => 
                                i.title.toLowerCase().includes('biedronka') || 
                                i.description.toLowerCase().includes('loyalty')
                            );

            if (isExist) {
                statusOutput.innerHTML = '<p class="status-ok">✅ КАРТКА ДІЙСНА (Активна)</p>';
            } else {
                statusOutput.innerHTML = '<p class="status-fail">❌ ЗАБЛОКОВАНА АБО НЕ ІСНУЄ</p>';
            }
        } catch (e) {
            // Заглушка на випадок блокування проксі чи відсутності інтернету
            statusOutput.innerHTML = '<p class="status-wait">⚠️ Перевірка через API недоступна (Спробуйте пізніше)</p>';
        }
    }

    // Запускаємо камеру відразу при завантаженні сторінки
    window.addEventListener('load', initScanner);
</script>

</body>
</html>
