<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PureDrop Ultimate | V10</title>
    <style>
        :root {
            --accent: #57AF20;
            --bg: #0b0b0c;
            --surface: #161618;
            --border: rgba(255,255,255,0.08);
            --text: #ffffff;
            --text-dim: #94949b;
            --danger: #ff4444;
            --glass: rgba(255, 255, 255, 0.03);
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; outline: none; }
        body { background: var(--bg); color: var(--text); margin: 0; overflow-x: hidden; }

        /* ANIMATIONS */
        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        @keyframes scaleIn { from { opacity: 0; transform: scale(0.9); } to { opacity: 1; transform: scale(1); } }

        header { 
            padding: 15px 20px; display: flex; justify-content: space-between; align-items: center; 
            background: rgba(11,11,12,0.8); backdrop-filter: blur(15px); border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }

        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; animation: fadeInUp 0.6s ease; }
        .app-card { background: var(--surface); border-radius: 28px; padding: 15px; border: 1px solid var(--border); text-align: center; transition: 0.3s; position: relative; overflow: hidden; }
        .app-card:active { transform: scale(0.95); }
        .app-card img { width: 90px; height: 90px; border-radius: 24px; object-fit: cover; margin-bottom: 10px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }

        /* MODALS */
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 2000; transform: translateY(100%); transition: 0.5s cubic-bezier(0.3, 1, 0.3, 1); padding: 0; overflow-y: auto; }
        .modal.active { transform: translateY(0); }
        .modal-content { padding: 20px; position: relative; z-index: 2; }
        
        .post-bg { position: absolute; top: 0; left: 0; width: 100%; height: 300px; background-size: cover; background-position: center; filter: blur(30px) brightness(0.5); z-index: 1; opacity: 0.6; }

        /* GALLERY */
        .gallery { display: flex; gap: 12px; overflow-x: auto; margin: 20px -20px; padding: 0 20px; scrollbar-width: none; }
        .gallery img { height: 180px; border-radius: 18px; border: 1px solid var(--border); flex-shrink: 0; transition: 0.3s; }
        .gallery img:active { transform: scale(0.98); }

        /* AUTH BOX */
        #authBox { position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 9999; display: none; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .auth-card { background: var(--surface); padding: 30px; border-radius: 30px; border: 1px solid var(--border); width: 90%; max-width: 350px; text-align: center; animation: scaleIn 0.3s ease; }

        /* ADMIN PANEL */
        #adminPanel { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; padding: 10px; background: var(--glass); border-radius: 20px; }
        
        .tab-btn { flex: 1; padding: 12px; background: none; border: none; color: var(--text-dim); font-weight: bold; border-bottom: 2px solid transparent; }
        .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }

        .admin-input { width: 100%; background: #0f0f10; border: 1px solid #222; padding: 15px; border-radius: 16px; color: white; margin-bottom: 12px; transition: 0.3s; }
        .admin-input:focus { border-color: var(--accent); }

        .manage-card { background: #111; padding: 15px; border-radius: 22px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid var(--border); }

        .btn { padding: 15px; border-radius: 18px; border: none; font-weight: 800; cursor: pointer; transition: 0.3s; }
        .btn-primary { background: var(--accent); color: white; width: 100%; box-shadow: 0 5px 15px rgba(87,175,32,0.3); }
        .btn-edit { background: rgba(87,175,32,0.1); color: var(--accent); border: 1px solid var(--accent); padding: 8px 15px; }
        .btn-del { background: rgba(255,68,68,0.1); color: var(--danger); border: 1px solid var(--danger); padding: 8px 15px; margin-left: 5px; }

        #fullview { position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 10000; display: none; align-items: center; justify-content: center; }
        #fullview img { max-width: 95%; max-height: 85%; border-radius: 15px; }
    </style>
</head>
<body>

    <!-- ВХІД В АДМІНКУ -->
    <div id="authBox">
        <div class="auth-card">
            <div style="font-size: 40px; margin-bottom: 15px;">🔐</div>
            <h2 style="margin: 0 0 20px 0;">Вхід в Terminal</h2>
            <input type="password" id="passInput" class="admin-input" placeholder="Введіть пароль..." style="text-align: center;">
            <button onclick="checkPass()" class="btn btn-primary">УВІЙТИ</button>
            <p onclick="document.getElementById('authBox').style.display='none'" style="margin-top: 15px; font-size: 12px; color: var(--text-dim);">СКАСУВАТИ</p>
        </div>
    </div>

    <header>
        <div class="brand" style="font-size: 22px;">PURE<span>DROP</span></div>
        <div style="background: var(--accent); width: 8px; height: 8px; border-radius: 50%; box-shadow: 0 0 10px var(--accent);"></div>
    </header>

    <div class="main-grid" id="appGrid"></div>

    <div onclick="document.getElementById('authBox').style.display='flex'" style="text-align:center; padding:60px; opacity:0.05; font-size:10px; cursor:pointer;">ADMIN_LOGIN_PORTAL</div>

    <!-- МОДАЛКА ГРИ -->
    <div id="appModal" class="modal">
        <div class="post-bg" id="modalBg"></div>
        <div class="modal-content">
            <div onclick="closeApp()" style="background: rgba(0,0,0,0.5); width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; cursor: pointer; backdrop-filter: blur(10px); margin-bottom: 20px;">✕</div>
            <div id="modalBody"></div>
        </div>
    </div>

    <!-- ПЕРЕГЛЯД СКРІНІВ -->
    <div id="fullview" onclick="this.style.display='none'"><img id="fullimg" src=""></div>

    <!-- АДМІН ПАНЕЛЬ -->
    <div id="adminPanel">
        <div class="admin-header">
            <b style="color:var(--accent); font-size:18px;">🛠 CONTROL PANEL</b>
            <button onclick="toggleAdmin(false)" style="background:none; border:none; color:var(--danger); font-weight:bold;">LOCK</button>
        </div>

        <div style="display:flex; margin-bottom: 20px; background: #111; border-radius: 15px; padding: 5px;">
            <button class="tab-btn active" id="tabAdd" onclick="switchTab('add')">ДОДАТИ</button>
            <button class="tab-btn" id="tabManage" onclick="switchTab('manage')">КЕРУВАТИ</button>
        </div>

        <div id="panelAdd">
            <div style="background: #111; padding: 20px; border-radius: 25px; border: 1px solid #222;">
                <input type="text" id="addName" class="admin-input" placeholder="Назва проєкту">
                <input type="text" id="addIcon" class="admin-input" placeholder="URL Аватарки">
                <input type="text" id="addBack" class="admin-input" placeholder="URL фону (для модалки)">
                <input type="text" id="addScreens" class="admin-input" placeholder="Скріншоти через кому">
                <input type="text" id="addLink" class="admin-input" placeholder="Посилання скачування">
                <input type="text" id="addSite" class="admin-input" placeholder="Офіційний сайт">
                <textarea id="addDesc" class="admin-input" placeholder="Опис проєкту..." style="height:100px"></textarea>
                <button id="mainBtn" onclick="saveData()" class="btn btn-primary">ОПУБЛІКУВАТИ</button>
            </div>
        </div>

        <div id="panelManage" style="display:none;">
            <div id="adminList"></div>
        </div>
    </div>

    <script>
        let db = JSON.parse(localStorage.getItem('puredrop_v10')) || [];
        let currentEditId = null;
        const ADMIN_PASS = "2oo61985puredrop";

        function render() {
            const grid = document.getElementById('appGrid');
            grid.innerHTML = db.map(item => `
                <div class="app-card" onclick="openApp(${item.id})">
                    <img src="${item.icon || 'https://cdn-icons-png.flaticon.com/512/6831/6831000.png'}">
                    <div style="font-weight:900; font-size:15px; letter-spacing:-0.5px;">${item.name}</div>
                </div>
            `).join('');

            const list = document.getElementById('adminList');
            list.innerHTML = db.map(item => `
                <div class="manage-card">
                    <span style="font-weight:bold;">${item.name}</span>
                    <div>
                        <button class="btn-edit" onclick="prepareEdit(${item.id})">EDIT</button>
                        <button class="btn-del" onclick="deleteItem(${item.id})">DEL</button>
                    </div>
                </div>
            `).join('');
        }

        function checkPass() {
            if(document.getElementById('passInput').value === ADMIN_PASS) {
                document.getElementById('authBox').style.display = 'none';
                toggleAdmin(true);
            } else {
                alert("❌ ПАРОЛЬ НЕВІРНИЙ");
            }
            document.getElementById('passInput').value = '';
        }

        function saveData() {
            const name = document.getElementById('addName').value;
            if(!name) return alert("Введіть назву!");

            const payload = {
                id: currentEditId || Date.now(),
                name,
                icon: document.getElementById('addIcon').value,
                back: document.getElementById('addBack').value,
                screens: document.getElementById('addScreens').value.split(',').map(s => s.trim()).filter(s => s !== ""),
                link: document.getElementById('addLink').value,
                site: document.getElementById('addSite').value,
                desc: document.getElementById('addDesc').value
            };

            if(currentEditId) {
                db = db.map(i => i.id === currentEditId ? payload : i);
                currentEditId = null;
                document.getElementById('mainBtn').innerText = "ОПУБЛІКУВАТИ";
            } else {
                db.push(payload);
            }

            localStorage.setItem('puredrop_v10', JSON.stringify(db));
            render();
            alert("СИНХРОНІЗОВАНО!");
            ['addName','addIcon','addBack','addScreens','addLink','addSite','addDesc'].forEach(id => document.getElementById(id).value = '');
            switchTab('manage');
        }

        function prepareEdit(id) {
            const item = db.find(i => i.id === id);
            document.getElementById('addName').value = item.name;
            document.getElementById('addIcon').value = item.icon;
            document.getElementById('addBack').value = item.back || '';
            document.getElementById('addScreens').value = item.screens.join(', ');
            document.getElementById('addLink').value = item.link;
            document.getElementById('addSite').value = item.site;
            document.getElementById('addDesc').value = item.desc;
            currentEditId = id;
            document.getElementById('mainBtn').innerText = "ОБНОВИТИ ДАНІ";
            switchTab('add');
        }

        function openApp(id) {
            const item = db.find(i => i.id === id);
            const imgs = item.screens.map(s => `<img src="${s}" onclick="fullView('${s}')">`).join('');
            
            document.getElementById('modalBg').style.backgroundImage = `url(${item.back || item.icon})`;
            document.getElementById('modalBody').innerHTML = `
                <div style="text-align:center; position:relative; z-index:2;">
                    <img src="${item.icon}" style="width:120px; height:120px; border-radius:30px; border:4px solid var(--accent); background:#000;">
                    <h1 style="margin:15px 0 5px 0; font-size:28px;">${item.name}</h1>
                    <div class="gallery">${imgs}</div>
                    <div style="text-align:left; color:rgba(255,255,255,0.8); background:rgba(0,0,0,0.4); padding:20px; border-radius:24px; font-size:15px; line-height:1.6; backdrop-filter:blur(10px); border:1px solid var(--border);">
                        ${item.desc || 'Опис відсутній...'}
                    </div>
                    <div style="padding-bottom: 40px;">
                        <a href="${item.link}" target="_blank" style="text-decoration:none;"><button class="btn btn-primary" style="margin-top:20px; padding:20px;">ЗАВАНТАЖИТИ APK</button></a>
                        ${item.site ? `<a href="${item.site}" target="_blank" class="site-btn" style="text-decoration:none; display:block; margin-top:10px; color:white; padding:15px; background:rgba(255,255,255,0.05); border-radius:18px; border:1px solid var(--border);">ОФІЦІЙНИЙ САЙТ</a>` : ''}
                    </div>
                </div>
            `;
            document.getElementById('appModal').classList.add('active');
        }

        function switchTab(t) {
            document.getElementById('panelAdd').style.display = t === 'add' ? 'block' : 'none';
            document.getElementById('panelManage').style.display = t === 'manage' ? 'block' : 'none';
            document.getElementById('tabAdd').className = t === 'add' ? 'tab-btn active' : 'tab-btn';
            document.getElementById('tabManage').className = t === 'manage' ? 'tab-btn active' : 'tab-btn';
        }

        function fullView(src) { document.getElementById('fullimg').src = src; document.getElementById('fullview').style.display = 'flex'; }
        function toggleAdmin(s) { document.getElementById('adminPanel').style.display = s ? 'flex' : 'none'; if(s) switchTab('manage'); }
        function closeApp() { document.getElementById('appModal').classList.remove('active'); }
        function deleteItem(id) { if(confirm("Видалити?")) { db = db.filter(i => i.id !== id); localStorage.setItem('puredrop_v10', JSON.stringify(db)); render(); } }

        render();
    </script>
</body>
</html>
