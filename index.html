<script>
// Твій актуальний конфіг від проекту keysbrawl
const firebaseConfig = {
  apiKey: "AIzaSyAmCzZAEKq4BMo6eWAN96IawhF95cH1sHM",
  authDomain: "keysbrawl-c4ae6.firebaseapp.com",
  projectId: "keysbrawl-c4ae6",
  storageBucket: "keysbrawl-c4ae6.firebasestorage.app",
  messagingSenderId: "1090859079662",
  appId: "1:1090859079662:web:932bf6463cb0601083a0ff",
  measurementId: "G-PJR0BQBYVM"
};

// Ініціалізація (використовуємо методи для версії Compat, як у твоїх підключених бібліотеках)
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

let currentChatId = null;

// Функція входу
function login() {
  const provider = new firebase.auth.GoogleAuthProvider();
  auth.signInWithPopup(provider).catch(err => {
    alert("Помилка авторизації: " + err.message);
  });
}

function formatTime(t) {
  return new Date(t).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
}

// Слідкуємо за станом входу
auth.onAuthStateChanged(async u => {
  if (u) {
    document.getElementById("login").style.display = "none";
    document.getElementById("app").style.display = "flex";

    // Зберігаємо юзера в базу
    await db.collection("users").doc(u.uid).set({
      name: u.displayName,
      photo: u.photoURL,
      lastSeen: Date.now()
    }, { merge: true });

    loadUsers();
  }
});

// Завантаження списку контактів
function loadUsers() {
  db.collection("users").onSnapshot(s => {
    let box = document.getElementById("users");
    box.innerHTML = "";
    s.forEach(d => {
      if (d.id === auth.currentUser.uid) return;
      let userData = d.data();
      let div = document.createElement("div");
      div.className = "item";
      div.innerText = userData.name;
      div.onclick = () => openChat(d.id, userData.name);
      box.appendChild(div);
    });
  });
}

// Відкриття чату
function openChat(id, name) {
  currentChatId = id;
  document.getElementById("title").innerText = name;
  loadMessages();
}

// Надсилання повідомлення
function send() {
  let textInput = document.getElementById("text");
  let text = textInput.value;
  if (!text || !currentChatId) return;

  const chatId = [auth.currentUser.uid, currentChatId].sort().join("_");

  db.collection("chats").doc(chatId).collection("m").add({
    text: text,
    uid: auth.currentUser.uid,
    time: Date.now()
  });

  textInput.value = "";
}

// Завантаження повідомлень у реальному часі
function loadMessages() {
  const chatId = [auth.currentUser.uid, currentChatId].sort().join("_");
  db.collection("chats").doc(chatId).collection("m")
    .orderBy("time")
    .onSnapshot(s => {
      let box = document.getElementById("messages");
      box.innerHTML = "";
      s.forEach(d => {
        let m = d.data();
        let isMe = m.uid === auth.currentUser.uid;
        
        box.innerHTML += `
          <div class="msg ${isMe ? 'me' : ''}">
            ${m.text}
            <div class="time">${formatTime(m.time)}</div>
          </div>`;
      });
      box.scrollTop = box.scrollHeight;
    });
}
</script>
