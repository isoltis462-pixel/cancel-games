<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PureDrop Cloud Admin Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent: #3b82f6; --bg: #0b0b0c; --surface: #161618; --border: rgba(255,255,255,0.06); }
        body { background: var(--bg); color: white; font-family: 'Inter', sans-serif; margin: 0; overflow-x: hidden; }
        
        /* Кнопка входу */
        .register-btn { position: absolute; top: 15px; right: 20px; font-size: 11px; color: #333; background: none; border: none; cursor: pointer; z-index: 100; font-weight: 800; text-transform: uppercase; letter-spacing: 1px; transition: 0.3s; }
        .register-btn:hover { color: var(--accent); }

        /* Сітка ігор */
        .game-card { background: var(--surface); border: 1px solid var(--border); border-radius: 28px; transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .game-card:hover { transform: translateY(-8px); border-color: var(--accent); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }

        /* Адмін панель */
        .admin-layer { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; overflow-y: auto; padding: 40px 20px; }
        
        /* Редактор */
        #editorModal { position: fixed; inset: 0; background: #0b0b0c; z-index: 6000; display: none; flex-direction: row; }
        @media (max-width: 768px) { #editorModal { flex-direction: column; } }

        .preview-side { flex: 1; background: #000; display: flex; align-items: center; justify-content: center; border-right: 1px solid var(--border); padding: 20px; }
        .settings-side { width: 400px; padding: 40px; background: #111; overflow-y: auto; }

        .admin-input { width: 100%; background: #1a1a1c; border: 1px solid #333; padding: 14px; border-radius: 16px; color: white; margin-bottom: 15px; font-size: 14px; outline: none; }
        .admin-input:focus { border-color: var(--accent); }

        .btn-accent { background: var(--accent); color: white; width: 100%; padding: 16px; border-radius: 18px; font-weight: 900; cursor: pointer; border: none; transition: 0.3s; }
        .btn-accent:hover { transform: scale(1.02); background: #2563eb; }

        .empty-state { text-align: center; padding: 100px 20px; color: #333; }
    </style>
</head>
<body>

    <button onclick="handleAuth()" class="register-btn" id="authBtn">register</button>

    <header class="py-16 text-center">
        <h1 class="text-6xl font-black tracking-tighter italic text-blue-600">PURE<span class="text-white">DROP</span></h1>
        <p class="text-gray-600 text-sm mt-4 font-bold tracking-[0.3em]">CLOUD ARCHIVE v12.0</p>
    </header>

    <main class="max-w-7xl mx-auto px-8 pb-32">
        <div id="games-grid" class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-8"></div>
        <div id="empty-msg" class="empty-state hidden">
            <p class="font-bold uppercase tracking-widest text-[10px]">Хмара порожня. Зайдіть в адмінку для завантаження.</p>
        </div>
    </main>

    <!-- ПАНЕЛЬ КЕРУВАННЯ -->
    <div id="adminPanel" class="admin-layer">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-12">
                <h2 class="text-4xl font-black italic">DATABASE<span class="text-blue-600">.</span></h2>
                <button onclick="logout()" class="text-red-500 font-bold text-xs uppercase">Logout</button>
            </div>

            <div onclick="openVisualEditor()" class="bg-blue-600 p-8 rounded-[32px] cursor-pointer hover:bg-blue-500 transition mb-10 text-center">
                <div class="text-xl font-black">+ ДОДАТИ НОВИЙ ПРОЕКТ</div>
            </div>

            <div id="admin-list" class="space-y-4"></div>
            <button onclick="closeAdmin()" class="mt-12 w-full py-4 text-gray-700 font-bold uppercase text-[10px]">Закрити</button>
        </div>
    </div>

    <!-- ВІЗУАЛЬНИЙ РЕДАКТОР -->
    <div id="editorModal">
        <div class="preview-side">
            <div id="livePreviewContent" class="w-full max-w-sm"></div>
        </div>
        <div class="settings-side">
            <h3 class="text-2xl font-black mb-8 text-blue-500">Editor</h3>
            <input type="text" id="edName" class="admin-input" placeholder="Назва" oninput="updatePreview()">
            <input type="text" id="edIcon" class="admin-input" placeholder="URL іконки" oninput="updatePreview()">
            <textarea id="edDesc" class="admin-input h-32" placeholder="Опис" oninput="updatePreview()"></textarea>
            <input type="text" id="edScreens" class="admin-input" placeholder="Скріншоти (через кому)" oninput="updatePreview()">
            <input type="text" id="edLink" class="admin-input" placeholder="Прямий лінк на APK">
            <button onclick="saveGame()" class="btn-accent mt-4">ОПУБЛІКУВАТИ</button>
            <button onclick="closeVisualEditor()" class="w-full mt-4 text-gray-500 font-bold text-xs">BACK</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, onSnapshot, addDoc, updateDoc, doc, deleteDoc, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmCzZAEKq4BMo6eWAN96IawhF95cH1sHM",
            authDomain: "keysbrawl-c4ae6.firebaseapp.com",
            projectId: "keysbrawl-c4ae6",
            storageBucket: "keysbrawl-c4ae6.firebasestorage.app",
            messagingSenderId: "1090859079662",
            appId: "1:1090859079662:web:0fb901aee2e2d65c83a0ff"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const ADMIN_EMAIL = "isoltis462@gmail.com";
        const ADMIN_PASS = "puredrop_admin_panel_254";
        let currentEditId = null;

        // Перевірка стану
        onAuthStateChanged(auth, (user) => {
            const btn = document.getElementById('authBtn');
            if (user && user.email === ADMIN_EMAIL) {
                btn.innerText = "OPEN ADMIN";
                btn.style.color = "#3b82f6";
            } else {
                btn.innerText = "register";
                btn.style.color = "#333";
            }
        });

        // Вхід + Пароль
        window.handleAuth = async () => {
            const user = auth.currentUser;
            
            const openPanelWithPassword = () => {
                const pass = prompt("Введіть пароль до адмін-панелі:");
                if (pass === ADMIN_PASS) {
                    document.getElementById('adminPanel').style.display = 'block';
                } else if (pass !== null) {
                    alert("Невірний пароль!");
                }
            };

            if (user && user.email === ADMIN_EMAIL) {
                openPanelWithPassword();
            } else {
                const provider = new GoogleAuthProvider();
                provider.setCustomParameters({ prompt: 'select_account' });
                try {
                    const result = await signInWithPopup(auth, provider);
                    if (result.user.email === ADMIN_EMAIL) {
                        openPanelWithPassword();
                    } else {
                        alert("Доступ заборонено.");
                        await signOut(auth);
                    }
                } catch (e) {
                    alert("Помилка! Перевір чи додав ти домен у Authorized domains в Firebase.");
                }
            }
        };

        window.logout = () => signOut(auth).then(() => location.reload());
        window.closeAdmin = () => document.getElementById('adminPanel').style.display = 'none';

        // Дані в реальному часі
        const q = query(collection(db, "games"), orderBy("updatedAt", "desc"));
        onSnapshot(q, (snapshot) => {
            const grid = document.getElementById('games-grid');
            const adminList = document.getElementById('admin-list');
            grid.innerHTML = ''; adminList.innerHTML = '';
            
            if (snapshot.empty) document.getElementById('empty-msg').classList.remove('hidden');
            else document.getElementById('empty-msg').classList.add('hidden');

            snapshot.forEach((d) => {
                const g = d.data(); const id = d.id;
                grid.innerHTML += `
                    <div class="game-card p-6 text-center">
                        <img src="${g.icon}" class="w-20 h-20 mx-auto rounded-[28px] object-cover mb-4 shadow-xl">
                        <h3 class="font-black text-[11px] uppercase truncate">${g.name}</h3>
                        <a href="${g.link}" target="_blank" class="block mt-4 bg-white text-black py-2 rounded-xl text-[9px] font-black uppercase">Download</a>
                    </div>`;
                
                adminList.innerHTML += `
                    <div class="bg-zinc-900 p-4 rounded-2xl flex justify-between items-center border border-white/5">
                        <div class="flex items-center gap-3">
                            <img src="${g.icon}" class="w-10 h-10 rounded-lg object-cover">
                            <span class="font-bold text-sm">${g.name}</span>
                        </div>
                        <div class="flex gap-2">
                            <button onclick='editGame("${id}", ${JSON.stringify(g).replace(/'/g, "&apos;")})' class="text-blue-500 font-bold text-xs px-2">EDIT</button>
                            <button onclick="deleteGame('${id}')" class="text-red-500 font-bold text-xs px-2">DEL</button>
                        </div>
                    </div>`;
            });
        });

        // Логіка редактора
        window.openVisualEditor = () => {
            currentEditId = null;
            document.querySelectorAll('.admin-input').forEach(i => i.value = '');
            document.getElementById('editorModal').style.display = 'flex';
            updatePreview();
        };

        window.closeVisualEditor = () => document.getElementById('editorModal').style.display = 'none';

        window.updatePreview = () => {
            const name = document.getElementById('edName').value || "Project Name";
            const icon = document.getElementById('edIcon').value || "https://cdn-icons-png.flaticon.com/512/6831/6831000.png";
            document.getElementById('livePreviewContent').innerHTML = `
                <div class="bg-zinc-900 p-10 rounded-[45px] text-center shadow-2xl border border-white/5">
                    <img src="${icon}" class="w-24 h-24 mx-auto rounded-[32px] mb-6 shadow-2xl object-cover">
                    <h2 class="text-2xl font-black italic uppercase">${name}</h2>
                    <div class="mt-8 py-4 bg-blue-600 rounded-2xl font-black text-xs uppercase">Preview</div>
                </div>`;
        };

        window.saveGame = async () => {
            const data = {
                name: document.getElementById('edName').value,
                icon: document.getElementById('edIcon').value,
                desc: document.getElementById('edDesc').value,
                screens: document.getElementById('edScreens').value.split(','),
                link: document.getElementById('edLink').value,
                updatedAt: new Date()
            };
            if(currentEditId) await updateDoc(doc(db, "games", currentEditId), data);
            else await addDoc(collection(db, "games"), data);
            closeVisualEditor();
        };

        window.editGame = (id, data) => {
            currentEditId = id;
            document.getElementById('edName').value = data.name;
            document.getElementById('edIcon').value = data.icon;
            document.getElementById('edDesc').value = data.desc;
            document.getElementById('edScreens').value = data.screens.join(',');
            document.getElementById('edLink').value = data.link;
            document.getElementById('editorModal').style.display = 'flex';
            updatePreview();
        };

        window.deleteGame = async (id) => { if(confirm("Видалити цей проект?")) await deleteDoc(doc(db, "games", id)); };
    </script>
</body>
</html>
