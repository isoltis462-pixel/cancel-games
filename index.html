<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PureDrop | Ultimate CMS</title>
    <style>
        :root {
            --accent: #57AF20;
            --bg: #0d0d0f;
            --surface: #1a1a1c;
            --border: #2c2c2e;
            --text: #ffffff;
            --text-dim: #a1a1aa;
            --danger: #ff4444;
            --warning: #ff9800;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: 'Inter', sans-serif; }
        body { background: var(--bg); color: var(--text); margin: 0; padding-bottom: 50px; }

        /* HEADER */
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(13,13,15,0.9); backdrop-filter: blur(10px); z-index: 100; }
        .brand { font-size: 22px; font-weight: 900; }
        .brand span { color: var(--accent); }

        /* MAIN GRID */
        .grid { padding: 20px; display: flex; flex-direction: column; gap: 12px; }
        .card { background: var(--surface); border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid var(--border); }
        .card img { width: 65px; height: 65px; border-radius: 16px; object-fit: cover; }
        .card-info { flex: 1; }
        .card-title { font-weight: 800; display: block; font-size: 16px; }
        .card-type { font-size: 10px; color: var(--accent); text-transform: uppercase; font-weight: 900; letter-spacing: 1px; }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; transform: translateY(100%); transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); padding: 20px; overflow-y: auto; }
        .modal.active { transform: translateY(0); }
        .close-btn { background: none; border: none; color: var(--accent); font-weight: 900; font-size: 18px; margin-bottom: 20px; cursor: pointer; }

        .status-badge { padding: 10px; border-radius: 12px; text-align: center; font-weight: 800; margin-top: 20px; }
        .status-closed { background: rgba(255, 68, 68, 0.1); color: var(--danger); border: 1px solid var(--danger); }
        .dl-btn { width: 100%; padding: 20px; background: var(--accent); color: white; border: none; border-radius: 15px; font-weight: bold; font-size: 16px; margin-top: 20px; }

        /* ADMIN PANEL */
        #adminPanel { position: fixed; inset: 0; background: #000; z-index: 9999; display: none; flex-direction: column; padding: 20px; overflow-y: auto; }
        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .admin-nav { display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; }
        .nav-tab { padding: 10px 20px; background: #222; border-radius: 10px; font-size: 12px; white-space: nowrap; }
        .nav-tab.active { background: var(--accent); }

        .admin-input { width: 100%; background: #111; border: 1px solid #333; padding: 12px; border-radius: 10px; color: white; margin-bottom: 10px; }
        .admin-section { background: #111; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 1px solid #222; }
        
        .manage-item { display: flex; justify-content: space-between; align-items: center; padding: 10px; border-bottom: 1px solid #222; font-size: 13px; }
        .edit-status-btn { padding: 5px 10px; background: var(--warning); border: none; border-radius: 5px; font-size: 10px; font-weight: bold; }
        .del-btn { padding: 5px 10px; background: var(--danger); border: none; border-radius: 5px; font-size: 10px; font-weight: bold; margin-left: 5px; }

        #admin-trigger { text-align: center; padding: 40px; opacity: 0.1; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="brand">PURE<span>DROP</span></div>
        <div id="online-count" style="font-size:12px; color:var(--accent)">ONLINE: 142</div>
    </header>

    <div class="grid" id="appGrid">
        <!-- Картки тут -->
    </div>

    <div id="admin-trigger" onclick="toggleAdmin(true)">[ CONSOLE_LOGIN ]</div>

    <!-- МОДАЛКА ДЕТАЛЕЙ -->
    <div id="appModal" class="modal">
        <button class="close-btn" onclick="closeApp()">✕ НАЗАД</button>
        <div id="modalBody"></div>
    </div>

    <!-- АДМІН ПАНЕЛЬ -->
    <div id="adminPanel">
        <div class="admin-header">
            <div style="color:var(--accent); font-family:monospace; font-weight:bold;">> ADMIN_PANEL_v6</div>
            <button onclick="toggleAdmin(false)" style="background:var(--danger); border:none; color:white; border-radius:8px; padding:5px 15px;">EXIT</button>
        </div>

        <div class="admin-section">
            <h3 style="margin-top:0; font-size:14px;">ДОДАТИ НОВИЙ КОНТЕНТ</h3>
            <input type="text" id="addName" class="admin-input" placeholder="Назва">
            <input type="text" id="addIcon" class="admin-input" placeholder="URL Аватарки (фото)">
            <input type="text" id="addLink" class="admin-input" placeholder="Посилання на скачування">
            <select id="addType" class="admin-input">
                <option value="game">Гра</option>
                <option value="app">Додаток</option>
                <option value="mod">Мод</option>
                <option value="sys">Система</option>
            </select>
            <textarea id="addDesc" class="admin-input" placeholder="Опис проєкту" style="height:80px;"></textarea>
            <button onclick="saveNewItem()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:10px; color:white; font-weight:bold;">ОПУБЛІКУВАТИ НА САЙТ</button>
        </div>

        <div class="admin-section">
            <h3 style="font-size:14px;">КЕРУВАННЯ ІСНУЮЧИМИ (EDIT)</h3>
            <div id="adminList"></div>
        </div>

        <button onclick="clearSystem()" style="width:100%; padding:10px; background:none; border:1px solid #333; color:#555; border-radius:10px; font-size:10px;">ПОВНЕ ОЧИЩЕННЯ СИСТЕМИ (RESET)</button>
    </div>

    <script>
        // Ініціалізація бази даних з пам'яті браузера
        let db = JSON.parse(localStorage.getItem('puredrop_db')) || [
            { id: 1, name: 'Geometry Dash', type: 'game', icon: 'Geometry_Dash_logo (1).webp', desc: 'Повна версія гри.', link: 'https://google.com', status: 'active' }
        ];

        // Функція відображення на головній
        function renderMain() {
            const grid = document.getElementById('appGrid');
            grid.innerHTML = db.map(item => `
                <div class="card" onclick="openApp(${item.id})">
                    <img src="${item.icon}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/6831/6831000.png'">
                    <div class="card-info">
                        <span class="card-type">${item.type}</span>
                        <span class="card-title">${item.name}</span>
                    </div>
                    <div style="color:${item.status === 'active' ? 'var(--accent)' : 'var(--danger)'}">●</div>
                </div>
            `).join('');
            renderAdminList();
        }

        // Рендер списку в адмінці для редагування
        function renderAdminList() {
            const list = document.getElementById('adminList');
            list.innerHTML = db.map(item => `
                <div class="manage-item">
                    <span>${item.name} [${item.status}]</span>
                    <div>
                        <button class="edit-status-btn" onclick="toggleStatus(${item.id})">Змінити статус</button>
                        <button class="del-btn" onclick="deleteItem(${item.id})">Видалити</button>
                    </div>
                </div>
            `).join('');
        }

        // Відкриття модалки
        function openApp(id) {
            const item = db.find(i => i.id === id);
            const body = document.getElementById('modalBody');
            
            let actionHtml = item.status === 'active' 
                ? `<a href="${item.link}"><button class="dl-btn">СКАЧАТИ ЗАРАЗ</button></a>`
                : `<div class="status-badge status-closed">⚠ ГРУ ЗАКРИТО / ТИМЧАСОВО НЕДОСТУПНО</div>`;

            body.innerHTML = `
                <div style="text-align:center">
                    <img src="${item.icon}" style="width:120px; height:120px; border-radius:25px; margin-bottom:20px;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/6831/6831000.png'">
                    <h1 style="margin:0">${item.name}</h1>
                    <p style="color:var(--accent); font-weight:bold; font-size:12px; margin-bottom:20px;">${item.type.toUpperCase()}</p>
                    <div style="text-align:left; background:rgba(255,255,255,0.03); padding:15px; border-radius:15px; line-height:1.6; color:var(--text-dim)">
                        ${item.desc}
                    </div>
                    ${actionHtml}
                </div>
            `;
            document.getElementById('appModal').classList.add('active');
        }

        // Збереження нового
        function saveNewItem() {
            const name = document.getElementById('addName').value;
            const icon = document.getElementById('addIcon').value;
            const link = document.getElementById('addLink').value;
            const type = document.getElementById('addType').value;
            const desc = document.getElementById('addDesc').value;

            if(!name || !link) return alert("Назва та посилання обов'язкові!");

            const newItem = {
                id: Date.now(),
                name, icon, link, type, desc,
                status: 'active'
            };

            db.push(newItem);
            sync();
            alert("Опубліковано!");
            
            // Очистити поля
            ['addName', 'addIcon', 'addLink', 'addDesc'].forEach(id => document.getElementById(id).value = '');
        }

        // Функції адмінки
        function toggleStatus(id) {
            const item = db.find(i => i.id === id);
            item.status = item.status === 'active' ? 'closed' : 'active';
            sync();
        }

        function deleteItem(id) {
            if(confirm("Видалити назавжди?")) {
                db = db.filter(i => i.id !== id);
                sync();
            }
        }

        function sync() {
            localStorage.setItem('puredrop_db', JSON.stringify(db));
            renderMain();
        }

        function toggleAdmin(show) {
            document.getElementById('adminPanel').style.display = show ? 'flex' : 'none';
        }

        function closeApp() { document.getElementById('appModal').classList.remove('active'); }

        function clearSystem() {
            if(confirm("Це видалить ВСІ твої додані ігри. Продовжити?")) {
                localStorage.removeItem('puredrop_db');
                location.reload();
            }
        }

        // Запуск
        renderMain();

        // Імітація онлайну
        setInterval(() => {
            const val = Math.floor(Math.random() * (160 - 130) + 130);
            document.getElementById('online-count').innerText = "ONLINE: " + val;
        }, 5000);
    </script>
</body>
</html>
