  pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});

  localStream.getTracks().forEach(t=>pc.addTrack(t,localStream));

  pc.ontrack=e=>{
    document.getElementById("remoteVideo").srcObject=e.streams[0];
  };

  const callDoc=db.collection("calls").doc(roomId);
  const offerCandidates=callDoc.collection("offerCandidates");
  const answerCandidates=callDoc.collection("answerCandidates");

  pc.onicecandidate=e=>{
    if(e.candidate){
      offerCandidates.add(e.candidate.toJSON());
    }
  };

  const offer=await pc.createOffer();
  await pc.setLocalDescription(offer);

  await callDoc.set({
    offer:{
      type:offer.type,
      sdp:offer.sdp
    },
    caller:auth.currentUser.uid,
    callee:current
  });

  callDoc.onSnapshot(async snap=>{
    const data=snap.data();
    if(!pc.currentRemoteDescription && data?.answer){
      const answer=new RTCSessionDescription(data.answer);
      await pc.setRemoteDescription(answer);
    }
  });

  answerCandidates.onSnapshot(snap=>{
    snap.docChanges().forEach(c=>{
      if(c.type==='added'){
        pc.addIceCandidate(new RTCIceCandidate(c.doc.data()));
      }
    });
  });
}

async function listenCalls(){
  db.collection("calls").onSnapshot(snap=>{
    snap.docChanges().forEach(async change=>{
      if(change.type!=='added')return;

      const data=change.doc.data();

      if(data.callee!==auth.currentUser.uid)return;

      roomId=change.doc.id;

      const callDoc=change.doc.ref;
      const offerCandidates=callDoc.collection("offerCandidates");
      const answerCandidates=callDoc.collection("answerCandidates");

      pc=new RTCPeerConnection({iceServers:[{urls:'stun:stun.l.google.com:19302'}]});

      pc.ontrack=e=>{
        document.getElementById("remoteVideo").srcObject=e.streams[0];
      };

      pc.onicecandidate=e=>{
        if(e.candidate){
          answerCandidates.add(e.candidate.toJSON());
        }
      };

      const offerDesc=new RTCSessionDescription(data.offer);
      await pc.setRemoteDescription(offerDesc);

      const answer=await pc.createAnswer();
      await pc.setLocalDescription(answer);

      await callDoc.update({answer:{type:answer.type,sdp:answer.sdp}});

      offerCandidates.onSnapshot(snap=>{
        snap.docChanges().forEach(c=>{
          if(c.type==='added'){
            pc.addIceCandidate(new RTCIceCandidate(c.doc.data()));
          }
        });
      });
    });
  });
}

function endCall(){
  if(localStream) localStream.getTracks().forEach(t=>t.stop());
  if(pc) pc.close();
}
