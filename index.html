<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PureDrop Hub | Admin Engine</title>
    <style>
        :root {
            --accent: #57AF20;
            --bg: #0d0d0f;
            --surface: #1a1a1c;
            --border: #2c2c2e;
            --text: #ffffff;
            --text-dim: #a1a1aa;
            --danger: #ff4444;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }

        /* HEADER & MAIN */
        header { padding: 20px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid var(--border); position: sticky; top: 0; background: rgba(13,13,15,0.9); backdrop-filter: blur(10px); z-index: 100; }
        .brand { font-size: 22px; font-weight: 900; }
        .brand span { color: var(--accent); }
        
        .search-box { padding: 20px; }
        .search-input { width: 100%; background: var(--surface); border: 1px solid var(--border); padding: 16px; border-radius: 14px; color: white; }

        .grid { padding: 0 20px 100px; display: flex; flex-direction: column; gap: 12px; }
        .card { background: var(--surface); border-radius: 20px; padding: 15px; display: flex; align-items: center; gap: 15px; border: 1px solid var(--border); }
        .card img { width: 60px; height: 60px; border-radius: 14px; }
        .card-info { flex: 1; }
        .card-title { font-weight: 800; display: block; }
        .card-type { font-size: 10px; color: var(--accent); text-transform: uppercase; font-weight: 900; }

        /* ADMIN PANEL (THE CORE) */
        #adminPanel {
            position: fixed; inset: 0; background: #000; z-index: 9999;
            display: none; flex-direction: column; padding: 20px; overflow-y: auto;
        }
        .admin-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 15px; margin-bottom: 20px; }
        .admin-title { font-family: monospace; color: var(--accent); font-weight: bold; }
        .exit-admin { padding: 8px 15px; background: var(--danger); border: none; border-radius: 8px; color: white; font-weight: bold; }

        .admin-stats { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 20px; }
        .stat-card { background: #111; border: 1px solid #222; padding: 15px; border-radius: 12px; text-align: center; }
        .stat-card small { display: block; color: #555; font-size: 10px; }
        .stat-card b { color: var(--accent); font-size: 18px; }

        .admin-form { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; }
        .admin-form h3 { margin-top: 0; font-size: 14px; color: var(--accent); }
        .admin-form input, .admin-form textarea { width: 100%; background: #000; border: 1px solid #333; padding: 12px; border-radius: 8px; color: white; margin-bottom: 10px; }
        .add-btn { width: 100%; padding: 15px; background: var(--accent); border: none; border-radius: 10px; color: white; font-weight: 800; }

        .log-box { margin-top: 20px; background: #050505; border: 1px dashed #333; padding: 15px; font-family: monospace; font-size: 11px; color: #666; max-height: 150px; overflow-y: auto; }
        .log-line { margin-bottom: 5px; border-left: 2px solid var(--accent); padding-left: 8px; }

        /* MODAL */
        .modal { position: fixed; inset: 0; background: var(--bg); z-index: 1000; transform: translateY(100%); transition: 0.4s; padding: 20px; }
        .modal.active { transform: translateY(0); }

        #admin-trigger { text-align: center; padding: 30px; opacity: 0.2; font-size: 10px; letter-spacing: 2px; cursor: pointer; }
    </style>
</head>
<body>

    <header>
        <div class="brand">PURE<span>DROP</span></div>
        <div id="online-count" style="font-size:12px; color:var(--accent)">ONLINE: 142</div>
    </header>

    <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="Пошук контенту..." oninput="doSearch()">
    </div>

    <main class="grid" id="appGrid"></main>

    <div id="admin-trigger" onclick="openAdmin()">[ OPEN_ADMIN_CONSOLE ]</div>

    <!-- АДМІН ПАНЕЛЬ -->
    <div id="adminPanel">
        <div class="admin-header">
            <div class="admin-title">> ROOT@PUREDROP:~#</div>
            <button class="exit-admin" onclick="closeAdmin()">EXIT</button>
        </div>

        <div class="admin-stats">
            <div class="stat-card"><small>TOTAL_ITEMS</small><b id="st-total">0</b></div>
            <div class="stat-card"><small>SYS_STATUS</small><b>ACTIVE</b></div>
        </div>

        <div class="admin-form">
            <h3>ADD NEW CONTENT</h3>
            <input type="text" id="new-name" placeholder="Назва гри/програми">
            <input type="text" id="new-icon" placeholder="URL іконки">
            <input type="text" id="new-type" placeholder="Тип (game/app/mod)">
            <textarea id="new-desc" placeholder="Опис"></textarea>
            <button class="add-btn" onclick="addNewItem()">PUSH TO DATABASE</button>
        </div>

        <div class="log-box" id="sysLog">
            <div class="log-line">System initialized...</div>
            <div class="log-line">Admin session started...</div>
        </div>
    </div>

    <!-- МОДАЛКА ДЕТАЛЕЙ -->
    <div id="appModal" class="modal">
        <button onclick="closeApp()" style="background:none; border:none; color:var(--accent); font-weight:900; font-size:20px; padding:0 0 20px 0;">✕ CLOSE</button>
        <div id="modalBody"></div>
    </div>

    <script>
        // База даних
        let database = [
            { id: 1, name: 'Geometry Dash', type: 'game', icon: 'Geometry_Dash_logo (1).webp', desc: 'Повна версія 2.2', link: '#' },
            { id: 2, name: 'Superkickoff', type: 'game', icon: 'https://play-lh.googleusercontent.com/9nF_Xy1h4w9aL-UfH6F7vE8S0_j_N_x9', desc: 'Футбольний менеджер', link: '#' }
        ];

        // Рендер головного меню
        function render() {
            const grid = document.getElementById('appGrid');
            grid.innerHTML = database.map(item => `
                <div class="card" onclick="openApp(${item.id})">
                    <img src="${item.icon}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/6831/6831000.png'">
                    <div class="card-info">
                        <span class="card-type">${item.type}</span>
                        <span class="card-title">${item.name}</span>
                    </div>
                    <div style="color:var(--accent)">⚡</div>
                </div>
            `).join('');
            document.getElementById('st-total').innerText = database.length;
        }

        // Пошук
        function doSearch() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = database.filter(i => i.name.toLowerCase().includes(q));
            const grid = document.getElementById('appGrid');
            grid.innerHTML = filtered.map(item => `
                <div class="card" onclick="openApp(${item.id})">
                    <img src="${item.icon}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/6831/6831000.png'">
                    <div class="card-info">
                        <span class="card-type">${item.type}</span>
                        <span class="card-title">${item.name}</span>
                    </div>
                </div>
            `).join('');
        }

        // Адмінка: Відкрити/Закрити
        function openAdmin() {
            document.getElementById('adminPanel').style.display = 'flex';
            addLog("Admin accessed console.");
        }
        function closeAdmin() {
            document.getElementById('adminPanel').style.display = 'none';
        }

        // Адмінка: Додати елемент
        function addNewItem() {
            const name = document.getElementById('new-name').value;
            const icon = document.getElementById('new-icon').value;
            const type = document.getElementById('new-type').value;
            const desc = document.getElementById('new-desc').value;

            if(!name) return alert("Введіть назву!");

            const newItem = {
                id: Date.now(),
                name: name,
                type: type || 'app',
                icon: icon || '',
                desc: desc || 'Немає опису',
                link: '#'
            };

            database.push(newItem);
            render();
            addLog(`Added new item: ${name}`);
            
            // Очистка форми
            document.getElementById('new-name').value = '';
            alert("Успішно додано!");
        }

        // Логування
        function addLog(msg) {
            const log = document.getElementById('sysLog');
            const time = new Date().toLocaleTimeString();
            log.innerHTML += `<div class="log-line">[${time}] ${msg}</div>`;
            log.scrollTop = log.scrollHeight;
        }

        // Модалка
        function openApp(id) {
            const item = database.find(i => i.id === id);
            document.getElementById('modalBody').innerHTML = `
                <div style="text-align:center">
                    <img src="${item.icon}" style="width:100px; border-radius:20px; margin-bottom:20px;" onerror="this.src='https://cdn-icons-png.flaticon.com/512/6831/6831000.png'">
                    <h1>${item.name}</h1>
                    <p style="color:var(--text-dim)">${item.desc}</p>
                    <button style="width:100%; padding:20px; background:var(--accent); border:none; border-radius:15px; color:white; font-weight:bold; margin-top:30px;">DOWNLOAD APK</button>
                </div>
            `;
            document.getElementById('appModal').classList.add('active');
            addLog(`Opened details for: ${item.name}`);
        }
        function closeApp() {
            document.getElementById('appModal').classList.remove('active');
        }

        // Старт
        render();
        setInterval(() => {
            const val = Math.floor(Math.random() * (160 - 130) + 130);
            document.getElementById('online-count').innerText = "ONLINE: " + val;
        }, 5000);
    </script>
</body>
</html>
