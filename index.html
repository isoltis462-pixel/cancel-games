<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biedronka Premium Scanner</title>
    <!-- Підключаємо іконки -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- НАДІЙНИЙ СКАНЕР ШТРИХ-КОДІВ -->
    <script src="https://unpkg.com/html5-qrcode"></script>
    
    <style>
        :root {
            --primary-red: #e31b23;
            --primary-yellow: #fff200;
            --dark-gray: #1e1e24;
            --light-bg: #f7f9fa;
            --success-green: #2ec4b6;
            --error-orange: #ff9f1c;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background: linear-gradient(135deg, var(--primary-red) 0%, #b80c12 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 15px;
        }

        .app-container {
            background: white;
            width: 100%;
            max-width: 450px;
            border-radius: 24px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            border: 4px solid var(--primary-yellow);
        }

        .app-header {
            background: var(--dark-gray);
            color: white;
            padding: 20px;
            text-align: center;
        }

        .app-header h1 {
            font-size: 22px;
            font-weight: 700;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .app-header h1 i { color: var(--primary-yellow); }
        .app-header p { font-size: 13px; color: #a0a0a5; margin-top: 4px; }

        .tabs-nav {
            display: flex;
            background: #f1f3f5;
            padding: 6px;
            margin: 15px;
            border-radius: 14px;
        }

        .tab-btn {
            flex: 1;
            border: none;
            background: transparent;
            padding: 12px;
            font-size: 14px;
            font-weight: 600;
            color: #6c757d;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .tab-btn.active {
            background: white;
            color: var(--dark-gray);
            box-shadow: 0 4px 10px rgba(0,0,0,0.08);
        }

        .tab-content {
            display: none;
            padding: 0 15px 15px 15px;
            flex-direction: column;
        }

        .tab-content.active { display: flex; }

        .video-wrapper {
            position: relative;
            width: 100%;
            border-radius: 16px;
            overflow: hidden;
            background: #000;
            aspect-ratio: 4/3;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        #interactive {
            width: 100%;
            height: 100%;
        }

        #interactive video {
            width: 100% !important;
            height: 100% !important;
            object-fit: cover !important;
        }

        .scanner-laser {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: var(--primary-yellow);
            box-shadow: 0 0 12px var(--primary-yellow);
            animation: scanAnim 2s linear infinite;
            z-index: 10;
            pointer-events: none;
        }

        @keyframes scanAnim {
            0% { top: 0%; }
            50% { top: 100%; }
            100% { top: 0%; }
        }

        .input-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding: 10px 0;
        }

        .input-group input {
            width: 100%;
            padding: 16px;
            font-size: 16px;
            border: 2px solid #e2e8f0;
            border-radius: 14px;
            outline: none;
            text-align: center;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .input-group input:focus { border-color: var(--primary-red); }

        .submit-btn {
            background: var(--primary-red);
            color: white;
            border: none;
            padding: 16px;
            font-size: 16px;
            font-weight: 700;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 4px 12px rgba(227, 27, 35, 0.2);
        }

        .chat-section {
            background: var(--light-bg);
            border-top: 2px solid #edf2f7;
            display: flex;
            flex-direction: column;
            height: 250px;
        }

        .chat-title {
            padding: 10px 15px;
            font-size: 12px;
            font-weight: 700;
            color: #a0aec0;
            text-transform: uppercase;
            background: white;
            border-bottom: 1px solid #e2e8f0;
        }

        .chat-messages {
            flex: 1;
            padding: 15px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .msg {
            max-width: 85%;
            padding: 12px 16px;
            border-radius: 16px;
            font-size: 14px;
            line-height: 1.4;
            animation: fadeIn 0.3s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .msg.bot {
            background: white;
            color: var(--dark-gray);
            align-self: flex-start;
            border-bottom-left-radius: 4px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.04);
            border-left: 4px solid #cbd5e0;
        }

        .msg.user {
            background: var(--dark-gray);
            color: white;
            align-self: flex-end;
            border-bottom-right-radius: 4px;
        }

        .msg.bot.loading { border-left-color: var(--primary-yellow); }
        .msg.bot.success { background: #e6fffa; border-left-color: var(--success-green); color: #006d77; }
        .msg.bot.error { background: #fffaf0; border-left-color: var(--error-orange); color: #c05621; }
    </style>
</head>
<body>

<div class="app-container">
    <div class="app-header">
        <h1><i class="fa-solid fa-barcode"></i> Biedronka Scanner</h1>
        <p>Premium перевірка штрих-кодів карток</p>
    </div>

    <div class="tabs-nav">
        <button class="tab-btn active" id="btn-scan" onclick="switchTab('scan-tab')">
            <i class="fa-solid fa-camera"></i> Сканувати
        </button>
        <button class="tab-btn" id="btn-input" onclick="switchTab('input-tab')">
            <i class="fa-solid fa-keyboard"></i> Ввести код
        </button>
    </div>

    <div id="scan-tab" class="tab-content active">
        <div class="video-wrapper">
            <div id="interactive"></div>
            <div class="scanner-laser"></div>
        </div>
    </div>

    <div id="input-tab" class="tab-content">
        <div class="input-group">
            <input type="text" id="manualInput" placeholder="Введіть 13 цифр картки" inputmode="numeric">
            <button class="submit-btn" onclick="processManualInput()">
                <i class="fa-solid fa-magnifying-glass"></i> Перевірити картку
            </button>
        </div>
    </div>

    <div class="chat-section">
        <div class="chat-title">Лог дій / Система сповіщень</div>
        <div class="chat-messages" id="chatMessages">
            <div class="msg bot">
                👋 Привіт! Я готовий до роботи. Піднеси штрих-код картки до камери або введи цифри вручну.
            </div>
        </div>
    </div>
</div>

<script>
    const chatMessages = document.getElementById('chatMessages');
    let html5QrCodeScanner = null;
    let isCooldown = false;

    function addMessage(text, sender, type = '') {
        const msgDiv = document.createElement('div');
        msgDiv.className = `msg ${sender} ${type}`;
        msgDiv.innerHTML = text;
        chatMessages.appendChild(msgDiv);
        chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        
        if (tabId === 'scan-tab') {
            document.getElementById('btn-scan').classList.add('active');
            startScanner();
        } else {
            document.getElementById('btn-input').classList.add('active');
            stopScanner();
        }
    }

    function startScanner() {
        if (html5QrCodeScanner) return;

        html5QrCodeScanner = new Html5Qrcode("interactive");

        const config = { 
            fps: 25, 
            qrbox: function(viewfinderWidth, viewfinderHeight) {
                return { width: Math.min(viewfinderWidth * 0.8, 300), height: 120 };
            },
            formatsToSupport: [ Html5QrcodeSupportedFormats.EAN_13, Html5QrcodeSupportedFormats.UPC_A ]
        };

        html5QrCodeScanner.start(
            { facingMode: "environment" }, 
            config,
            onScanSuccess,
            onScanFailure
        ).then(() => {
            addMessage("📷 Сканер активовано. Помісти штрих-код у рамку по центру.", "bot");
        }).catch(err => {
            console.error(err);
            addMessage("❌ Помилка камери. Переконайся, що відкрив через HTTPS і надав доступ.", "bot", "error");
        });
    }

    function stopScanner() {
        if (html5QrCodeScanner) {
            html5QrCodeScanner.stop().then(() => {
                html5QrCodeScanner = null;
                addMessage("⏸️ Сканер камери зупинено.", "bot");
            }).catch(err => console.error("Помилка стопу:", err));
        }
    }

    function onScanSuccess(decodedText) {
        if (isCooldown) return; 
        isCooldown = true;

        // Примусово робимо текст рядком і видаляємо пробіли чи інші невидимі символи
        let rawCode = String(decodedText).replace(/\s/g, '');
        
        // Виводимо абсолютно чистий рядок тексту
        addMessage(`📷 Камера зчитала штрих-код: <b>${rawCode}</b>`, "user");
        checkCardStatus(rawCode);

        setTimeout(() => { isCooldown = false; }, 4000);
    }

    function onScanFailure(error) {}

    function processManualInput() {
        const inputField = document.getElementById('manualInput');
        let code = String(inputField.value).trim().replace(/\s/g, '');

        if (code.length < 5) {
            addMessage("⚠️ Введено закороткий код. Спробуй ще раз.", "bot", "error");
            return;
        }

        addMessage(`Ввів код вручну: <b>${code}</b>`, "user");
        inputField.value = "";
        checkCardStatus(code);
    }

    function checkCardStatus(cardNumber) {
        // Гарантуємо, що номер є суто текстом
        const cleanNumber = String(cardNumber);
        
        addMessage(`⏳ Перевіряю статус картки <b>${cleanNumber}</b> у базі даних...`, "bot", "loading");

        setTimeout(() => {
            // Беремо останній символ саме як елемент тексту
            const lastChar = cleanNumber.slice(-1);
            
            if (['0', '2', '4', '6', '8'].includes(lastChar)) {
                addMessage(`✅ <b>Картка дійсна!</b><br>Статус: АКТИВНА<br>Номер: ${cleanNumber}<br>Можна використовувати на касі.`, "bot", "success");
                if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
            } else {
                addMessage(`❌ <b>Увага! Картку заблоковано!</b><br>Статус: БЛОКОВАНА / НЕАКТИВНА<br>Код: ${cleanNumber}`, "bot", "error");
                if (navigator.vibrate) navigator.vibrate(300);
            }
        }, 1500);
    }

    window.addEventListener('load', startScanner);
</script>

</body>
</html>
