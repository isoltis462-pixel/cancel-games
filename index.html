<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PureDrop Hub | Elite Edition</title>
    <style>
        :root {
            --accent: #57AF20;
            --bg: #0d0d0f;
            --surface: #1a1a1c;
            --border: #2c2c2e;
            --text: #ffffff;
            --text-dim: #a1a1aa;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; outline: none; }
        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', -apple-system, sans-serif;
            margin: 0; padding: 0;
        }

        /* ШАПКА */
        header {
            padding: 20px; display: flex; justify-content: space-between; align-items: center;
            background: rgba(13, 13, 15, 0.9); backdrop-filter: blur(15px);
            position: sticky; top: 0; z-index: 1000; border-bottom: 1px solid var(--border);
        }
        .brand { font-size: 24px; font-weight: 900; letter-spacing: -1px; }
        .brand span { color: var(--accent); }
        
        .status-pill {
            background: rgba(87, 175, 32, 0.1); border: 1px solid var(--accent);
            padding: 6px 12px; border-radius: 20px; font-size: 11px; font-weight: bold; color: var(--accent);
        }

        /* СИСТЕМНА ПАНЕЛЬ */
        .sys-info {
            margin: 15px 20px; padding: 15px; background: var(--surface);
            border-radius: 16px; border: 1px solid var(--border);
            display: flex; justify-content: space-between; font-size: 11px;
        }
        .sys-item span { display: block; color: var(--text-dim); margin-bottom: 4px; }
        .sys-item b { color: var(--accent); }

        /* ПОШУК */
        .search-box { margin: 10px 20px; position: relative; }
        .search-input {
            width: 100%; background: var(--surface); border: 1px solid var(--border);
            padding: 18px 20px; border-radius: 18px; color: white; font-size: 16px;
            transition: 0.3s ease;
        }
        .search-input:focus { border-color: var(--accent); box-shadow: 0 0 20px rgba(87, 175, 32, 0.1); }

        /* КАТЕГОРІЇ */
        .filter-container {
            display: flex; gap: 10px; overflow-x: auto; padding: 15px 20px; scrollbar-width: none;
        }
        .filter-btn {
            padding: 10px 22px; background: var(--surface); border: 1px solid var(--border);
            border-radius: 14px; font-size: 13px; font-weight: 600; white-space: nowrap; transition: 0.2s;
        }
        .filter-btn.active { background: var(--accent); border-color: var(--accent); box-shadow: 0 5px 15px rgba(87, 175, 32, 0.2); }

        /* ГОЛОВНЕ МЕНЮ (СПИСОК) */
        .main-menu { padding: 10px 20px 100px; display: flex; flex-direction: column; gap: 15px; }
        
        .big-card {
            background: var(--surface); border-radius: 24px; padding: 18px;
            border: 1px solid var(--border); display: flex; align-items: center; gap: 18px;
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .big-card:active { transform: scale(0.96); background: #232326; }
        
        .card-img { width: 75px; height: 75px; border-radius: 18px; object-fit: cover; box-shadow: 0 10px 20px rgba(0,0,0,0.4); }
        
        .card-info { flex: 1; }
        .card-title { font-size: 18px; font-weight: 800; margin-bottom: 4px; display: block; }
        .card-desc { font-size: 12px; color: var(--text-dim); line-height: 1.4; display: block; }
        
        .card-badge {
            font-size: 9px; font-weight: 900; background: var(--accent); color: white;
            padding: 4px 8px; border-radius: 6px; text-transform: uppercase; margin-top: 8px; display: inline-block;
        }

        /* МОДАЛКА (ДЕТАЛІ) */
        .modal {
            position: fixed; inset: 0; background: var(--bg); z-index: 2000;
            transform: translateY(100%); transition: 0.5s cubic-bezier(0.32, 0.72, 0, 1);
            overflow-y: auto; padding-bottom: 120px;
        }
        .modal.active { transform: translateY(0); }
        .close-area { padding: 20px; display: flex; align-items: center; gap: 10px; color: var(--accent); font-weight: 800; cursor: pointer; }

        .m-hero { padding: 20px; text-align: center; }
        .m-hero img { width: 120px; height: 120px; border-radius: 28px; margin-bottom: 20px; box-shadow: 0 20px 40px rgba(0,0,0,0.5); }
        
        .m-stats { display: flex; justify-content: center; gap: 20px; margin: 20px; }
        .m-stat-item { background: var(--surface); padding: 15px; border-radius: 18px; min-width: 100px; text-align: center; border: 1px solid var(--border); }
        .m-stat-item small { font-size: 10px; color: var(--text-dim); display: block; }
        .m-stat-item b { font-size: 14px; color: var(--accent); }

        .m-desc-box { padding: 20px; line-height: 1.8; color: #d1d1d6; background: rgba(255,255,255,0.02); margin: 0 20px; border-radius: 20px; }

        .dl-fixed { position: fixed; bottom: 30px; left: 20px; right: 20px; }
        .dl-btn {
            width: 100%; padding: 22px; background: var(--accent); color: white; border: none;
            border-radius: 22px; font-size: 18px; font-weight: 900; box-shadow: 0 15px 30px rgba(87, 175, 32, 0.3);
        }

        /* ТЕРМІНАЛ */
        #term { position: fixed; inset: 0; background: #000; z-index: 5000; padding: 40px 20px; display: none; font-family: monospace; color: var(--accent); }
    </style>
</head>
<body>

    <header>
        <div class="brand">PURE<span>DROP</span></div>
        <div class="status-pill">● <span id="online-count">142</span> ONLINE</div>
    </header>

    <div class="sys-info">
        <div class="sys-item"><span>СЕРВЕР</span><b>STABLE</b></div>
        <div class="sys-item"><span>ВЕРСІЯ</span><b>5.0.1</b></div>
        <div class="sys-item"><span>РЕГІОН</span><b>UA</b></div>
    </div>

    <div class="search-box">
        <input type="text" id="searchInput" class="search-input" placeholder="Пошук у PureDrop..." oninput="handleSearch()">
    </div>

    <div class="filter-container">
        <div class="filter-btn active" onclick="filterCat('all', this)">Всі</div>
        <div class="filter-btn" onclick="filterCat('game', this)">Ігри</div>
        <div class="filter-btn" onclick="filterCat('app', this)">Програми</div>
        <div class="filter-btn" onclick="filterCat('mod', this)">Моди</div>
        <div class="filter-btn" onclick="filterCat('sys', this)">Система</div>
    </div>

    <main class="main-menu" id="appGrid">
        <!-- Контент генерується тут -->
    </main>

    <div id="admin-node" onclick="toggleTerm()" style="text-align:center; padding:40px; opacity:0.1; font-size:10px;">SYS_NODE_V5</div>

    <!-- МОДАЛКА -->
    <div id="appModal" class="modal">
        <div class="close-area" onclick="closeApp()">✕ ЗАКРИТИ</div>
        <div id="modalBody"></div>
    </div>

    <!-- ТЕРМІНАЛ -->
    <div id="term" onclick="toggleTerm()">
        > ACCESSING ROOT...<br>
        > PUREDROP OS ENCRYPTED<br>
        > ALL SYSTEMS NOMINAL.<br><br>
        > [КЛІКНІТЬ ДЛЯ ВИХОДУ]
    </div>

    <script>
        // БАЗА ДАНИХ (Додавай сюди нові айтеми)
        const database = [
            {
                id: 'gd',
                type: 'game',
                name: 'Geometry Dash',
                icon: 'Geometry_Dash_logo (1).webp',
                version: '2.2.13',
                size: '160 MB',
                short: 'Повна версія легендарного ритм-платформера.',
                desc: 'Geometry Dash Full — це розблоковані всі рівні, скіни та редактор. Ми перевірили цей APK на відсутність вірусів. Насолоджуйся повною свободою дій!',
                link: 'https://www.dropbox.com/scl/fi/cys98ejzhcyiui2yyt0a1/APK-Geometry-Dash-PURE_DROP.apk?rlkey=x9t2scdpbudz48nc5wb01y085&st=y881ck8w&dl=1'
            },
            {
                id: 'sk',
                type: 'game',
                name: 'Superkickoff',
                icon: 'https://play-lh.googleusercontent.com/9nF_Xy1h4w9aL-UfH6F7vE8S0_j_N_x9',
                version: '3.1.2',
                size: '85 MB',
                short: 'Кращий футбольний менеджер для мобільних.',
                desc: 'Керуй своїм клубом, купуй гравців та вигравай ліги. У цій версії покращена стабільність.',
                link: '#'
            },
            {
                id: 'pd_mod',
                type: 'mod',
                name: 'GTA UA Mod',
                icon: 'https://cdn-icons-png.flaticon.com/512/3661/3661313.png',
                version: 'v1.2',
                size: '2.4 GB',
                short: 'Українські машини та локації для GTA.',
                desc: 'Ексклюзивний мод від нашої спільноти. Додає українську поліцію, швидку допомогу та нові текстури доріг.',
                link: '#'
            },
            {
                id: 'sys_tool',
                type: 'sys',
                name: 'Optimizer X',
                icon: 'https://cdn-icons-png.flaticon.com/512/10044/10044816.png',
                version: 'Pro',
                size: '8 MB',
                short: 'Системна утиліта для прискорення ігор.',
                desc: 'Видаляє кеш та оптимізує процесор для максимального FPS у важких іграх.',
                link: '#'
            }
        ];

        // ФУНКЦІЯ ВІДОБРАЖЕННЯ
        function renderApps(items) {
            const grid = document.getElementById('appGrid');
            if(items.length === 0) {
                grid.innerHTML = `<div style="text-align:center; color:var(--text-dim); margin-top:50px;">Нічого не знайдено...</div>`;
                return;
            }
            grid.innerHTML = items.map(app => `
                <div class="big-card" onclick="openApp('${app.id}')">
                    <img src="${app.icon}" class="card-img" onerror="this.src='https://cdn-icons-png.flaticon.com/512/6831/6831000.png'">
                    <div class="card-info">
                        <span class="card-title">${app.name}</span>
                        <span class="card-desc">${app.short}</span>
                        <div class="card-badge">${app.type}</div>
                    </div>
                    <div style="color:var(--accent); font-size:24px;">→</div>
                </div>
            `).join('');
        }

        // ПОШУК (РЕАЛЬНИЙ)
        function handleSearch() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = database.filter(app => app.name.toLowerCase().includes(query) || app.type.toLowerCase().includes(query));
            renderApps(filtered);
        }

        // ФІЛЬТР КАТЕГОРІЙ
        function filterCat(type, btn) {
            document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
            
            if(type === 'all') {
                renderApps(database);
            } else {
                const filtered = database.filter(app => app.type === type);
                renderApps(filtered);
            }
        }

        // МОДАЛКА
        function openApp(id) {
            const app = database.find(a => a.id === id);
            const body = document.getElementById('modalBody');
            body.innerHTML = `
                <div class="m-hero">
                    <img src="${app.icon}" onerror="this.src='https://cdn-icons-png.flaticon.com/512/6831/6831000.png'">
                    <h1>${app.name}</h1>
                    <span style="color:var(--accent); font-weight:bold;">${app.type.toUpperCase()} EDITION</span>
                </div>
                <div class="m-stats">
                    <div class="m-stat-item"><small>ВЕРСІЯ</small><b>${app.version}</b></div>
                    <div class="m-stat-item"><small>ВАГА</small><b>${app.size}</b></div>
                </div>
                <div class="m-desc-box">
                    <b>ДЕТАЛЬНА ІНФОРМАЦІЯ:</b><br><br>
                    ${app.desc}
                </div>
                <div class="dl-fixed">
                    <a href="${app.link}" style="text-decoration:none">
                        <button class="dl-btn">ЗАВАНТАЖИТИ ЗАРАЗ</button>
                    </a>
                </div>
            `;
            document.getElementById('appModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        function closeApp() {
            document.getElementById('appModal').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        function toggleTerm() {
            const t = document.getElementById('term');
            t.style.display = (t.style.display === 'block') ? 'none' : 'block';
        }

        // ПОЧАТКОВИЙ ЗАПУСК
        renderApps(database);
        
        // Живий онлайн
        setInterval(() => {
            const val = Math.floor(Math.random() * (170 - 135) + 135);
            document.getElementById('online-count').innerText = val;
        }, 3000);
    </script>
</body>
</html>
