<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Сонечко — Glass Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;500;800&display=swap" rel="stylesheet">
    <style>
        :root { --glass: rgba(255, 255, 255, 0.1); --blur: blur(15px); }
        body { 
            background: linear-gradient(135deg, #ff9a9e 0%, #fad0c4 99%, #fad0c4 100%);
            min-height: 100vh; font-family: 'Plus Jakarta Sans', sans-serif; color: #1a1a1a;
        }
        .glass { background: var(--glass); backdrop-filter: var(--blur); border: 1px solid rgba(255,255,255,0.2); border-radius: 24px; }
        .btn-glass { background: rgba(255,255,255,0.2); backdrop-filter: blur(5px); border: 1px solid rgba(255,255,255,0.3); transition: 0.3s; }
        .btn-glass:hover { background: rgba(255,255,255,0.4); transform: scale(1.05); }
        
        .modal { position: fixed; inset: 0; z-index: 1000; display: none; padding: 20px; overflow-y: auto; background: rgba(0,0,0,0.4); backdrop-filter: blur(10px); }
        .active { display: block; animation: fadeIn 0.4s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        input, textarea { background: rgba(255,255,255,0.5) !important; border: 1px solid rgba(255,255,255,0.3) !important; border-radius: 12px !important; padding: 12px !important; outline: none; }
    </style>
</head>
<body>

    <!-- НАВІГАЦІЯ -->
    <nav class="p-6 flex justify-between items-center max-w-7xl mx-auto">
        <h1 class="text-2xl font-800 tracking-tighter text-white drop-shadow-md">СОНЕЧКО☀️</h1>
        <div class="flex gap-4" id="navButtons">
            <button onclick="showPage('authModal')" class="btn-glass px-6 py-2 rounded-full font-bold text-white">УВІЙТИ</button>
        </div>
    </nav>

    <!-- ГОЛОВНИЙ КОНТЕНТ -->
    <main class="max-w-7xl mx-auto px-6 py-10 flex flex-col md:flex-row gap-8">
        <aside class="md:w-1/4">
            <div class="glass p-6 sticky top-10">
                <h3 class="font-bold mb-4">Пошук</h3>
                <input type="text" id="search" oninput="renderProducts()" placeholder="Що шукаємо?" class="w-full mb-6">
                <h3 class="font-bold mb-4">Фільтри</h3>
                <div class="space-y-2 text-sm font-medium">
                    <p class="cursor-pointer hover:text-white">🔥 Новинки</p>
                    <p class="cursor-pointer hover:text-white">🎮 Геймінг</p>
                    <p class="cursor-pointer hover:text-white">🍎 Продукти</p>
                </div>
            </div>
        </aside>

        <div class="flex-1">
            <div id="productGrid" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6"></div>
        </div>
    </main>

    <!-- МОДАЛКА АВТОРИЗАЦІЇ (КРОК 1) -->
    <div id="authModal" class="modal">
        <div class="max-w-md mx-auto mt-20 glass p-10 text-center">
            <h2 class="text-2xl font-800 mb-6 text-white">Реєстрація</h2>
            <input type="email" id="regEmail" placeholder="Ваша пошта" class="w-full mb-4">
            <button onclick="nextStep()" class="w-full bg-white text-pink-500 font-bold py-4 rounded-xl shadow-lg">ПРОДОВЖИТИ</button>
            <button onclick="showPage(null)" class="mt-4 text-white text-xs opacity-60">СКАСУВАТИ</button>
        </div>
    </div>

    <!-- МОДАЛКА ПРОФІЛЮ (КРОК 2) -->
    <div id="profileCreateModal" class="modal">
        <div class="max-w-md mx-auto mt-10 glass p-10 text-center">
            <h2 class="text-2xl font-800 mb-6 text-white">Створення профілю</h2>
            <div class="mb-6 relative group inline-block">
                <img id="tempAvatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" class="w-24 h-24 rounded-3xl object-cover mx-auto border-4 border-white">
                <input type="file" id="fileInput" class="hidden" accept="image/*" onchange="handleFile(event)">
                <button onclick="document.getElementById('fileInput').click()" class="absolute -bottom-2 -right-2 bg-white p-2 rounded-full shadow-md">📸</button>
            </div>
            <input type="text" id="profName" placeholder="Ім'я" class="w-full mb-3">
            <input type="text" id="profPhone" placeholder="Номер телефону" class="w-full mb-6">
            <button onclick="finishRegistration()" class="w-full bg-white text-pink-500 font-bold py-4 rounded-xl">СТВОРИТИ АККАУНТ</button>
        </div>
    </div>

    <!-- СТОРІНКА ПРОФІЛЮ (ПЕРЕГЛЯД ТА ІНШІ) -->
    <div id="userProfile" class="modal">
        <div class="max-w-4xl mx-auto mt-10">
            <div class="glass p-10 flex flex-col md:flex-row gap-10 items-center">
                <img id="myAvatar" class="w-40 h-40 rounded-[40px] object-cover shadow-2xl">
                <div class="text-white">
                    <h2 id="myName" class="text-4xl font-800"></h2>
                    <p id="myPhone" class="opacity-80 text-xl"></p>
                    <div class="flex gap-4 mt-6">
                        <button onclick="showAdmin()" class="text-[10px] opacity-40">Admin Panel</button>
                        <button onclick="logout()" class="text-[10px] text-red-200">Вийти</button>
                    </div>
                </div>
            </div>
            
            <h3 class="text-white font-bold mt-10 mb-4 uppercase text-xs tracking-widest">Користувачі Сонечка</h3>
            <div id="usersList" class="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-4"></div>
            <button onclick="showPage(null)" class="mt-10 text-white font-bold">← НАЗАД</button>
        </div>
    </div>

    <!-- АДМІНКА -->
    <div id="adminModal" class="modal">
        <div class="max-w-xl mx-auto mt-10 glass p-8">
            <h2 class="text-white font-bold mb-6">Додати новий товар</h2>
            <div class="space-y-4">
                <input type="text" id="adTitle" placeholder="Назва" class="w-full">
                <input type="text" id="adPrice" placeholder="Ціна (напр. 200 грн)" class="w-full">
                <textarea id="adDesc" placeholder="Опис товару..." class="w-full h-32"></textarea>
                <div class="flex gap-2">
                    <input type="file" id="adFile" class="hidden" onchange="handleAdFile(event)">
                    <button onclick="document.getElementById('adFile').click()" class="bg-white/20 p-4 rounded-xl text-white text-sm">ВИБРАТИ ФОТО</button>
                    <img id="adPreview" class="h-14 w-14 object-cover rounded-lg hidden">
                </div>
                <button onclick="publishProduct()" class="w-full bg-white py-4 rounded-xl font-bold">ОПУБЛІКУВАТИ</button>
                <button onclick="showPage('userProfile')" class="w-full text-white opacity-50 text-sm py-2">ЗАКРИТИ АДМІНКУ</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, collection, addDoc, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAmCzZAEKq4BMo6eWAN96IawhF95cH1sHM",
            authDomain: "keysbrawl-c4ae6.firebaseapp.com",
            projectId: "keysbrawl-c4ae6",
            storageBucket: "keysbrawl-c4ae6.firebasestorage.app",
            messagingSenderId: "1090859079662",
            appId: "1:1090859079662:web:0fb901aee2e2d65c83a0ff"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        let currentImg = "";
        let adImg = "";
        let products = [];

        // ЛОГІКА ПЕРЕКЛЮЧЕННЯ СТОРІНОК
        window.showPage = (id) => {
            document.querySelectorAll('.modal').forEach(m => m.classList.remove('active'));
            if(id) document.getElementById(id).classList.add('active');
        };

        // ЗАВАНТАЖЕННЯ ФОТО (ПРОФІЛЬ)
        window.handleFile = (e) => {
            const reader = new FileReader();
            reader.onload = (f) => {
                currentImg = f.target.result;
                document.getElementById('tempAvatar').src = currentImg;
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // ЗАВАНТАЖЕННЯ ФОТО (АДМІНКА)
        window.handleAdFile = (e) => {
            const reader = new FileReader();
            reader.onload = (f) => {
                adImg = f.target.result;
                document.getElementById('adPreview').src = adImg;
                document.getElementById('adPreview').classList.remove('hidden');
            };
            reader.readAsDataURL(e.target.files[0]);
        };

        // РЕЄСТРАЦІЯ
        window.nextStep = () => {
            if(document.getElementById('regEmail').value.includes('@')) showPage('profileCreateModal');
            else alert("Введіть коректну пошту!");
        };

        window.finishRegistration = async () => {
            const userData = {
                name: document.getElementById('profName').value,
                phone: document.getElementById('profPhone').value,
                email: document.getElementById('regEmail').value,
                photo: currentImg || "https://via.placeholder.com/100",
                date: Date.now()
            };
            await addDoc(collection(db, "sonechko_users"), userData);
            localStorage.setItem('user', JSON.stringify(userData));
            location.reload();
        };

        // ВИХІД
        window.logout = () => { localStorage.removeItem('user'); location.reload(); };

        // АДМІНКА
        window.showAdmin = () => { if(prompt("Введіть код:") === "254") showPage('adminModal'); };
        window.publishProduct = async () => {
            await addDoc(collection(db, "sonechko_store"), {
                title: document.getElementById('adTitle').value,
                price: document.getElementById('adPrice').value,
                desc: document.getElementById('adDesc').value,
                img: adImg,
                date: Date.now()
            });
            alert("Товар додано!");
            showPage(null);
        };

        // РЕНДЕР
        onSnapshot(query(collection(db, "sonechko_store"), orderBy("date", "desc")), (snap) => {
            products = snap.docs.map(d => d.data());
            renderProducts();
        });

        onSnapshot(collection(db, "sonechko_users"), (snap) => {
            const list = document.getElementById('usersList');
            list.innerHTML = '';
            snap.forEach(doc => {
                const u = doc.data();
                list.innerHTML += `
                    <div class="text-center">
                        <img src="${u.photo}" class="w-12 h-12 rounded-xl object-cover mx-auto mb-1 border border-white/30">
                        <p class="text-[9px] text-white font-bold truncate">${u.name}</p>
                    </div>`;
            });
        });

        window.renderProducts = () => {
            const grid = document.getElementById('productGrid');
            const s = document.getElementById('search').value.toLowerCase();
            grid.innerHTML = '';
            products.filter(p => p.title.toLowerCase().includes(s)).forEach(p => {
                grid.innerHTML += `
                    <div class="glass p-4 group">
                        <div class="overflow-hidden rounded-xl h-48 mb-4">
                            <img src="${p.img}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500">
                        </div>
                        <h4 class="text-white font-bold mb-1">${p.title}</h4>
                        <p class="text-pink-600 font-black text-sm mb-4">${p.price}</p>
                        <button class="w-full py-2 bg-white/20 rounded-lg text-white text-xs font-bold hover:bg-white hover:text-pink-500 transition">ДЕТАЛЬНІШЕ</button>
                    </div>`;
            });
        };

        // ПЕРЕВІРКА ЛОГІНУ ПРИ ЗАВАНТАЖЕННІ
        const savedUser = JSON.parse(localStorage.getItem('user'));
        if(savedUser) {
            document.getElementById('navButtons').innerHTML = `
                <button onclick="showPage('userProfile')" class="flex items-center gap-2 btn-glass p-1 pr-4 rounded-full">
                    <img src="${savedUser.photo}" class="w-8 h-8 rounded-full object-cover">
                    <span class="text-white text-xs font-bold uppercase tracking-widest">${savedUser.name}</span>
                </button>
            `;
            document.getElementById('myName').innerText = savedUser.name;
            document.getElementById('myPhone').innerText = savedUser.phone;
            document.getElementById('myAvatar').src = savedUser.photo;
        }
    </script>
</body>
</html>
