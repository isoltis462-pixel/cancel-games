<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PureDrop Cloud | V12</title>
    <!-- Google Identity Services Library -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        :root {
            --accent: #57AF20;
            --bg: #0b0b0c;
            --surface: #161618;
            --text: #ffffff;
            --border: rgba(255,255,255,0.08);
        }

        body { background: var(--bg); color: var(--text); font-family: 'Inter', sans-serif; margin: 0; }

        /* ВІКНО ВХОДУ */
        #welcomeScreen {
            position: fixed; inset: 0; background: var(--bg); z-index: 10000;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            text-align: center; padding: 20px;
        }

        .auth-btn {
            width: 100%; max-width: 280px; padding: 15px; border-radius: 15px;
            border: none; font-weight: 800; cursor: pointer; margin-top: 10px;
            transition: 0.3s;
        }

        .btn-google { background: white; color: #000; display: flex; align-items: center; justify-content: center; gap: 10px; }
        .btn-guest { background: var(--surface); color: var(--text); border: 1px solid var(--border); }

        /* ІНТЕРФЕЙС */
        header { padding: 15px 20px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .main-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; padding: 20px; }
        .app-card { background: var(--surface); border-radius: 24px; padding: 15px; text-align: center; border: 1px solid var(--border); }
        .app-card img { width: 80px; border-radius: 20px; }

        /* АДМІНКА (ТІЛЬКИ ДЛЯ ТЕБЕ) */
        #adminPanel { position: fixed; inset: 0; background: #000; z-index: 5000; display: none; padding: 20px; overflow-y: auto; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <!-- ЕКРАН ВІТАННЯ -->
    <div id="welcomeScreen">
        <h1 style="font-size: 40px; margin-bottom: 10px;">PURE<span>DROP</span></h1>
        <p style="color: #94949b; margin-bottom: 30px;">Оберіть спосіб входу в маркет</p>
        
        <div id="g_id_onload"
             data-client_id="ТВІЙ_GOOGLE_CLIENT_ID.apps.googleusercontent.com"
             data-callback="handleCredentialResponse">
        </div>
        <div class="g_id_signin" data-type="standard"></div>

        <button class="auth-btn btn-guest" onclick="enterAsGuest()">УВІЙТИ ЯК ГІСТЬ</button>
    </div>

    <header>
        <div class="brand">PURE<span>DROP</span></div>
        <div id="userBadge" style="font-size: 12px; color: var(--accent);"></div>
    </header>

    <div class="main-grid" id="appGrid"></div>

    <!-- АДМІН ПАНЕЛЬ -->
    <div id="adminPanel">
        <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
            <b>CLOUD MANAGER</b>
            <button onclick="toggleAdmin(false)" style="color:red; background:none; border:none;">ЗАКРИТИ</button>
        </div>
        <input type="text" id="addName" placeholder="Назва" style="width:100%; padding:10px; margin-bottom:10px;">
        <button onclick="saveToCloud()" style="width:100%; padding:15px; background:var(--accent); border:none; border-radius:10px; color:white;">ДОДАТИ ДЛЯ ВСІХ</button>
    </div>

    <script>
        // Щоб ігри бачили ВСІ, нам треба підключити Firebase. 
        // Поки що я залишаю логіку, яку ти зможеш розширити.
        
        let userRole = 'guest';

        function handleCredentialResponse(response) {
            // Тут ми отримуємо дані від Google
            const responsePayload = parseJwt(response.credential);
            console.log("ID: " + responsePayload.sub);
            console.log('Full Name: ' + responsePayload.name);
            
            // Якщо пошта твоя — даємо права адміна
            if(responsePayload.email === "ТВОЯ_ПОШТА@gmail.com") {
                userRole = 'admin';
                document.getElementById('userBadge').innerText = "ADMIN: " + responsePayload.given_name;
            } else {
                userRole = 'user';
                document.getElementById('userBadge').innerText = "USER: " + responsePayload.given_name;
            }
            
            document.getElementById('welcomeScreen').style.display = 'none';
            render();
        }

        function parseJwt(token) {
            var base64Url = token.split('.')[1];
            var base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            return JSON.parse(window.atob(base64));
        }

        function enterAsGuest() {
            userRole = 'guest';
            document.getElementById('userBadge').innerText = "GUEST MODE";
            document.getElementById('welcomeScreen').style.display = 'none';
            render();
        }

        // ВАЖЛИВО: Для того, щоб ігри бачили всі, тобі потрібно 
        // зареєструватись на Firebase (Google) і отримати Config.
        // Без нього ігри будуть лише у тебе.

        function render() {
            // Тут буде завантаження з хмари
            const grid = document.getElementById('appGrid');
            grid.innerHTML = `<p style="text-align:center; grid-column: 1/3;">База даних підключається...</p>`;
        }

        function toggleAdmin(s) {
            if(userRole !== 'admin') return alert("Тільки адмін може зайти сюди!");
            document.getElementById('adminPanel').style.display = s ? 'block' : 'none';
        }
    </script>
</body>
</html>
