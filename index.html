<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PureDrop | Premium Gaming</title>
    <style>
        :root {
            --bg: #1c1c1e;
            --card: #2c2c2e;
            --green: #57AF20;
            --white: #ffffff;
            --grey-text: #a0a0a0;
        }

        body {
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0; padding: 0;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        header {
            background: var(--card);
            padding: 20px;
            text-align: center;
            border-bottom: 1px solid #3a3a3c;
            position: sticky; top: 0; z-index: 100;
        }

        .logo { font-size: 24px; font-weight: 900; }
        .logo span { color: var(--green); }

        /* Пошук */
        .search-container { padding: 15px; }
        #searchInput {
            width: 100%; padding: 15px;
            background: var(--card);
            border: 2px solid transparent;
            border-radius: 15px;
            color: white; outline: none;
            box-sizing: border-box; transition: 0.3s;
        }
        #searchInput:focus { border-color: var(--green); }

        /* Головна сітка */
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px; padding: 15px;
        }

        .game-card {
            background: var(--card);
            border-radius: 20px;
            padding: 15px 5px;
            text-align: center;
            transition: 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            cursor: pointer;
            border: 1px solid #3a3a3c;
        }

        .game-card:hover { transform: translateY(-5px); border-color: var(--green); }
        .game-card:active { transform: scale(0.9); }

        .icon-main { font-size: 40px; margin-bottom: 8px; }
        .name-main { font-size: 11px; font-weight: bold; }

        /* Сторінка на весь екран */
        .full-page {
            position: fixed;
            top: 0; left: 100%; /* Початково схована справа */
            width: 100%; height: 100%;
            background: var(--bg);
            z-index: 2000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            overflow-y: auto;
            padding-bottom: 50px;
        }

        .full-page.active { left: 0; }

        .back-btn {
            padding: 20px;
            font-size: 18px;
            color: var(--green);
            cursor: pointer;
            display: inline-block;
            font-weight: bold;
        }

        /* Медіа-блок (Відео/Фото) */
        .media-container {
            width: 100%;
            height: 220px;
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .media-placeholder {
            width: 100%; height: 100%;
            object-fit: cover;
        }

        .content-padding { padding: 25px; }

        .game-info-header { display: flex; align-items: center; gap: 20px; margin-bottom: 20px; }
        .large-icon { font-size: 60px; background: var(--card); padding: 15px; border-radius: 20px; }
        .title-large { font-size: 28px; font-weight: 800; margin: 0; }

        .description {
            color: var(--grey-text);
            line-height: 1.6;
            font-size: 15px;
            margin-bottom: 30px;
        }

        .stats {
            display: flex; justify-content: space-around;
            background: var(--card);
            padding: 15px; border-radius: 15px;
            margin-bottom: 30px;
        }

        .stat-item { text-align: center; }
        .stat-val { display: block; font-weight: bold; color: var(--green); }
        .stat-label { font-size: 10px; color: var(--grey-text); }

        .download-footer {
            padding: 0 25px;
        }

        .big-dl-btn {
            background: var(--green);
            color: white;
            border: none;
            width: 100%;
            padding: 18px;
            border-radius: 18px;
            font-size: 18px;
            font-weight: 900;
            text-transform: uppercase;
            box-shadow: 0 10px 20px rgba(87, 175, 32, 0.3);
        }

        .big-dl-btn:active { transform: scale(0.96); background: white; color: black; }
    </style>
</head>
<body>

    <header><div class="logo">PURE<span>DROP</span></div></header>

    <div class="search-container">
        <input type="text" id="searchInput" placeholder="Пошук у каталозі...">
    </div>

    <div class="grid" id="mainGrid">
        <!-- Гра 1 -->
        <div class="game-card" onclick="openGame('UKRAINE GTA', '🏎️', 'Відчуй справжній драйв на дорогах України! Найкращий RP проект з українськими містами, поліцією (НПУ), ЗСУ та крутими тачками. Жодної реклами, тільки чистий геймплей.', '5.0', '1.2 GB', 'https://via.placeholder.com/600x400/1c1c1e/57AF20?text=UKRAINE+GTA+PREVIEW')">
            <div class="icon-main">🏎️</div>
            <div class="name-main">Ukraine GTA</div>
        </div>

        <!-- Гра 2 -->
        <div class="game-card" onclick="openGame('Superkickoff', '⚽', 'Стань легендарним тренером! Керуй ФК Шахтар або Рух Львів. Трансфери, тактика та перемоги в твоїх руках. Повна версія без обмежень.', '4.8', '150 MB', 'https://via.placeholder.com/600x400/1c1c1e/57AF20?text=FOOTBALL+MANAGER')">
            <div class="icon-main">⚽</div>
            <div class="name-main">Superkickoff</div>
        </div>

        <!-- Гра 3 -->
        <div class="game-card" onclick="openGame('NPU Simulator', '🚓', 'Ти — закон! Патрулюй вулиці Бортятина та Львова. Лови порушників, виписуй штрафи та підвищуйся у званні. Реалістична сирена та спецсигнали.', '4.9', '450 MB', 'https://via.placeholder.com/600x400/1c1c1e/57AF20?text=POLICE+SIM')">
            <div class="icon-main">🚓</div>
            <div class="name-main">NPU Sim</div>
        </div>
    </div>

    <!-- Повноекранна сторінка гри -->
    <div id="fullPage" class="full-page">
        <div class="back-btn" onclick="closeGame()">← Назад</div>
        
        <div class="media-container">
            <!-- Тут може бути <img> або <video> -->
            <img id="gamePreview" class="media-placeholder" src="" alt="Preview">
        </div>

        <div class="content-padding">
            <div class="game-info-header">
                <div id="largeIcon" class="large-icon"></div>
                <div>
                    <h1 id="largeTitle" class="title-large"></h1>
                    <span style="color: var(--green); font-size: 12px;">🛡️ Перевірено PureDrop</span>
                </div>
            </div>

            <div class="stats">
                <div class="stat-item"><span class="stat-val" id="statRate"></span><span class="stat-label">РЕЙТИНГ</span></div>
                <div class="stat-item"><span class="stat-val" id="statSize"></span><span class="stat-label">РОЗМІР</span></div>
                <div class="stat-item"><span class="stat-val">11+</span><span class="stat-label">ВІК</span></div>
            </div>

            <p id="largeDesc" class="description"></p>

            <div class="download-footer">
                <button class="big-dl-btn">СКАЧАТИ БЕЗКОШТОВНО</button>
                <p style="text-align: center; font-size: 10px; color: var(--grey-text); margin-top: 15px;">Версія без реклами та вірусів для підписників Батяра</p>
            </div>
        </div>
    </div>

    <script>
        function openGame(title, icon, desc, rate, size, img) {
            document.getElementById('largeTitle').innerText = title;
            document.getElementById('largeIcon').innerText = icon;
            document.getElementById('largeDesc').innerText = desc;
            document.getElementById('statRate').innerText = rate;
            document.getElementById('statSize').innerText = size;
            document.getElementById('gamePreview').src = img;
            
            document.getElementById('fullPage').classList.add('active');
            document.body.style.overflow = 'hidden'; // Заборонити прокрутку фону
        }

        function closeGame() {
            document.getElementById('fullPage').classList.remove('active');
            document.body.style.overflow = 'auto';
        }

        // Пошук
        document.getElementById('searchInput').addEventListener('input', function() {
            let val = this.value.toLowerCase();
            document.querySelectorAll('.game-card').forEach(card => {
                let text = card.querySelector('.name-main').innerText.toLowerCase();
                card.style.display = text.includes(val) ? "flex" : "none";
            });
        });
    </script>
</body>
</html>
