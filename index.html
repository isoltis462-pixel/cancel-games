<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Belegram PRO CALLS</title>

<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore-compat.js"></script>

<style>
*{box-sizing:border-box;font-family:Arial}
body{margin:0;height:100vh;background:#0b1220;color:white;display:flex;justify-content:center;align-items:center}

.app{width:1200px;height:720px;display:none;background:#111827;border-radius:16px;overflow:hidden}
.sidebar{width:30%;background:#0f172a;padding:10px;overflow-y:auto}
.chat{width:70%;display:flex;flex-direction:column}
.item{padding:10px;margin:6px 0;background:#1f2937;border-radius:10px;cursor:pointer}
.header{padding:10px;background:#111827;display:flex;justify-content:space-between}
.messages{flex:1;padding:10px;overflow-y:auto}
.msg{padding:8px;margin:5px;background:#1f2937;border-radius:10px;max-width:70%}
.me{background:#2563eb;align-self:flex-end}
.inputBox{display:flex;padding:10px;gap:5px}
input{flex:1;padding:10px;border-radius:10px;border:none;background:#0b1220;color:white}
button{padding:10px;border:none;border-radius:10px;background:#2563eb;color:white;cursor:pointer}
#callBox{position:fixed;top:10px;right:10px;background:#111827;padding:10px;border-radius:10px;display:none}
</style>
</head>
<body>

<div class="app" id="app">
<div class="sidebar" id="users"></div>

<div class="chat">
<div class="header">
<div id="title">Chat</div>
<button onclick="startCall()">📞</button>
</div>

<div class="messages" id="messages"></div>

<div class="inputBox">
<input id="text" placeholder="message..." onkeypress="if(event.key==='Enter')send()" />
<button onclick="send()">➤</button>
</div>
</div>
</div>

<div id="callBox">📞 Call active <button onclick="endCall()">End</button></div>

<script>
const firebaseConfig={apiKey:"AIzaSyAmCzZAEKq4BMo6eWAN96IawhF95cH1sHM",authDomain:"keysbrawl-c4ae6.firebaseapp.com",projectId:"keysbrawl-c4ae6"}
firebase.initializeApp(firebaseConfig)
const auth=firebase.auth()
const db=firebase.firestore()

let current=null
let pc=null
let localStream

// LOGIN QUICK
auth.signInAnonymously().then(()=>{
 document.getElementById("app").style.display="flex"
 loadUsers()
})

function chatId(){return [auth.currentUser.uid,current].sort().join("_")}

// USERS (demo)
function loadUsers(){
 db.collection("users").onSnapshot(s=>{
  let box=document.getElementById("users")
  box.innerHTML=""
  s.forEach(d=>{
   if(d.id===auth.currentUser.uid)return
   box.innerHTML+=`<div class='item' onclick="openChat('${d.id}')">${d.id}</div>`
  })
 })
}

function openChat(id){current=id;loadMessages()}

function send(){
let t=document.getElementById("text").value
if(!t||!current)return

let id=chatId()
db.collection("chats").doc(id).collection("m").add({text:t,uid:auth.currentUser.uid,time:Date.now()})
document.getElementById("text").value=""
}

function loadMessages(){
db.collection("chats").doc(chatId()).collection("m").orderBy("time")
.onSnapshot(s=>{
let box=document.getElementById("messages")
box.innerHTML=""
s.forEach(d=>{
let m=d.data()
let cls=m.uid==auth.currentUser.uid?'me':'msg'
box.innerHTML+=`<div class='msg ${cls}'>${m.text}</div>`
})
box.scrollTop=box.scrollHeight
})}

// =====================
// 🔥 REAL DISCORD-LIKE CALLS (WEBRTC)
// =====================

const servers={iceServers:[{urls:"stun:stun.l.google.com:19302"}]}

async function startCall(){
 document.getElementById("callBox").style.display="block"

 localStream=await navigator.mediaDevices.getUserMedia({audio:true,video:true})

 pc=new RTCPeerConnection(servers)
 localStream.getTracks().forEach(t=>pc.addTrack(t,localStream))

 pc.ontrack=e=>{
  let v=document.createElement("video")
  v.srcObject=e.streams[0]
  v.autoplay=true
  document.body.appendChild(v)
 }

 const offer=await pc.createOffer()
 await pc.setLocalDescription(offer)

 db.collection("calls").doc(chatId()).set({offer})

 db.collection("calls").doc(chatId()).onSnapshot(async doc=>{
  let data=doc.data()
  if(!pc.currentRemoteDescription && data?.answer){
    await pc.setRemoteDescription(new RTCSessionDescription(data.answer))
  }
 })

 pc.onicecandidate=e=>{
  if(e.candidate){
    db.collection("calls").doc(chatId()).update({candidate:e.candidate.toJSON()})
  }
 }
}

function endCall(){
 if(pc) pc.close()
 document.getElementById("callBox").style.display="none"
}
</script>

</body>
</html>
